<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제주 프리미엄 부동산 지도 Ver 1.061</title>
  <meta property="og:title" content="제주 프리미엄 부동산 지도 Ver 1.061" />
  <meta property="og:description" content="제주도 부동산 지도 서비스" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://your-domain.example/" />
  <meta property="og:image" content="https://your-domain.example/og-image.jpg" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --sidebar-list-width: 380px;
      --brand: #14b8a6;
      --bg: #f4f7fb;
      --line: #e7edf3;
      --text: #17212b;
      --muted: #7a8794;
      --shadow: 0 12px 30px rgba(15, 41, 66, 0.12);
      --font-ui: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }
    * { box-sizing: border-box; font-family: var(--font-ui); }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); }
    body { overflow: hidden; }
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-list-width) 1fr;
      height: 100vh;
    }
    .sidebar {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #f7f8fa;
      border-right: 1px solid #e6ebf0;
    }
    .brand-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      height: 58px;
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid #e6ebf0;
      flex-shrink: 0;
    }
    .brand-title { font-size: 17px; font-weight: 900; color: #1f2a36; white-space: nowrap; }
    .panel { margin: 0; padding: 12px 16px; background: #fff; border-bottom: 1px solid #e6ebf0; }
    .search-box input {
      width: 100%; height: 44px; padding: 0 14px; border: 1px solid #dfe5eb; border-radius: 999px;
      outline: none; font-size: 14px; background: #fff; color: #17212b;
    }
    .filter-title { margin: 10px 0 8px; font-size: 12px; font-weight: 800; color: var(--muted); }
    .feature-buttons, .deal-buttons, .type-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
    .feature-buttons button, .deal-buttons button, .type-buttons button, .reset-list-btn {
      border: 1px solid #dfe5eb; border-radius: 999px; padding: 8px 12px; font-size: 12px;
      font-weight: 800; cursor: pointer; background: #fff; color: #304050; transition: .2s ease;
    }
    .deal-buttons button.active, .type-buttons button.active, .feature-buttons button.active {
      background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 8px 18px rgba(20,184,166,0.22);
    }
    .reset-list-btn { width: 100%; margin-top: 10px; }
    .list-head {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      margin: 0; padding: 14px 16px 10px; background: #f7f8fa; border-bottom: 1px solid #eceff3; flex-shrink: 0;
    }
    .list-head strong { font-size: 14px; color: #1f6fff; font-weight: 900; }
    .list-head span { font-size: 13px; color: #1f2a36; font-weight: 800; }
    .property-list { flex: 1; overflow-y: auto; background: #f7f8fa; padding-bottom: 24px; }
    .card {
      background: linear-gradient(180deg, #ffffff 0%, #fcfdff 100%);
      border-bottom: 1px solid #e9eef4; cursor: pointer; padding: 0; overflow: hidden;
      transition: background .2s ease;
    }
    .card:hover, .card.active { background: linear-gradient(180deg, #fafdff 0%, #f5f9ff 100%); }
    .card-inner-row { display: flex; gap: 14px; padding: 16px; }
    .thumb {
      width: 96px; min-width: 96px; height: 96px; border-radius: 12px;
      background-size: cover; background-position: center; box-shadow: 0 8px 18px rgba(15, 41, 66, 0.10);
    }
    .card-body { flex: 1; min-width: 0; }
    .card-top-line { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 7px; }
    .card-badge-row { display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; min-width: 0; }
    .card-badge {
      display: inline-flex; align-items: center; height: 22px; padding: 0 10px; border-radius: 999px;
      background: #f3eefe; color: #7c4dff; font-size: 11px; font-weight: 800; white-space: nowrap;
    }
    .card-badge.deal[data-type="매매"] { background: #e8f7ef; color: #16a34a; }
    .card-badge.deal[data-type="전세"] { background: #eef5ff; color: #2563eb; }
    .card-badge.deal[data-type="월세"] { background: #fff7ed; color: #ea580c; }
    .card-title { font-size: 15px; font-weight: 900; line-height: 1.38; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-address { font-size: 13px; color: #6f7c89; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-price-line { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; flex-wrap: wrap; }
    .card-deal { display: inline-flex; align-items: center; height: 24px; padding: 0 8px; border-radius: 999px; background: #eef5ff; color: #1f6fff; font-size: 12px; font-weight: 900; }
    .card-price { font-size: 22px; font-weight: 900; color: #111827; line-height: 1.05; }
    .card-spec { font-size: 13px; color: #667382; line-height: 1.5; }
    .empty-state {
      margin: 20px 16px 0; padding: 28px 18px; text-align: center; background: #fff; border: 1px solid #e6ebf0;
      border-radius: 18px; color: #6b7280; line-height: 1.7; font-size: 14px; font-weight: 700;
    }
    .map-wrap { position: relative; min-width: 0; height: 100vh; overflow: hidden; background: #dde7ef; }
    #map { width: 100%; height: 100vh; }
    .map-filter-bar {
      position: absolute; top: 12px; left: 12px; z-index: 30; display: flex; flex-direction: column; gap: 8px;
      max-width: calc(100% - 24px); padding: 12px; border-radius: 18px; background: rgba(255,255,255,0.94);
      border: 1px solid rgba(0,0,0,0.05); box-shadow: var(--shadow); backdrop-filter: blur(10px);
    }
    .map-result-count {
      position: absolute; top: 120px; left: 12px; z-index: 30; display: inline-flex; align-items: center; gap: 8px;
      min-height: 46px; padding: 10px 15px; border-radius: 16px; background: rgba(15,41,66,0.92); color: #fff;
      font-size: 14px; font-weight: 900; box-shadow: var(--shadow); backdrop-filter: blur(10px);
    }
    .map-result-count::before { content: "●"; color: #34d399; font-size: 12px; }
    .custom-badge {
      display: inline-flex; align-items: center; justify-content: center; min-width: 38px; height: 38px; padding: 0 12px;
      border-radius: 12px; background: #7c3aed; color: #fff; font-size: 14px; font-weight: 900;
      box-shadow: 0 12px 24px rgba(124, 58, 237, 0.28); border: 2px solid rgba(255,255,255,0.9); white-space: nowrap;
    }
    .custom-badge[data-count="2"], .custom-badge[data-count="3"], .custom-badge[data-count="4"], .custom-badge[data-count="5"],
    .custom-badge[data-count="6"], .custom-badge[data-count="7"], .custom-badge[data-count="8"], .custom-badge[data-count="9"] {
      min-width: 46px;
    }
    .custom-badge[data-count="10"] { min-width: 56px; }
    @media (max-width: 980px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; }
      .sidebar { height: auto; }
      .map-wrap, #map { height: 72vh; min-height: 520px; }
      .map-result-count { top: 124px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand-card">
        <div class="brand-title" id="appVersionText">제주도 부동산 지도 Ver 1.061</div>
      </div>
      <section class="panel">
        <div class="search-box">
          <input type="text" id="keyword" placeholder="지역명, 주소, 키워드 검색" />
        </div>
        <div class="filter-title">특징</div>
        <div class="feature-buttons" id="featureButtons">
          <button data-feature="oceans">오션뷰</button>
          <button data-feature="new">신축</button>
          <button data-feature="parking">주차</button>
          <button data-feature="elevator">엘리베이터</button>
        </div>
        <button type="button" class="reset-list-btn" id="resetListBtn">필터 초기화</button>
      </section>
      <div class="list-head">
        <strong id="listInfoText">전체 매물</strong>
        <span id="listCountText">총 0건</span>
      </div>
      <div class="property-list" id="propertyList"></div>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
      <div class="map-filter-bar">
        <div class="deal-buttons" id="dealButtons">
          <button type="button" data-deal="all" class="active">전체</button>
          <button type="button" data-deal="매매">매매</button>
          <button type="button" data-deal="전세">전세</button>
          <button type="button" data-deal="월세">월세</button>
        </div>
        <div class="type-buttons" id="typeButtons">
          <button type="button" data-type="all" class="active">전체</button>
          <button type="button" data-type="apartment">아파트ㆍ오피스텔</button>
          <button type="button" data-type="villa">빌라ㆍ주택</button>
          <button type="button" data-type="room">원룸ㆍ투룸</button>
          <button type="button" data-type="commercial">상가ㆍ사무실</button>
          <button type="button" data-type="land">토지ㆍ임야</button>
        </div>
      </div>
      <div class="map-result-count" id="mapResultCount">총 0건</div>
    </main>
  </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b7db2d3c35122f3ec33c88ea6d3195fb&libraries=clusterer"></script>
  <script>
    const APP_VERSION = '1.061';
    document.title = `제주 프리미엄 부동산 지도 Ver ${APP_VERSION}`;
    document.querySelector('meta[property="og:title"]').setAttribute('content', `제주 프리미엄 부동산 지도 Ver ${APP_VERSION}`);
    document.getElementById('appVersionText').textContent = `제주도 부동산 지도 Ver ${APP_VERSION}`;

    const SAMPLE_PROPERTIES = [
      { id: 'D-235', title: '제주푸르지오더퍼스트 104동', address: '제주도 서귀포시 대정읍 구억리', dealType: '매매', propertyType: 'apartment', priceText: '6억 9,000', areaText: '공급 125.1㎡ / 전용 84.9㎡', lat: 33.2734922, lng: 126.2815754, features: ['new','parking'], thumbnail: 'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=600&auto=format&fit=crop' },
      { id: 'D-188', title: '노형동 중심 상가건물', address: '제주도 제주시 노형동', dealType: '매매', propertyType: 'commercial', priceText: '37억', areaText: '연면적 505.67㎡ / 대지 267.50㎡', lat: 33.4870, lng: 126.4793, features: ['parking','elevator'], thumbnail: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=600&auto=format&fit=crop' },
      { id: 'D-102', title: '애월 바다 보이는 단독주택', address: '제주도 제주시 애월읍', dealType: '매매', propertyType: 'villa', priceText: '12억', areaText: '대지 331㎡ / 연면적 148㎡', lat: 33.4639, lng: 126.3092, features: ['oceans','parking'], thumbnail: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=600&auto=format&fit=crop' },
      { id: 'D-087', title: '연동 풀옵션 원룸', address: '제주도 제주시 연동', dealType: '월세', propertyType: 'room', priceText: '보증금 500 / 월 55', areaText: '전용 29.7㎡', lat: 33.4894, lng: 126.4910, features: ['elevator'], thumbnail: 'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?q=80&w=600&auto=format&fit=crop' },
      { id: 'D-055', title: '한림 개발가능 토지', address: '제주도 제주시 한림읍', dealType: '매매', propertyType: 'land', priceText: '9억 5,000', areaText: '대지 1,982㎡', lat: 33.4090, lng: 126.2646, features: [], thumbnail: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=600&auto=format&fit=crop' },
      { id: 'D-066', title: '중문 신축 오피스텔', address: '제주도 서귀포시 중문동', dealType: '전세', propertyType: 'apartment', priceText: '2억 8,000', areaText: '전용 59.8㎡', lat: 33.2541, lng: 126.4124, features: ['new','elevator','parking'], thumbnail: 'https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=600&auto=format&fit=crop' }
    ];

    const state = {
      map: null,
      all: SAMPLE_PROPERTIES,
      filtered: [],
      markers: [],
      selectedDeal: 'all',
      selectedType: 'all',
      selectedFeatures: new Set(),
      selectedMarkerId: null,
      suppressMove: false,
      lastBounds: null
    };

    const propertyList = document.getElementById('propertyList');
    const keywordInput = document.getElementById('keyword');
    const mapResultCount = document.getElementById('mapResultCount');
    const listInfoText = document.getElementById('listInfoText');
    const listCountText = document.getElementById('listCountText');
    const resetListBtn = document.getElementById('resetListBtn');
    const dealButtons = document.querySelectorAll('#dealButtons button');
    const typeButtons = document.querySelectorAll('#typeButtons button');
    const featureButtons = document.querySelectorAll('#featureButtons button');

    function createMap() {
      const center = new kakao.maps.LatLng(33.3617, 126.5292);
      state.map = new kakao.maps.Map(document.getElementById('map'), { center, level: 10 });
      kakao.maps.event.addListener(state.map, 'idle', () => {
        state.lastBounds = state.map.getBounds();
        renderMarkers();
        updateCounts();
      });
      state.lastBounds = state.map.getBounds();
    }

    function getKeyword() {
      return keywordInput.value.trim().toLowerCase();
    }

    function getFilteredItems() {
      const keyword = getKeyword();
      return state.all.filter(item => {
        const dealOk = state.selectedDeal === 'all' || item.dealType === state.selectedDeal;
        const typeOk = state.selectedType === 'all' || item.propertyType === state.selectedType;
        const keywordOk = !keyword || [item.title, item.address, item.id, item.priceText].join(' ').toLowerCase().includes(keyword);
        const featureOk = [...state.selectedFeatures].every(feature => item.features.includes(feature));
        return dealOk && typeOk && keywordOk && featureOk;
      });
    }

    function isInCurrentBounds(item) {
      if (!state.lastBounds) return true;
      const pos = new kakao.maps.LatLng(item.lat, item.lng);
      return state.lastBounds.contain(pos);
    }

    function clearMarkers() {
      state.markers.forEach(marker => marker.setMap(null));
      state.markers = [];
    }

    function makeMarkerContent(label) {
      const count = String(label).length;
      return `<div class="custom-badge" data-count="${count}">${label}</div>`;
    }

    function renderMarkers() {
      clearMarkers();
      const visibleItems = state.filtered.filter(isInCurrentBounds);
      visibleItems.forEach(item => {
        const marker = new kakao.maps.CustomOverlay({
          position: new kakao.maps.LatLng(item.lat, item.lng),
          content: makeMarkerContent(item.id),
          yAnchor: 1
        });
        marker.setMap(state.map);
        const node = marker.a && marker.a.firstChild ? marker.a.firstChild : null;
        if (node) {
          node.style.cursor = 'pointer';
          node.addEventListener('click', () => focusFromList(item.id, false));
        }
        state.markers.push(marker);
      });
    }

    function renderList() {
      propertyList.innerHTML = '';
      if (!state.filtered.length) {
        propertyList.innerHTML = `<div class="empty-state">조건에 맞는 매물이 없습니다.<br>지도를 이동 하거나 필터를 변경해 보세요.</div>`;
        return;
      }
      state.filtered.forEach(item => {
        const card = document.createElement('article');
        card.className = 'card' + (state.selectedMarkerId === item.id ? ' active' : '');
        card.dataset.id = item.id;
        card.innerHTML = `
          <div class="card-inner-row">
            <div class="thumb" style="background-image:url('${item.thumbnail}')"></div>
            <div class="card-body">
              <div class="card-top-line">
                <div class="card-badge-row">
                  <span class="card-badge deal" data-type="${item.dealType}">${item.dealType}</span>
                  <span class="card-badge">매물번호 ${item.id}</span>
                </div>
              </div>
              <div class="card-title">${item.title}</div>
              <div class="card-address">${item.address}</div>
              <div class="card-price-line">
                <span class="card-deal">${item.dealType}</span>
                <span class="card-price">${item.priceText}</span>
              </div>
              <div class="card-spec">${item.areaText}</div>
            </div>
          </div>`;
        card.addEventListener('click', () => focusFromList(item.id, true));
        propertyList.appendChild(card);
      });
    }

    function updateCounts() {
      const visibleCount = state.filtered.filter(isInCurrentBounds).length;
      mapResultCount.textContent = `총 ${visibleCount}건`;
      listCountText.textContent = `총 ${state.filtered.length}건`;
      if (state.selectedType === 'all' && state.selectedDeal === 'all') listInfoText.textContent = '전체 매물';
      else listInfoText.textContent = `${state.selectedDeal === 'all' ? '전체 거래' : state.selectedDeal} · ${state.selectedType === 'all' ? '전체 유형' : getTypeLabel(state.selectedType)}`;
    }

    function getTypeLabel(type) {
      const map = {
        apartment: '아파트ㆍ오피스텔',
        villa: '빌라ㆍ주택',
        room: '원룸ㆍ투룸',
        commercial: '상가ㆍ사무실',
        land: '토지ㆍ임야',
        all: '전체'
      };
      return map[type] || type;
    }

    function applyFilters({ moveMap = false } = {}) {
      state.filtered = getFilteredItems();
      renderList();
      if (moveMap && state.filtered.length) {
        // 왼쪽 패널 클릭 등 명시적 선택일 때만 지도 이동
        const target = state.filtered.find(item => item.id === state.selectedMarkerId) || state.filtered[0];
        if (target) {
          state.map.setLevel(4);
          state.map.panTo(new kakao.maps.LatLng(target.lat, target.lng));
        }
      } else {
        // 맵 상단 필터 클릭 시 현재 위치 유지, 마커만 다시 그림
        renderMarkers();
        updateCounts();
      }
      updateCounts();
      renderMarkers();
    }

    function focusFromList(id, moveMap) {
      const item = state.all.find(v => v.id === id);
      if (!item) return;
      state.selectedMarkerId = id;
      renderList();
      if (moveMap) {
        state.map.setLevel(4);
        state.map.panTo(new kakao.maps.LatLng(item.lat, item.lng));
      }
    }

    dealButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        dealButtons.forEach(b => b.classList.toggle('active', b === btn));
        state.selectedDeal = btn.dataset.deal;
        applyFilters({ moveMap: false });
      });
    });

    typeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        typeButtons.forEach(b => b.classList.toggle('active', b === btn));
        state.selectedType = btn.dataset.type;
        applyFilters({ moveMap: false });
      });
    });

    featureButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const feature = btn.dataset.feature;
        if (state.selectedFeatures.has(feature)) {
          state.selectedFeatures.delete(feature);
          btn.classList.remove('active');
        } else {
          state.selectedFeatures.add(feature);
          btn.classList.add('active');
        }
        applyFilters({ moveMap: false });
      });
    });

    keywordInput.addEventListener('input', () => applyFilters({ moveMap: false }));

    resetListBtn.addEventListener('click', () => {
      keywordInput.value = '';
      state.selectedDeal = 'all';
      state.selectedType = 'all';
      state.selectedFeatures.clear();
      dealButtons.forEach(b => b.classList.toggle('active', b.dataset.deal === 'all'));
      typeButtons.forEach(b => b.classList.toggle('active', b.dataset.type === 'all'));
      featureButtons.forEach(b => b.classList.remove('active'));
      applyFilters({ moveMap: false });
    });

    createMap();
    state.filtered = state.all.slice();
    renderList();
    renderMarkers();
    updateCounts();
  </script>
</body>
</html>
