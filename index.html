<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>제주 부동산 지도</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b7db2d3c35122f3ec33c88ea6d3195fb&libraries=clusterer"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}

body{display:flex;height:100vh;overflow:hidden;}

.sidebar{
  width:420px;
  background:#fff;
  border-right:1px solid #eee;
  transition:width .3s;
  overflow:hidden;
}

.sidebar.expanded{
  width:780px;
}

.sidebar-inner{
  display:flex;
  height:100%;
}

.list{
  width:420px;
  overflow-y:auto;
  padding:10px;
}

.detail{
  width:360px;
  border-left:1px solid #eee;
  background:#fafafa;
  display:none;
  flex-direction:column;
}

.sidebar.expanded .detail{
  display:flex;
}

.card{
  padding:12px;
  border:1px solid #eee;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

#map{
  flex:1;
}

/* 클러스터 스타일 */
.cluster{
  background:#fff;
  border-radius:50%;
  padding:10px;
  font-weight:900;
}

/* 로드뷰 */
#roadview{
  position:absolute;
  top:50px;
  right:10px;
  width:500px;
  height:400px;
  display:none;
  z-index:999;
  background:#000;
}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-inner">
    
    <div class="list" id="list"></div>

    <div class="detail" id="detail">
      <button onclick="closeDetail()">닫기</button>
      <div id="detailContent"></div>
    </div>

  </div>
</div>

<div id="map"></div>
<div id="roadview"></div>

<script>

// 샘플 데이터
const data = [
  {
    id:1,
    title:"제주시 토지",
    price:"3억",
    lat:33.38,
    lng:126.55,
    desc:"좋은 입지",
    image:"https://picsum.photos/400/200"
  },
  {
    id:2,
    title:"애월 매물",
    price:"5억",
    lat:33.45,
    lng:126.35,
    desc:"바다뷰",
    image:"https://picsum.photos/400/201"
  }
];

const sidebar = document.getElementById("sidebar");
const listEl = document.getElementById("list");
const detailEl = document.getElementById("detail");
const detailContent = document.getElementById("detailContent");

// 지도 생성
const map = new kakao.maps.Map(document.getElementById('map'), {
  center:new kakao.maps.LatLng(33.38,126.55),
  level:8
});

// 클러스터
const clusterer = new kakao.maps.MarkerClusterer({
  map:map,
  averageCenter:true,
  minLevel:3
});

let markers = [];

// 리스트 렌더링
function renderList(items){
  listEl.innerHTML = "";

  items.forEach(item=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <strong>${item.title}</strong><br>
      ${item.price}
    `;

    div.onclick = ()=>{
      openDetail(item);
    };

    listEl.appendChild(div);
  });
}

// 상세 열기
function openDetail(item){
  sidebar.classList.add("expanded");
  detailEl.style.display="flex";

  detailContent.innerHTML = `
    <h2>${item.title}</h2>
    <img src="${item.image}" style="width:100%">
    <p>${item.desc}</p>
  `;

  map.setCenter(new kakao.maps.LatLng(item.lat,item.lng));
}

// 상세 닫기
function closeDetail(){
  sidebar.classList.remove("expanded");
  detailEl.style.display="none";
}

// 마커 생성
function renderMarkers(items){
  clusterer.clear();

  markers = items.map(item=>{
    const marker = new kakao.maps.Marker({
      position:new kakao.maps.LatLng(item.lat,item.lng)
    });

    marker.__data = item;

    kakao.maps.event.addListener(marker,"click",()=>{
      openDetail(item);
    });

    return marker;
  });

  clusterer.addMarkers(markers);

  kakao.maps.event.addListener(clusterer,"clusterclick",function(cluster){
    const ms = cluster.getMarkers();
    const items = ms.map(m=>m.__data);
    renderList(items);
  });
}

// 로드뷰
const roadviewEl = document.getElementById("roadview");
let roadview;

function showRoadview(lat,lng){
  roadviewEl.style.display="block";

  const container = roadviewEl;

  roadview = new kakao.maps.Roadview(container);
  const rvClient = new kakao.maps.RoadviewClient();

  const position = new kakao.maps.LatLng(lat,lng);

  rvClient.getNearestPanoId(position,50,function(panoId){
    roadview.setPanoId(panoId,position);
  });
}

// 초기 실행
renderList(data);
renderMarkers(data);

</script>

</body>
</html>
