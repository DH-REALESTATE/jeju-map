<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>제주 프리미엄 부동산 지도 Ver 1.135</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KEY&libraries=services"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body { margin:0; font-family: sans-serif; display:flex; }

/* 좌측 */
#list {
  width: 360px;
  overflow-y: auto;
  border-right:1px solid #eee;
}

.card {
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

/* 우측 */
#map { flex:1; }

/* 상세 패널 */
#detail {
  position: fixed;
  right:0;
  top:0;
  width:420px;
  height:100%;
  background:#fff;
  box-shadow:-5px 0 20px rgba(0,0,0,0.1);
  overflow-y:auto;
}

/* 사진 */
.detail-hero img {
  width:100%;
  height:240px;
  object-fit:cover;

  /* 🔥 핵심 튜닝 */
  filter: contrast(1.05) brightness(1.03) saturate(1.05);
}

/* 태그 + 로드뷰 */
.detail-tags-row {
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.tag {
  background:#e8f5e9;
  color:#03C75A;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
}

.roadview-btn {
  background:#03C75A;
  color:#fff;
  border:none;
  border-radius:999px;
  padding:6px 10px;
  cursor:pointer;
}

/* 가격 / 주소 */
.detail-price {
  font-size:20px;
  font-weight:800;
  padding:0 10px;
}

.detail-address {
  font-size:13px;
  color:#666;
  padding:0 10px 10px;
}

</style>
</head>

<body>

<div id="list"></div>
<div id="map"></div>

<div id="detail"></div>

<script>

const data = [
  {
    title:"노형2차 아이파크",
    price:"10억 6,000",
    address:"제주시 노형동",
    lat:33.487,
    lng:126.48,
    image:"https://picsum.photos/400/300",
    features:["생활권","실거주"]
  }
];

const map = new kakao.maps.Map(document.getElementById('map'), {
  center: new kakao.maps.LatLng(33.45,126.57),
  level:8
});

data.forEach(item=>{
  const marker = new kakao.maps.Marker({
    map,
    position:new kakao.maps.LatLng(item.lat,item.lng)
  });

  marker.addListener("click",()=>showDetail(item));
});

const list = document.getElementById("list");
data.forEach(item=>{
  const div = document.createElement("div");
  div.className="card";
  div.innerHTML = item.title;
  div.onclick=()=>showDetail(item);
  list.appendChild(div);
});

function showDetail(item){
  document.getElementById("detail").innerHTML = `
    <div class="detail-hero">
      <img src="${item.image}">
    </div>

    <div class="detail-tags-row">
      <div>
        ${item.features.map(f=>`<span class="tag">${f}</span>`).join("")}
      </div>
      <button class="roadview-btn" onclick="openRoadview(${item.lat},${item.lng})">
        <i class="fa-solid fa-street-view"></i> 로드뷰
      </button>
    </div>

    <div class="detail-price">${item.price}</div>
    <div class="detail-address">${item.address}</div>
  `;
}

/* 로드뷰 */
let roadview, client;

function openRoadview(lat,lng){
  const overlay = document.createElement("div");
  overlay.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;z-index:9999";
  overlay.innerHTML = '<div id="rv" style="width:90%;height:80%;margin:5% auto;background:#fff"></div>';
  document.body.appendChild(overlay);

  roadview = new kakao.maps.Roadview(document.getElementById("rv"));
  client = new kakao.maps.RoadviewClient();

  const pos = new kakao.maps.LatLng(lat,lng);

  client.getNearestPanoId(pos,50,function(id){
    if(id){
      roadview.setPanoId(id,pos);
    }
  });

  overlay.onclick=()=>overlay.remove();
}

</script>

</body>
</html>
