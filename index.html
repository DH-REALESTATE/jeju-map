<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>제주 프리미엄 부동산 지도 Ver 1.409</title>
<meta property="og:title" content="제주 프리미엄 부동산 지도 Ver 1.409" />
<meta property="og:description" content="제주 프리미엄 부동산 지도 Ver 1.409" />

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSans.css">

<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=b7db2d3c35122f3ec33c88ea6d3195fb"></script>

<style>
:root{
 --font-ui:"Pretendard","Noto Sans KR",sans-serif;
 --font-display:"GmarketSans","Pretendard",sans-serif;
}
body{margin:0;font-family:var(--font-ui);background:#f5f7fb}
.header{padding:14px 16px;font-family:var(--font-display);font-weight:700;background:#fff;border-bottom:1px solid #eee}
#map{width:100%;height:calc(100vh - 52px)}
.agent-card{position:absolute;top:16px;right:16px;display:flex;gap:10px;background:#fff;padding:12px;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,0.15);z-index:10}
.agent-close{position:absolute;top:6px;right:8px;cursor:pointer;font-size:12px;color:#999}
.agent-name{font-family:var(--font-display);font-weight:700}
.agent-reg,.agent-address{font-size:11px;color:#9ca3af}
.agent-btn{display:inline-block;margin-top:6px;background:#1f6fff;color:#fff;padding:6px 10px;border-radius:8px;font-size:12px;text-decoration:none}
.recommend-card{position:absolute;bottom:16px;right:16px;width:260px;background:#fff;padding:12px;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,0.15);z-index:10}
.recommend-title{font-family:var(--font-display);font-weight:700;margin-bottom:6px}
</style>
</head>

<body>

<div class="header">제주 프리미엄 부동산 지도 Ver 1.409</div>
<div id="map"></div>

<div id="agentBox"></div>
<div id="recommendBox"></div>

<script>
const APP_VERSION = "1.409";

let allItems = [];
let recommendIds = [];
let recommendAgents = [];
let isAgentClosed = false;

async function loadData(){
 const res = await fetch("./properties.json");
 allItems = await res.json();
}

async function loadRecommend(){
 const res = await fetch("./recommend.json");
 const data = await res.json();
 recommendIds = data.ids || [];
 recommendAgents = data.agents || [];
}

let map;

function initMap(){
 map = new kakao.maps.Map(document.getElementById('map'), {
  center: new kakao.maps.LatLng(33.3617, 126.5292),
  level: 9
 });

 drawMarkers();
 renderRecommend();
 renderAgent();
}

function drawMarkers(){
 allItems.forEach(item=>{
  if(!item.lat || !item.lng) return;
  new kakao.maps.Marker({
   map: map,
   position: new kakao.maps.LatLng(item.lat, item.lng)
  });
 });
}

function renderRecommend(){
 const list = allItems.filter(i=>recommendIds.includes(Number(i.id)));
 if(!list.length) return;
 const item = list[Math.floor(Math.random()*list.length)];

 document.getElementById("recommendBox").innerHTML = `
  <div class="recommend-card">
    <div class="recommend-title">추천 매물</div>
    <div>${item.title || ""}</div>
    <div>${item.price || ""}</div>
  </div>
 `;
}

function getRandomAgent(){
 if(!recommendAgents.length) return null;
 return recommendAgents[Math.floor(Math.random()*recommendAgents.length)];
}

function closeAgent(){
 isAgentClosed = true;
 document.getElementById("agentBox").style.display="none";
}

function renderAgent(){
 if(isAgentClosed) return;

 const a = getRandomAgent();
 if(!a) return;

 document.getElementById("agentBox").innerHTML = `
  <div class="agent-card">
    <div class="agent-close" onclick="closeAgent()">✕</div>
    <div>
      <div class="agent-name">${a.name || ""}</div>
      <div>${a.office || ""}</div>
      <div class="agent-reg">${a.regNo || ""}</div>
      <div class="agent-address">${a.address || ""}</div>
      <div>${a.desc || ""}</div>
      <a href="${a.link || "#"}" target="_blank" class="agent-btn">매물보기</a>
    </div>
  </div>
 `;
}

async function init(){
 await loadData();
 await loadRecommend();
 initMap();
}

init();
</script>

</body>
</html>
