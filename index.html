<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제주 프리미엄 부동산 지도 Ver 1.015</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --sidebar-list-width: 360px;
      --detail-panel-width: 420px;
      --sidebar-current-width: var(--sidebar-list-width);
      --brand: #14b8a6;
      --bg: #f4f7fb;
      --line: #e7edf3;
      --text: #17212b;
      --shadow: 0 12px 30px rgba(15, 41, 66, 0.12);
      --font-ui: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    * { box-sizing: border-box; font-family: var(--font-ui); }
    html, body {
      margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility;
    }
    body { overflow: hidden; }

    .app { position: relative; display: grid; grid-template-columns: var(--sidebar-current-width) 1fr; height: 100vh; gap: 0; }
    .sidebar { height: 100vh; overflow: hidden; background: #f7f8fa; color: #1f2a36; min-width: 280px; border-right: 1px solid #e6ebf0; }
    .sidebar-inner { display: grid; grid-template-columns: var(--sidebar-list-width) 0px; height: 100%; transition: grid-template-columns 0.28s ease; }
    .sidebar.expanded .sidebar-inner { grid-template-columns: var(--sidebar-list-width) var(--detail-panel-width); }
    .sidebar-list-panel { height: 100%; overflow-y: auto; overflow-x: hidden; background: #f7f8fa; scrollbar-width: none; -ms-overflow-style: none; }
    .sidebar-list-panel::-webkit-scrollbar { display: none; }
    .sidebar-detail-panel { height: 100%; overflow: hidden; opacity: 0; background: #fff; border-left: 1px solid #e6ebf0; transition: opacity 0.22s ease; scrollbar-width: none; -ms-overflow-style: none; }
    .sidebar-detail-panel::-webkit-scrollbar { display: none; }
    .sidebar.expanded .sidebar-detail-panel { opacity: 1; }
    .detail-panel-inner { height: 100%; display: flex; flex-direction: column; background: #fff; }
    .detail-topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #eef2f6; background: rgba(255,255,255,0.98); backdrop-filter: blur(8px); }
    .detail-close-btn, .detail-icon-btn { border: 0; background: transparent; color: #223244; cursor: pointer; border-radius: 10px; height: 36px; min-width: 36px; padding: 0 10px; font-weight: 900; font-size: 18px; }
    .detail-top-actions { display: flex; gap: 6px; }
    .detail-scroll { flex: 1; overflow-y: auto; background: #fff; scrollbar-width: none; -ms-overflow-style: none; }
    .detail-scroll::-webkit-scrollbar { display: none; }
    .detail-hero { height: 312px; background: #dbe6ef center / cover no-repeat; position: relative; overflow: hidden; }
    .detail-hero::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0.14) 30%, rgba(0,0,0,0.62) 100%); pointer-events: none; z-index: 1; }
    .detail-hero-slides { position: absolute; inset: 0; z-index: 0; }
    .detail-hero-slide { position: absolute; inset: 0; background-position: center; background-size: cover; background-repeat: no-repeat; opacity: 0; transition: opacity 0.35s ease; }
    .detail-hero-slide.active { opacity: 1; }
    .detail-hero-expand, .detail-hero-nav { position: absolute; width: 40px; height: 40px; border: 0; border-radius: 10px; background: rgba(0,0,0,0.42); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(6px); z-index: 3; }
    .detail-hero-expand { top: 12px; right: 12px; }
    .detail-hero-nav { top: 50%; transform: translateY(-50%); }
    .detail-hero-nav.prev { left: 12px; }
    .detail-hero-nav.next { right: 12px; }
    .detail-hero-expand i, .detail-hero-nav i { font-size: 15px; line-height: 1; }
    .detail-hero-dots { position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%); display: flex; align-items: center; gap: 6px; z-index: 3; }
    .detail-hero-dot { width: 8px; height: 8px; border: 0; border-radius: 999px; background: rgba(255,255,255,0.42); cursor: pointer; padding: 0; transition: width 0.2s ease, background 0.2s ease; }
    .detail-hero-dot.active { width: 20px; background: rgba(255,255,255,0.98); }
    .detail-hero-badge { position: absolute; top: 12px; left: 12px; z-index: 3; display: inline-flex; align-items: center; min-height: 28px; padding: 0 10px; border-radius: 999px; background: rgba(255,255,255,0.18); backdrop-filter: blur(8px); font-size: 12px; font-weight: 900; letter-spacing: -0.2px; color: #fff; }
    .detail-hero-overlay { position: absolute; left: 0; right: 0; bottom: 0; z-index: 2; padding: 18px 18px 38px; color: #fff; }
    .detail-hero-price-row { display: flex; align-items: flex-end; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .detail-hero-deal { font-size: 16px; font-weight: 900; color: #8bd2ff; text-shadow: 0 2px 10px rgba(0,0,0,0.25); letter-spacing: -0.2px; line-height: 1.1; }
    .detail-hero-price { font-size: 34px; font-weight: 900; line-height: 1.04; letter-spacing: -1px; text-shadow: 0 3px 14px rgba(0,0,0,0.32); }
    .detail-hero-address { font-size: 13px; line-height: 1.45; color: rgba(255,255,255,0.94); text-shadow: 0 1px 6px rgba(0,0,0,0.2); }
    .detail-hero-features { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .detail-hero-features span { display: inline-flex; align-items: center; height: 26px; padding: 0 10px; border-radius: 999px; background: rgba(255,255,255,0.16); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.18); color: #fff; font-size: 12px; font-weight: 900; letter-spacing: -0.2px; }
    .detail-hero-features span.highlight { background: rgba(37,99,235,0.88); border-color: rgba(37,99,235,0.92); box-shadow: 0 4px 12px rgba(37,99,235,0.25); }
    .detail-content { padding: 18px; }
    .detail-title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
    .detail-title-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .detail-listing-no { display: block; font-size: 11px; font-weight: 800; letter-spacing: -0.2px; color: #6b7280; background: none; padding: 0; border-radius: 0; box-shadow: none; margin-bottom: 4px; line-height: 1.3; }
    .detail-title { margin: 0; font-size: 18px; font-weight: 900; color: #1d2733; letter-spacing: -0.4px; line-height: 1.45; }
    .detail-inline-price, .detail-inline-address, .detail-type-badge, .detail-features { display: none; }
    .detail-meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; overflow: hidden; border-radius: 14px; border: 1px solid #eceff3; margin-bottom: 16px; background: #fff; }
    .detail-meta-item { padding: 14px 12px; border-right: 1px solid #eceff3; }
    .detail-meta-item:last-child { border-right: 0; }
    .detail-meta-label { display: block; font-size: 12px; color: #7a8794; margin-bottom: 6px; font-weight: 700; }
    .detail-meta-value { display: block; font-size: 16px; color: #1f6fff; font-weight: 900; letter-spacing: -0.3px; }
    .detail-desc { margin-bottom: 16px; font-size: 14px; color: #334355; line-height: 1.6; white-space: pre-line; background: linear-gradient(180deg, #ffffff, #fafcff); border: 1px solid #eceff3; border-radius: 16px; padding: 16px 18px; }
    .detail-section-title { display: none; }
    .detail-info-sections { display: flex; flex-direction: column; gap: 14px; margin-top: 6px; margin-bottom: 16px; }
    .detail-info-section { background: #fff; border: 1px solid #eceff3; border-radius: 16px; padding: 16px 18px; }
    .detail-info-section-title { font-size: 15px; font-weight: 900; color: #111827; margin-bottom: 10px; letter-spacing: -0.3px; padding-left: 0; margin-left: 0; }
    .detail-info-list { margin-bottom: 0; background: transparent; border: 0; }
    .detail-info-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 6px 0; border-bottom: none; }
    .detail-info-label { min-width: 120px; font-size: 13px; font-weight: 800; color: #5f6b78; text-align: left; line-height: 1.25; }
    .detail-info-value { flex: 1; font-size: 13px; font-weight: 700; color: #1f2a36; text-align: right; line-height: 1.25; white-space: normal; word-break: keep-all; }
    .detail-agent-card { border-radius: 18px; border: 1px solid #e9eef4; background: linear-gradient(180deg, #ffffff, #fafcff); padding: 16px; margin-bottom: 16px; box-shadow: 0 6px 18px rgba(15, 41, 66, 0.04); }
    .detail-agent-top { display: flex; align-items: flex-start; gap: 14px; }
    .detail-agent-avatar { width: 52px; height: 52px; border-radius: 50%; background: #eef3f7; display: flex; align-items: center; justify-content: center; color: #4d5d6d; font-weight: 900; font-size: 13px; overflow: hidden; flex-shrink: 0; border: 1px solid #e5ebf1; }
    .detail-agent-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-agent-main { flex: 1; min-width: 0; }
    .detail-agent-name-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
    .detail-agent-name { font-size: 15px; font-weight: 900; color: #1f2a36; line-height: 1.4; }
    .detail-agent-title { font-size: 14px; font-weight: 800; color: #5f6b78; line-height: 1.4; }
    .detail-agent-office { font-size: 13px; font-weight: 800; color: #223244; line-height: 1.5; margin-bottom: 4px; }
    .detail-agent-address { font-size: 12px; color: #7f8b98; line-height: 1.55; margin-bottom: 3px; }
    .detail-agent-regno { font-size: 12px; color: #7f8b98; line-height: 1.55; margin-bottom: 3px; }
    .detail-agent-phone-inline { font-size: 13px; font-weight: 800; color: #223244; line-height: 1.5; }
    .detail-action-box { padding: 16px; border-radius: 18px; background: #f8fafc; border: 1px solid #e7edf3; }
    .detail-phone { display: none; }
    .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .detail-action-btn { flex: 1; min-width: 100px; min-height: 42px; border: 0; border-radius: 12px; background: #eef3f7; color: #203040; font-size: 13px; font-weight: 900; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
    .detail-action-btn.primary { background: #0f2942; color: #fff; }
    .brand-card { display: flex; align-items: center; justify-content: space-between; gap: 10px; height: 58px; padding: 0 16px; background: #fff; border-bottom: 1px solid #e6ebf0; }
    .brand-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-title { font-size: 17px; font-weight: 900; color: #1f2a36; white-space: nowrap; }
    .panel { margin: 0; padding: 10px 16px; border-radius: 0; background: #fff; border-bottom: 1px solid #e6ebf0; }
    .search-box input { width: 100%; height: 42px; padding: 0 14px; border: 1px solid #dfe5eb; border-radius: 12px; outline: none; font-size: 14px; background: #fff; color: #17212b; box-shadow: none; margin-bottom: 10px; }
    .filter-title { margin: 2px 0 8px; font-size: 12px; font-weight: 800; color: #7a8794; letter-spacing: 0.1px; }
    .feature-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
    .feature-buttons button, .reset-list-btn { border: 1px solid #dfe5eb; border-radius: 10px; padding: 8px 11px; font-size: 12px; font-weight: 800; cursor: pointer; transition: 0.2s ease; background: #fff; color: #304050; }
    .feature-buttons button.active, .feature-buttons button.all-active { background: #f1f7ff; color: #1f6fff; border-color: #bfd6ff; box-shadow: none; }
    .reset-list-btn { width: 100%; margin-top: 0; margin-bottom: 10px; border-radius: 12px; }
    .list-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 0; padding: 14px 16px 10px; background: #f7f8fa; border-bottom: 1px solid #eceff3; }
    .list-head strong { font-size: 14px; color: #1f6fff; letter-spacing: -0.2px; font-weight: 900; }
    .list-head span { font-size: 13px; color: #1f2a36; font-weight: 800; }
    .property-list { display: flex; flex-direction: column; gap: 0; padding-bottom: 24px; background: #f7f8fa; }
    .card { background: #fff; border: 0; border-bottom: 1px solid #eceff3; border-radius: 0; box-shadow: none; cursor: pointer; transition: background 0.15s ease; padding: 0; overflow: hidden; }
    .card:hover, .card.active { background: #f8fbff; transform: none; box-shadow: none; border-color: transparent; border-bottom: 1px solid #eceff3; }
    .card-inner-row { display: flex; gap: 12px; padding: 14px 14px 12px; }
    .thumb { width: 92px; min-width: 92px; height: 92px; border-radius: 10px; background-size: cover; background-position: center; position: relative; overflow: hidden; }
    .thumb::after { display: none; }
    .card-body { flex: 1; min-width: 0; padding: 0; }
    .card-top-line { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
    .card-top-left { min-width: 0; flex: 1; }
    .card-badge { display: inline-flex; align-items: center; height: 22px; padding: 0 8px; border-radius: 6px; background: #f3eefe; color: #8d59ff; font-size: 11px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
    .card-title { font-size: 15px; font-weight: 900; color: #1f2a36; line-height: 1.38; letter-spacing: -0.3px; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: keep-all; }
    .card-date { font-size: 12px; color: #9aa7b4; white-space: nowrap; }
    .card-address { font-size: 13px; color: #5d6b78; line-height: 1.45; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-price-line { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
    .card-deal { font-size: 16px; font-weight: 900; color: #1f6fff; }
    .card-price { font-size: 20px; font-weight: 900; color: #1d2733; letter-spacing: -0.4px; }
    .card-spec { font-size: 13px; color: #6a7785; line-height: 1.55; margin-bottom: 10px; }
    .card-agent-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding-top: 10px; border-top: 1px solid #f1f3f6; }
    .card-agent-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .card-agent-avatar { width: 30px; height: 30px; border-radius: 50%; background: #eef3f7; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #506070; overflow: hidden; flex-shrink: 0; }
    .card-agent-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-agent-name { font-size: 13px; font-weight: 800; color: #1f2a36; }
    .card-agent-title { font-size: 12px; color: #8a97a5; margin-left: 4px; }
    .card-agent-office { font-size: 12px; color: #8a97a5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .resizer { display: none; }
    .map-wrap { position: relative; min-width: 0; height: 100vh; overflow: hidden; background: #dde7ef; }
    #map { width: 100%; height: 100vh; }
    .map-filter-bar { position: absolute; top: 12px; left: 12px; z-index: 30; display: flex; flex-direction: column; gap: 8px; max-width: calc(100% - 24px); padding: 12px; border-radius: 18px; background: rgba(255,255,255,0.94); border: 1px solid rgba(0,0,0,0.05); box-shadow: var(--shadow); backdrop-filter: blur(10px); }
    .deal-buttons, .type-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
    .deal-buttons button, .type-buttons button { border: 0; border-radius: 999px; padding: 8px 12px; font-size: 12px; font-weight: 900; background: #eef3f7; color: #203040; cursor: pointer; white-space: nowrap; transition: 0.2s ease; }
    .deal-buttons button.active, .type-buttons button.active { background: var(--brand); color: #fff; box-shadow: 0 8px 18px rgba(20,184,166,0.22); }
    .map-result-count { position: absolute; top: 120px; left: 12px; z-index: 30; display: inline-flex; align-items: center; gap: 8px; min-height: 46px; padding: 10px 15px; border-radius: 16px; background: rgba(15,41,66,0.92); color: #fff; font-size: 14px; font-weight: 900; box-shadow: var(--shadow); backdrop-filter: blur(10px); letter-spacing: -0.2px; }
    .map-result-count::before { content: "●"; color: #34d399; font-size: 12px; }
    .detail-image-lightbox { position: fixed; inset: 0; z-index: 9999; display: none; align-items: center; justify-content: center; background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(6px); padding: 32px; }
    .detail-image-lightbox.open { display: flex; }
    .detail-image-lightbox img { max-width: min(1400px, 94vw); max-height: 92vh; object-fit: contain; border-radius: 14px; box-shadow: 0 20px 50px rgba(0,0,0,0.35); background: #111; }
    .detail-image-lightbox-close, .detail-image-lightbox-nav { position: absolute; top: 18px; width: 36px; height: 36px; min-width: 36px; border: 0; border-radius: 10px; background: rgba(255,255,255,0.14); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(6px); }
    .detail-image-lightbox-nav.prev { left: 18px; }
    .detail-image-lightbox-nav.next { left: 60px; right: auto; }
    .detail-image-lightbox-close { right: 18px; }
    .detail-image-lightbox-nav i, .detail-image-lightbox-close i { font-size: 16px; font-weight: 900; line-height: 1; }
    @media (max-width: 980px) {
      :root { --sidebar-current-width: 100%; }
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; }
      .sidebar { height: auto; min-width: 0; }
      .sidebar-inner, .sidebar.expanded .sidebar-inner { grid-template-columns: 1fr; }
      .sidebar-detail-panel { display: none; }
      .map-wrap, #map { height: 72vh; min-height: 520px; }
      .map-result-count { top: 124px; }
      .detail-image-lightbox-nav, .detail-image-lightbox-close { width: 36px; height: 36px; }
      .detail-image-lightbox-nav.prev { left: 12px; }
      .detail-image-lightbox-nav.next { left: 54px; }
      .detail-image-lightbox-close { right: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-list-panel">
          <div class="brand-card">
            <div class="brand-left">
              <div class="brand-title">제주도 부동산 지도 Ver 1.015</div>
            </div>
          </div>

          <div class="panel search-box">
            <button class="reset-list-btn" id="resetListBtn" type="button">전체 매물 보기</button>
            <input type="text" id="keyword" placeholder="지역명, 주소, 키워드 검색" />

            <div class="filter-title">특징 태그</div>
            <div class="feature-buttons" id="featureButtons">
              <button type="button" data-value="all" class="all-active">전체</button>
              <button type="button" data-value="신축">신축</button>
              <button type="button" data-value="오션뷰">오션뷰</button>
              <button type="button" data-value="생활권">생활권</button>
              <button type="button" data-value="투자용">투자용</button>
              <button type="button" data-value="급매">급매</button>
            </div>
          </div>

          <div class="list-head">
            <strong id="listInfoText">총 0개 매물</strong>
            <span>최신순</span>
          </div>

          <div class="property-list" id="propertyList"></div>
        </div>

        <div class="sidebar-detail-panel" id="sidebarDetailPanel">
          <div class="detail-panel-inner">
            <div class="detail-topbar">
              <button type="button" class="detail-close-btn" id="detailCloseBtn"><i class="fa-solid fa-arrow-left"></i></button>
              <div class="detail-top-actions">
                <button type="button" class="detail-icon-btn" id="detailShareBtn">⤴</button>
                <button type="button" class="detail-icon-btn">🔖</button>
                <button type="button" class="detail-icon-btn">⋮</button>
              </div>
            </div>
            <div class="detail-scroll">
              <div class="detail-hero" id="detailHero">
                <div class="detail-hero-slides" id="detailHeroSlides"></div>
                <button type="button" class="detail-hero-nav prev" id="detailHeroPrevBtn"><i class="fa-solid fa-chevron-left"></i></button>
                <button type="button" class="detail-hero-nav next" id="detailHeroNextBtn"><i class="fa-solid fa-chevron-right"></i></button>
                <button type="button" class="detail-hero-expand" id="detailHeroExpandBtn"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button>
                <div class="detail-hero-badge" id="detailHeroBadge"></div>
                <div class="detail-hero-overlay">
                  <div class="detail-hero-price-row">
                    <div class="detail-hero-deal" id="detailHeroDeal"></div>
                    <div class="detail-hero-price" id="detailHeroPrice"></div>
                  </div>
                  <div class="detail-hero-address" id="detailHeroAddress"></div>
                  <div class="detail-hero-features" id="detailHeroFeatures"></div>
                </div>
                <div class="detail-hero-dots" id="detailHeroDots"></div>
              </div>

              <div class="detail-content">
                <div class="detail-title-row">
                  <div class="detail-title-wrap">
                    <div class="detail-listing-no" id="detailListingNo"></div>
                    <h2 class="detail-title" id="detailTitle">매물을 선택하세요</h2>
                    <div class="detail-inline-price" id="detailPrice"></div>
                    <div class="detail-inline-address" id="detailAddress"></div>
                  </div>
                  <div class="detail-type-badge" id="detailTypeBadge"></div>
                </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b7db2d3c35122f3ec33c88ea6d3195fb&libraries=clusterer"></script>
  <script>
    // ===== 기본 데이터 + 지도 로직 =====
let map;
let markers = [];
let propertyData = [];

function initMap() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(33.4996, 126.5312),
    level: 9
  });
}

async function loadData() {
  const res = await fetch('./properties.json');
  propertyData = await res.json();
  renderList(propertyData);
  renderMarkers(propertyData);
}

function renderMarkers(data) {
  markers.forEach(m => m.setMap(null));
  markers = [];

  data.forEach(item => {
    if (!item.lat || !item.lng) return;

    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(item.lat, item.lng)
    });

    marker.setMap(map);
    markers.push(marker);
  });
}

// ===== 왼쪽 카드 =====
function renderList(data) {
  propertyList.innerHTML = data.map(item => {
    return `
      <article class="card">
        <div class="card-inner-row">
          <div class="thumb" style="background-image:url('${item.image}')"></div>

          <div class="card-body">
            <div class="card-top-line">
              <div class="card-top-left">
                <span class="card-badge">${item.type}</span>
                <div class="card-title">${item.title}</div>
              </div>
            </div>

            <div class="card-price-line">
              <span class="card-deal">${item.dealType}</span>
              <span class="card-price">${item.price}</span>
            </div>

            <div class="card-spec">${item.area}</div>
            <div class="card-address">${item.address}</div>
          </div>
        </div>
      </article>
    `;
  }).join('');
}

// 실행
initMap();
loadData();
</script>
