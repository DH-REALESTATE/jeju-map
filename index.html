    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getRelativeDate(dateString) {
      if (!dateString) return "";
      const now = new Date();
      const target = new Date(dateString);
      if (isNaN(target.getTime())) return "";

      const diffMs = now - target;
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

      if (diffDays <= 0) return "오늘";
      if (diffDays === 1) return "1일 전";
      if (diffDays < 7) return `${diffDays}일 전`;
      if (diffDays < 30) return `${Math.floor(diffDays / 7)}주 전`;
      if (diffDays < 365) return `${Math.floor(diffDays / 30)}개월 전`;
      return `${Math.floor(diffDays / 365)}년 전`;
    }

    function normalizeImageArray(item) {
      if (Array.isArray(item.images) && item.images.length) {
        return item.images.filter(Boolean);
      }
      if (item.image) return [item.image];
      return [];
    }

    function normalizeProperty(item, index) {
      return {
        id: item.id ?? index + 1,
        title: item.title ?? "제목 없음",
        listingNo: item.listingNo ?? "",
        dealType: item.dealFilter ?? item.dealType ?? "매매",

        lng: Number(item.lng),
        image: item.image ?? "",

    }

    function formatAreaTwoLines(areaText) {
      if (!areaText) return "-";

      const match = String(areaText).match(/공급\s*([\d.]+)㎡\s*\/\s*전용\s*([\d.]+)㎡/);
      if (!match) return escapeHtml(areaText);

      const supply = match[1];
      const privateArea = match[2];

      return `공급 ${escapeHtml(supply)}㎡<br>전용 ${escapeHtml(privateArea)}㎡`;
    }

    function parseAreaNumbers(areaText) {
      const text = String(areaText || "").trim();
      const matches = [...text.matchAll(/([\d,.]+)\s*㎡/g)].map(match => {
        const value = Number(String(match[1]).replace(/,/g, ""));
        return Number.isFinite(value) ? value : null;
      }).filter(v => v !== null);

      return matches;
    }

    function isApartmentType(typeText) {
      const text = String(typeText || "").trim();
      return /아파트|빌라/.test(text);
    }

    function isDetachedHouseType(typeText) {
      const text = String(typeText || "").trim();
      return ["단독", "단독주택"].includes(text);
    }

    function parseDetachedHouseAreas(areaText) {
      const raw = String(areaText || "-").trim();
      const landMatch = raw.match(/대지면적\s*([\d,.]+)㎡/);
      const totalMatch = raw.match(/연면적\s*([\d,.]+)㎡/);

      const land = landMatch ? Number(String(landMatch[1]).replace(/,/g, "")) : null;
      const total = totalMatch ? Number(String(totalMatch[1]).replace(/,/g, "")) : null;

      return { raw, land, total };
    }

    function parseApartmentAreas(areaText) {
      const raw = String(areaText || "-").trim();
      const supplyMatch = raw.match(/공급(?:면적)?\s*([\d,.]+)㎡/);
      const privateMatch = raw.match(/전용(?:면적)?\s*([\d,.]+)㎡/);

      let supply = supplyMatch ? Number(String(supplyMatch[1]).replace(/,/g, "")) : null;
      let privateArea = privateMatch ? Number(String(privateMatch[1]).replace(/,/g, "")) : null;

      if (!Number.isFinite(supply) || !Number.isFinite(privateArea)) {
        const values = parseAreaNumbers(raw);
        if (!Number.isFinite(supply) && values.length >= 1) supply = values[0];
        if (!Number.isFinite(privateArea) && values.length >= 2) privateArea = values[1];
      }

      return { raw, supply, private: privateArea };
    }

    function formatDetachedHouseAreaDisplay(areaText, unit = "m2") {
      const { raw, total } = parseDetachedHouseAreas(areaText);

      if (Number.isFinite(total)) {
        return `${formatSingleAreaValue(total, unit)}`;
      }

      return escapeHtml(raw);
    }

    function formatDetachedHouseCardAreaDisplay(areaText, unit) {
      const { raw, land, total } = parseDetachedHouseAreas(areaText);

      if (Number.isFinite(land) && Number.isFinite(total)) {
        return `(대지) ${formatSingleAreaValue(land, unit)} / (연) ${formatSingleAreaValue(total, unit)}`;
      }

      return escapeHtml(raw);
    }

    function formatSingleAreaValue(value, unit) {
      if (!Number.isFinite(value)) return "-";
      if (unit === "py") {
        return `${(value / 3.3058).toFixed(1)}평`;
      }
      return `${value.toLocaleString('ko-KR')}㎡`;
    }

    function formatAreaByUnit(areaText, unit, typeText = "") {
      const raw = String(areaText || "-").trim();
      const values = parseAreaNumbers(raw);

      if (isDetachedHouseType(typeText)) {
        return formatDetachedHouseAreaDisplay(raw, unit);
      }

      if (isApartmentType(typeText) && values.length >= 2) {
        const privateArea = formatSingleAreaValue(values[1], unit);
        return privateArea;
      }

      if (values.length >= 1) {
        return formatSingleAreaValue(values[0], unit);
      }

      return escapeHtml(raw);
    }

    function formatCardAreaByUnit(areaText, unit, typeText = "") {
      if (isDetachedHouseType(typeText)) {
        return formatDetachedHouseCardAreaDisplay(areaText, unit);
      }

      if (/오피스텔/.test(typeText)) {
        return `(계약) ${formatAreaByUnit(areaText, unit, typeText)}`;
      }

      if (isApartmentType(typeText)) {
        return `(전용) ${formatAreaByUnit(areaText, unit, typeText)}`;
      }

      if (/토지|임야/.test(typeText)) {
        return `${formatAreaByUnit(areaText, unit, typeText)}`;
      }

      return formatAreaByUnit(areaText, unit, typeText);
    }

    function syncDetailAreaDisplay(detailItem) {
      if (!detailItem || !detailAreaValue || !detailAreaLabel) return;

      const unit = detailAreaValue.dataset.areaUnit || "m2";
      const typeText = detailItem.type || "";

      if (isDetachedHouseType(typeText)) {
        const parsed = parseDetachedHouseAreas(detailItem.area || "-");
        const targetValue = detailAreaMode === "land" ? parsed.land : parsed.total;

        detailAreaLabel.textContent = detailAreaMode === "land" ? "면적(대지)" : "면적(연)";
        detailAreaValue.textContent = Number.isFinite(targetValue) ? formatSingleAreaValue(targetValue, unit) : "-";

        if (detailAreaTypeToggleBtn) {
          detailAreaTypeToggleBtn.style.display = "inline-flex";
        }
        return;
      }

      if (/오피스텔/.test(typeText)) {
        const parsed = parseApartmentAreas(detailItem.area || "-");
        const showSupply = detailAreaMode === "supply";
        const targetValue = showSupply ? parsed.supply : parsed.private;

        detailAreaLabel.textContent = showSupply ? "면적(계약)" : "면적(전용)";
        detailAreaValue.textContent = Number.isFinite(targetValue) ? formatSingleAreaValue(targetValue, unit) : "-";

        if (detailAreaTypeToggleBtn) {
          detailAreaTypeToggleBtn.style.display = "inline-flex";
        }
        return;
      }

      if (isApartmentType(typeText)) {
        const parsed = parseApartmentAreas(detailItem.area || "-");
        const showSupply = detailAreaMode === "supply";
        const targetValue = showSupply ? parsed.supply : parsed.private;

        detailAreaLabel.textContent = showSupply ? "면적(공급)" : "면적(전용)";
        detailAreaValue.textContent = Number.isFinite(targetValue) ? formatSingleAreaValue(targetValue, unit) : "-";

        if (detailAreaTypeToggleBtn) {
          detailAreaTypeToggleBtn.style.display = "inline-flex";
        }
        return;
      }

      detailAreaLabel.textContent = "면적";
      detailAreaValue.textContent = formatAreaByUnit(detailItem.area || "-", unit, typeText);

      if (detailAreaTypeToggleBtn) {
        detailAreaTypeToggleBtn.style.display = "none";
      }
    }

    async function loadAgent(agentPath) {
      if (!agentPath) return null;
      if (agentCache[agentPath]) return agentCache[agentPath];

      try {
        const res = await fetch(agentPath, { cache: "no-store" });
        if (!res.ok) throw new Error(`agent.json 불러오기 실패: ${res.status}`);
        const data = await res.json();
        agentCache[agentPath] = data;
        return data;
      } catch (e) {
        console.error("agent 로딩 실패", e);
        return null;
      }
    }

    async function loadProperties() {
      try {
        const res = await fetch("./properties.json");
        if (!res.ok) throw new Error("properties.json 불러오기 실패");

        const data = await res.json();

        const normalized = data
          .map(normalizeProperty)
          .filter(item => Number.isFinite(item.lat) && Number.isFinite(item.lng));

        const enriched = await Promise.all(
          normalized.map(async (item) => {
            const agent = await loadAgent(item.agent_folder);

            return {
              ...item,
              agentName: agent?.agentName ?? "",
              agentTitle: agent?.agentTitle ?? "",
              agentOffice: agent?.agentOffice ?? "",
              agentAddress: agent?.agentAddress ?? "",
              agentRegNo: agent?.agentRegNo ?? "",
              agentImage: agent?.agentImage ?? "",
              phone1: agent?.phone1 ?? "",
              phone2: agent?.phone2 ?? "",
              linkCrossroad: agent?.Link_crossroad ?? "",
              linkKakaotalk: agent?.Link_kakaotalk ?? ""
            };
          })
        );

        state.all = enriched;
        applyFilter();
      } catch (err) {
        console.error("매물 데이터 불러오기 실패:", err);
        propertyList.innerHTML = `
          <div class="card" style="padding:18px; cursor:default; border-bottom:0;">
            <div class="card-body" style="padding:0;">
              <h3 style="margin-bottom:6px;">매물 데이터를 불러오지 못했습니다</h3>
              <div>properties.json 파일 경로와 형식을 확인해 주세요.</div>
            </div>
          </div>
        `;
        setResultInfo("총 0건");
        setListInfo("총 0개 매물");
      }
    }

    function getBadgeWidthByText(text) {
      const len = String(text ?? "").length;
      if (len >= 3) return 70;
      if (len === 2) return 58;
      return 46;
    }

    function createMarkerImage(item, isSelected = false, label = "1") {
      const text = String(label ?? "1");
      const size = 44;

      const bgColor = isSelected ? "#ffffff" : "rgba(3, 199, 90, 0.9)";
      const textColor = isSelected ? "rgba(3, 199, 90, 0.9)" : "#ffffff";
      const borderColor = "#03C75A";

      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
          <defs>
            <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
              <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.18)"/>
            </filter>
          </defs>
          <g filter="url(#shadow)">
            <circle cx="${size / 2}" cy="${size / 2}" r="${(size / 2) - 2}"
                    fill="${bgColor}"
                    stroke="${borderColor}"
                    stroke-width="1"/>
            <text x="${size / 2}" y="${(size / 2) + 6}"
                  text-anchor="middle"
                  font-size="16"
                  font-weight="900"
                  font-family="${UI_FONT_STACK}"
                  fill="${textColor}">${text}</text>
          </g>
        </svg>
      `;

      return new kakao.maps.MarkerImage(
        "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
        new kakao.maps.Size(size, size),
        { offset: new kakao.maps.Point(size / 2, size / 2) }
      );
    }

    function updateMarkerSelection(selectedId) {
      state.selectedMarkerId = selectedId;
      state.markers.forEach(marker => {
        const item = marker.__property;
        const isSelected = item && item.id === selectedId;
        marker.setImage(createMarkerImage(item, isSelected, "1"));
      });
    }

    function getClusterKeyFromItems(items) {
      return items.map(item => item.id).sort((a, b) => a - b).join(",");
    }

    function getClusterBadgeSize() {
      return 44;
    }

    function setClusterBadgeSelected(cluster, isSelected) {
      const clusterMarker = cluster.getClusterMarker ? cluster.getClusterMarker() : null;
      if (!clusterMarker) return;

      const clusterItems = cluster.getMarkers().map(marker => marker.__property).filter(Boolean);
      if (!clusterItems.length) return;

      const count = clusterItems.length;
      const size = getClusterBadgeSize();

      const bg = isSelected ? "#ffffff" : "rgba(3, 199, 90, 0.9)";
      const color = isSelected ? "#03C75A" : "#ffffff";
      const border = "#03C75A";

      const el = document.createElement("div");
      el.style.width = `${size}px`;
      el.style.height = `${size}px`;
      el.style.minWidth = `${size}px`;
      el.style.minHeight = `${size}px`;
      el.style.borderRadius = "50%";
      el.style.display = "flex";
      el.style.alignItems = "center";
      el.style.justifyContent = "center";
      el.style.background = bg;
      el.style.color = color;
      el.style.fontSize = "16px";
      el.style.fontWeight = "900";
      el.style.fontFamily = UI_FONT_STACK;
      el.style.lineHeight = "1";
      el.style.letterSpacing = "-0.2px";
      el.style.border = `1px solid ${border}`;
      el.style.boxShadow = "0 4px 10px rgba(0,0,0,0.18)";
      el.style.boxSizing = "border-box";
      el.style.whiteSpace = "nowrap";
      el.style.cursor = "pointer";
      el.style.pointerEvents = "auto";
      el.style.userSelect = "none";
      el.textContent = count > 99 ? "99+" : String(count);

      el.addEventListener("click", async function (e) {
        e.preventDefault();
        e.stopPropagation();
        await handleClusterSelection(cluster);
      });

      clusterMarker.setContent(el);
    }

    function refreshClusterBadges() {
      if (!state.clusterer) return;
      const clusters = state.clusterer.getClusters ? state.clusterer.getClusters() : state.clusterer._clusters;
      if (!clusters || !clusters.length) return;

      clusters.forEach(cluster => {
        if (!cluster || typeof cluster.getClusterMarker !== "function") return;
        const clusterItems = cluster.getMarkers().map(marker => marker.__property).filter(Boolean);
        if (!clusterItems.length) return;

        const key = getClusterKeyFromItems(clusterItems);
        const isSelected = state.selectedClusterKey === key;
        setClusterBadgeSelected(cluster, isSelected);
      });
    }

    function makeAgentInitial(text) {
      const raw = String(text || "담당").trim();
      return raw.length >= 2 ? raw.slice(-2) : raw;
    }

    async function loadJsonFile(path, cacheStore, errorLabel) {
      if (!path) return {};
      if (cacheStore[path]) return cacheStore[path];

      try {
        const res = await fetch(path, { cache: "no-store" });
        if (!res.ok) throw new Error(`${errorLabel} 불러오기 실패: ${res.status}`);
        const data = await res.json();
        cacheStore[path] = data;
        return data;
      } catch (err) {
        console.error(`${errorLabel} 로딩 실패:`, err);
        return {};
      }
    }

    async function loadPropertyInfo(item) {
      return await loadJsonFile(item.desc_folder, infoCache, "info.json");
    }

    async function loadPropertyImages(item) {
      return await loadJsonFile(item.image_folder, imageCache, "image.json");
    }

    async function resolveDetailData(item) {
      const [info, imageData, agent] = await Promise.all([
        loadPropertyInfo(item),
        loadPropertyImages(item),
        loadAgent(item.agent_folder)
      ]);

      const imageList = Array.isArray(imageData.images)
        ? imageData.images.map(v => String(v || "").trim()).filter(Boolean)
        : [];

      const mainImage = String(imageData.image || "").trim()
        || imageList[0]
        || String(item.image || "").trim();

      const mergedImages = imageList.length
        ? imageList
        : (mainImage ? [mainImage] : normalizeImageArray(item));

      return {
        ...item,
        desc: info.desc ?? item.desc ?? "",
        sections: Array.isArray(info.sections) ? info.sections : [],
        infoRows: Array.isArray(info.infoRows) ? info.infoRows : [],
        propertyType: info.propertyType ?? "",
        image: mainImage,
        images: mergedImages,
        agentName: agent?.agentName ?? item.agentName ?? "",
        agentTitle: agent?.agentTitle ?? item.agentTitle ?? "",
        agentOffice: agent?.agentOffice ?? item.agentOffice ?? "",
        agentAddress: agent?.agentAddress ?? item.agentAddress ?? "",
        agentRegNo: agent?.agentRegNo ?? item.agentRegNo ?? "",
        agentImage: agent?.agentImage ?? item.agentImage ?? "",
        phone1: agent?.phone1 ?? item.phone1 ?? "",
        phone2: agent?.phone2 ?? item.phone2 ?? "",
        linkCrossroad: agent?.Link_crossroad ?? item.linkCrossroad ?? "",
        linkKakaotalk: agent?.Link_kakaotalk ?? item.linkKakaotalk ?? ""
      };
    }

    function renderDetailInfoRows(info) {
      const sections = Array.isArray(info.sections) ? info.sections : [];

      if (sections.length) {
        detailInfoList.innerHTML = `
          <div class="detail-info-sections">
            ${sections.map(section => {
              const rows = Array.isArray(section.rows)
                ? section.rows.filter(row => String(row?.value || "").trim() !== "")
                : [];

              if (!rows.length) return "";

              return `
                <div class="detail-info-section">
                  <div class="detail-info-section-title">${escapeHtml(section.title || "")}</div>
                  <div class="detail-info-list">
                    ${rows.map(row => `
                      <div class="detail-info-row">
                        <div class="detail-info-label">${escapeHtml(row.label || "")}</div>
                        <div class="detail-info-value">${escapeHtml(row.value || "")}</div>
                      </div>
                    `).join("")}
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `;
        return;
      }

      const rows = Array.isArray(info.infoRows)
        ? info.infoRows.filter(row => String(row?.value || "").trim() !== "")
        : [];

      if (!rows.length) {
        detailInfoList.innerHTML = "";
        return;
      }

      detailInfoList.innerHTML = `
        <div class="detail-info-sections">
          <div class="detail-info-section">
            <div class="detail-info-list">

    function getHeroImages(item) {
      const fallback = item.image ? [item.image] : [];

      if (!Array.isArray(item.images) || !item.images.length) {
        return fallback;
      }

      const cleaned = item.images
        .map(v => String(v || "").trim())
        .filter(Boolean);

      if (!cleaned.length) return fallback;

      return cleaned;
    }

      slides.forEach((slide, i) => {

    function showRoadview(lat, lng) {
      if (!roadviewClient || !roadviewOverlay || !roadview) {
        alert("로드뷰가 초기화되지 않았습니다.");
        return;
      }

      const position = new kakao.maps.LatLng(lat, lng);

      roadviewClient.getNearestPanoId(position, 100, function (panoId) {
        if (!panoId) {
          alert("이 위치 주변에는 로드뷰가 없습니다.");
          return;
        }

        roadviewOverlay.style.display = "block";
        roadview.setPanoId(panoId, position);
      });
    }

    function clearMapObjects() {
      if (state.clusterer) {
        state.clusterer.clear();
      }

      state.markers.forEach(marker => marker.setMap(null));
      state.markers = [];
    }

    function highlightCard(id) {
      document.querySelectorAll(".card").forEach(card => {
        card.classList.toggle("active", Number(card.dataset.id) === id);
      });
    }

    function moveMapToProperty(item) {
      if (!item || !state.map) return;
      const position = new kakao.maps.LatLng(item.lat, item.lng);
      state.map.setLevel(4);
      state.map.setCenter(position);
      state.map.relayout();
    }

    function renderMarkers(data) {
      clearMapObjects();
      if (!data.length) return;

      const bounds = new kakao.maps.LatLngBounds();
      const markerList = [];

      data.forEach(item => {
        const position = new kakao.maps.LatLng(item.lat, item.lng);

        const marker = new kakao.maps.Marker({
          position,
          image: createMarkerImage(item, state.selectedMarkerId === item.id, "1"),
          clickable: true
        });

        marker.__property = item;

        kakao.maps.event.addListener(marker, "click", async function () {
          await hideRoadview();

          state.selectedClusterKey = null;

          renderList([item]);
          propertyList.scrollTop = 0;

          highlightCard(item.id);
          updateMarkerSelection(item.id);
          await openDetailPanel(item);

          setResultInfo("선택 매물 1건");
          setListInfo("총 1개 매물");

          setTimeout(() => {
            refreshClusterBadges();
          }, 0);
        });

        markerList.push(marker);
        state.markers.push(marker);
        bounds.extend(position);
      });

      state.clusterer.addMarkers(markerList);

      setTimeout(() => {
        refreshClusterBadges();
      }, 0);

      if (data.length === 1) {
        state.map.setCenter(new kakao.maps.LatLng(data[0].lat, data[0].lng));
      } else {
        state.map.setBounds(bounds);
      }
    }

    async function focusProperty(id) {
      const item = state.filtered.find(v => v.id === id) || state.all.find(v => v.id === id);
      if (!item || !state.map) return;

      await hideRoadview();

      state.selectedClusterKey = null;

      highlightCard(id);
      updateMarkerSelection(id);
      moveMapToProperty(item);

      setTimeout(() => {
        refreshClusterBadges();
      }, 0);
    }

    function renderList(data) {
      if (!data.length) {
        propertyList.innerHTML = `
          <div class="card" style="padding:18px; cursor:default; border-bottom:0;">
            <div class="card-body" style="padding:0;">
              <h3 style="margin-bottom:6px;">표시할 매물이 없습니다</h3>
              <div>검색 조건을 바꿔보세요.</div>
            </div>
          </div>
        `;
        return;
      }

      propertyList.innerHTML = data.map(item => {
        const thumb = escapeHtml(item.image || "");
        const dealLabel = escapeHtml(item.dealType || "매매");
        const priceText = escapeHtml(item.price || "-");
        const addressText = escapeHtml(item.address || "-");
        const typeText = escapeHtml(item.type || "-");
        const titleText = escapeHtml(item.title || "매물명");
        const dateText = item.dateLabel || (item.date ? getRelativeDate(item.date) : "");

        const agentName = escapeHtml(item.agentName || "담당자");
        const agentTitle = escapeHtml(item.agentTitle || "");
        const officeName = escapeHtml(item.agentOffice || "");
          const agentInitial = makeAgentInitial(item.agentName || "담당자");

        const isDetachedHouse = isDetachedHouseType(item.type || "");
        const cardAreaHtml = isDetachedHouse
          ? `<span class="area-display" data-area-raw="${escapeHtml(item.area || "-")}" data-area-unit="m2" data-area-type="${escapeHtml(item.type || "")}">${formatCardAreaByUnit(item.area || "-", "m2", item.type || "")}</span>
              <button type="button" class="unit-toggle-btn">평</button>`
          : `<span class="area-display" data-area-raw="${escapeHtml(item.area || "-")}" data-area-unit="m2" data-area-type="${escapeHtml(item.type || "")}">${formatCardAreaByUnit(item.area || "-", "m2", item.type || "")}</span>
              <button type="button" class="unit-toggle-btn">평</button>`;

        return `
          <article class="card" data-id="${item.id}">
            <div class="card-inner-row">
              <div class="thumb" style="background-image:url('${thumb}')"></div>

              <div class="card-body">
                <div class="card-top-line">
                  <div class="card-badge-row">
                    <span class="card-badge">${typeText}</span>
                    <span class="card-badge deal" data-type="${dealLabel}">${dealLabel}</span>
                  </div>
                  <span class="card-date">${escapeHtml(dateText)}</span>
                </div>

                <div class="card-title">${titleText}</div>

                <div class="card-address">${addressText}</div>

                <div class="card-price-line">
                  <span class="card-price">${priceText}</span>
                </div>

                <div class="card-spec">
                  ${cardAreaHtml}
                </div>

                <div class="card-agent-row">
                  <div class="card-agent-left">
                    <div class="card-agent-avatar">
                      ${item.agentImage ? `<img src="${escapeHtml(item.agentImage)}" alt="agent">` : agentInitial}
                    </div>
                    <div>
                      <span class="card-agent-name">${agentName}</span>
                      <span class="card-agent-title">${agentTitle}</span>
                      <div class="card-agent-office">${officeName}</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join("");

      document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", async function (e) {
          if (e.target.closest("a, button")) return;

          const item = data.find(v => v.id === Number(card.dataset.id));
          if (!item) return;

          if (detailScroll) detailScroll.scrollTop = 0;
          await openDetailPanel(item);
          if (detailScroll) detailScroll.scrollTop = 0;
          updateMarkerSelection(item.id);
          await focusProperty(item.id);
        updateMarkerSelection(item.id);
        });
      });
    }

    function syncFeatureButtons() {
      const isAll = state.selectedFeatures.size === 0;

      featureButtons.forEach(btn => {
        const value = btn.dataset.value;

        if (value === "all") {
          btn.classList.toggle("all-active", isAll);
          btn.classList.remove("active");
        } else {
          btn.classList.toggle("active", state.selectedFeatures.has(value));
          btn.classList.remove("all-active");
        }
      });
    }

    function applyFilter() {
      const keyword = keywordInput.value.trim().toLowerCase();
      const dealValue = selectedDeal;
      const typeValue = selectedType;

      state.filtered = state.all.filter(item => {
        const text = [
          item.title ?? "",
          item.listingNo ?? "",
          item.region ?? "",
          item.address ?? "",
          item.desc ?? "",
          item.type ?? "",
          item.agentName ?? "",
          item.agentOffice ?? "",
          item.date ?? "",
          item.dateLabel ?? "",
          ...(item.features ?? [])
        ].join(" ").toLowerCase();

        const okKeyword = !keyword || text.includes(keyword);
        const okDeal = dealValue === "all" || item.dealType === dealValue;

        const itemType = (item.type ?? "").trim();

        const okType =
          typeValue === "all" ||
          (typeValue === "단독" && ["단독", "단독주택"].includes(itemType)) ||
          (typeValue === "다가구" && ["다가구", "다세대", "다가구ㆍ다세대", "다세대주택"].includes(itemType)) ||
          (typeValue === "원룸" && ["원룸", "투룸", "원룸ㆍ투룸"].includes(itemType)) ||
          (typeValue === "아파트" && ["아파트", "빌라", "아파트ㆍ빌라"].includes(itemType)) ||
          (typeValue === "상가" && ["상가", "사무실", "공장", "상가ㆍ사무실"].includes(itemType)) ||
          (typeValue === "토지" && ["토지", "임야", "토지ㆍ임야"].includes(itemType));

        const okFeature =
          state.selectedFeatures.size === 0 ||
          [...state.selectedFeatures].every(feature =>
            Array.isArray(item.features) && item.features.includes(feature)
          );

        return okKeyword && okDeal && okType && okFeature;
      });

      state.selectedMarkerId = null;
      state.selectedClusterKey = null;
      renderList(state.filtered);
      renderMarkers(state.filtered);
      setResultInfo(`총 ${state.filtered.length}건`);
      setListInfo(`총 ${state.filtered.length}개 매물`);
    }

    function initEvents() {
      keywordInput.addEventListener("input", applyFilter);


      propertyList.addEventListener("click", function (e) {
        const toggleBtn = e.target.closest(".unit-toggle-btn");
        if (!toggleBtn) return;

        e.preventDefault();
        e.stopPropagation();

        const spec = toggleBtn.closest(".card-spec");
        const areaDisplay = spec ? spec.querySelector(".area-display") : null;
        if (!areaDisplay) return;

        const raw = areaDisplay.dataset.areaRaw || areaDisplay.textContent || "-";
        const areaType = areaDisplay.dataset.areaType || "";
        const currentUnit = areaDisplay.dataset.areaUnit || "m2";
        const nextUnit = currentUnit === "m2" ? "py" : "m2";

        areaDisplay.dataset.areaUnit = nextUnit;
        areaDisplay.innerHTML = formatCardAreaByUnit(raw, nextUnit, areaType);
        toggleBtn.textContent = nextUnit === "m2" ? "평" : "㎡";
      });

      if (detailAreaToggleBtn) {
        detailAreaToggleBtn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();

          const currentUnit = detailAreaValue.dataset.areaUnit || "m2";
          const nextUnit = currentUnit === "m2" ? "py" : "m2";

          detailAreaValue.dataset.areaUnit = nextUnit;
          detailAreaToggleBtn.textContent = nextUnit === "m2" ? "평" : "㎡";

          if (currentDetailItem) {
            syncDetailAreaDisplay(currentDetailItem);
          }
        });
      }

      if (detailAreaTypeToggleBtn) {
        detailAreaTypeToggleBtn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();

          if (!currentDetailItem) return;

          const typeText = currentDetailItem.type || "";

          if (isDetachedHouseType(typeText)) {
            detailAreaMode = detailAreaMode === "land" ? "total" : "land";
            syncDetailAreaDisplay(currentDetailItem);
            return;
          }

          if (isApartmentType(typeText) || /오피스텔/.test(typeText)) {
            detailAreaMode = detailAreaMode === "supply" ? "private" : "supply";
            syncDetailAreaDisplay(currentDetailItem);
          }
        });
      }

      
      detailCloseBtn.addEventListener("click", closeDetailPanel);

      function openShareMenu() {
        if (!detailShareMenu) return;
        detailShareMenu.style.display = "flex";
        detailShareMenu.classList.add("open");
      }

      function closeShareMenu() {
        if (!detailShareMenu) return;
        detailShareMenu.classList.remove("open");
        detailShareMenu.style.display = "none";
      }

      function toggleShareMenu() {
        if (!detailShareMenu) return;
        const isOpen = detailShareMenu.style.display === "flex" || detailShareMenu.classList.contains("open");
        if (isOpen) {
          closeShareMenu();
        } else {
          openShareMenu();
        }
      }

      if (detailShareBtn) {
        detailShareBtn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          toggleShareMenu();
        });
      }

      if (detailCopyLinkBtn) {
        detailCopyLinkBtn.addEventListener("click", async (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (!currentDetailItem) return;
          const url = currentDetailItem.link && currentDetailItem.link !== "#" ? currentDetailItem.link : location.href;

          try {
            await navigator.clipboard.writeText(url);
            detailShareBtn.innerHTML = "복사";
            closeShareMenu();
            setTimeout(() => {
              detailShareBtn.innerHTML = '<i class="fa-solid fa-arrow-up-from-bracket"></i>';
            }, 1000);
          } catch (err) {
            console.error(err);
          }
        });
      }

      if (detailShareKakaoBtn) {
        detailShareKakaoBtn.addEventListener("click", async (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (!currentDetailItem) return;
          const url = currentDetailItem.link && currentDetailItem.link !== "#" ? currentDetailItem.link : location.href;
          const shareTitle = currentDetailItem.title || "제주 프리미엄 부동산";

          try {
            if (navigator.share) {
              await navigator.share({
                title: shareTitle,
                text: shareTitle,
                url
              });
              closeShareMenu();
              return;
            }

            await navigator.clipboard.writeText(url);
            detailShareBtn.innerHTML = "복사";
            closeShareMenu();
            setTimeout(() => {
              detailShareBtn.innerHTML = '<i class="fa-solid fa-arrow-up-from-bracket"></i>';
            }, 1000);
          } catch (err) {
            console.error(err);
          }
        });
      }

      document.addEventListener("click", (e) => {
        if (!detailShareMenu) return;
        if (e.target.closest("#detailShareBtn") || e.target.closest("#detailShareMenu")) return;
        closeShareMenu();
      });

      detailHeroPrevBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        prevHeroSlide();
      });

      detailHeroNextBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        nextHeroSlide();
      });

      detailHeroDots.addEventListener("click", (e) => {
        const btn = e.target.closest(".detail-hero-dot");
        if (!btn) return;
        const index = Number(btn.dataset.index);
        setHeroSlide(index);
      });

      detailHeroExpandBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        openDetailImageLightbox();
      });

      detailImageLightboxPrev.addEventListener("click", (e) => {
        e.stopPropagation();
        prevLightboxImage();
      });

      detailImageLightboxNext.addEventListener("click", (e) => {
        e.stopPropagation();
        nextLightboxImage();
      });

      detailImageLightboxClose.addEventListener("click", closeDetailImageLightbox);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeDetailImageLightbox();
          return;
        }

        if (detailImageLightbox.classList.contains("open")) {
          if (e.key === "ArrowLeft") prevLightboxImage();
          if (e.key === "ArrowRight") nextLightboxImage();
          return;
        }

        if (sidebar.classList.contains("expanded")) {
          if (e.key === "ArrowLeft") prevHeroSlide();
          if (e.key === "ArrowRight") nextHeroSlide();
        }
      });

      dealButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          dealButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          selectedDeal = btn.dataset.value;
          applyFilter();
        });
      });

      typeButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          typeButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          selectedType = btn.dataset.value;
          applyFilter();
        });
      });

      featureButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          const value = btn.dataset.value;

          state.selectedFeatures.clear();

          if (value !== "all") {
            state.selectedFeatures.add(value);
          }

          syncFeatureButtons();
          applyFilter();
        });
      });

      window.addEventListener("resize", () => {
        if (!state.map) return;
        state.map.relayout();
      });
    }


    function getDetailShareUrl() {
      if (currentDetailItem && currentDetailItem.link && currentDetailItem.link !== "#") {
        try {
          return new URL(currentDetailItem.link, location.href).href;
        } catch (err) {
          return currentDetailItem.link;
        }
      }
      return location.href;
    }

    function getDetailShareTitle() {
      return currentDetailItem && currentDetailItem.title
        ? currentDetailItem.title
        : "제주 프리미엄 부동산";
    }

    async function copyTextWithFallback(textToCopy) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(textToCopy);
          return true;
        }
      } catch (err) {
        console.error("clipboard api 실패:", err);
      }

      try {
        const textarea = document.createElement("textarea");
        textarea.value = textToCopy;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.top = "-9999px";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        textarea.setSelectionRange(0, textarea.value.length);

        const ok = document.execCommand("copy");
        document.body.removeChild(textarea);
        return !!ok;
      } catch (err) {
        console.error("execCommand 복사 실패:", err);
        return false;
      }
    }

    function showShareCopiedFeedback(success) {
      if (!detailShareBtn) return;
      detailShareBtn.innerHTML = success ? "복사됨" : "실패";
      setTimeout(() => {
        detailShareBtn.innerHTML = '<i class="fa-solid fa-arrow-up-from-bracket"></i>';
      }, 1200);
    }

    function openShareMenu() {
      if (!detailShareMenu) return;
      detailShareMenu.style.display = "flex";
      detailShareMenu.classList.add("open");
    }

    function closeShareMenu() {
      if (!detailShareMenu) return;
      detailShareMenu.style.display = "none";
      detailShareMenu.classList.remove("open");
    }

    window.toggleDetailShareMenu = function (event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      if (!detailShareMenu) return;
      const isOpen = detailShareMenu.style.display === "flex" || detailShareMenu.classList.contains("open");
      if (isOpen) {
        closeShareMenu();
      } else {
        openShareMenu();
      }
    };

    window.copyDetailLink = async function (event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      const ok = await copyTextWithFallback(getDetailShareUrl());
      showShareCopiedFeedback(ok);
      closeShareMenu();
    };

    window.shareDetailToKakao = async function (event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      try {
        if (navigator.share) {
          await navigator.share({
            title: getDetailShareTitle(),
            text: getDetailShareTitle(),
            url: getDetailShareUrl()
          });
          closeShareMenu();
          return;
        }
      } catch (err) {
        console.error("공유 실패:", err);
      }

      const ok = await copyTextWithFallback(getDetailShareUrl());
      showShareCopiedFeedback(ok);
      closeShareMenu();
    };

    document.addEventListener("click", function (e) {
      if (!detailShareMenu) return;
      if (e.target.closest("#detailShareBtn") || e.target.closest("#detailShareMenu")) return;
      closeShareMenu();
    });

    if (detailShareMenu) {
      detailShareMenu.style.display = "none";
    }


    function bootstrap() {
      if (!window.kakao || !window.kakao.maps) {
        alert("카카오맵 SDK가 로드되지 않았습니다. appkey를 확인하세요.");
        return;
      }

      updateSidebarWidth();
      initMap();
      initRoadview();
      initEvents();
      loadProperties();
      syncFeatureButtons();
    }

    bootstrap();
  </script>
</body>
</html>
