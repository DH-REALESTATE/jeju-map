<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>제주 프리미엄 부동산 지도 Ver 1.112</title>
<meta property="og:title" content="제주 프리미엄 부동산 지도 Ver 1.112" />

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b7db2d3c35122f3ec33c88ea6d3195fb&libraries=clusterer"></script>

<style>
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; }

/* 🔥 공통 컬러 */
:root {
  --brand-green: #17B26A;
}

/* 레이아웃 */
.container { display:flex; height:100vh; }
.left { width:420px; overflow:auto; border-right:1px solid #eee; }
.right { flex:1; position:relative; }
#map { width:100%; height:100%; }

/* 버튼 */
button {
  border-radius:20px;
  border:1px solid #ddd;
  padding:6px 12px;
  background:#fff;
  cursor:pointer;
}
button.active {
  background: var(--brand-green);
  color:#fff;
  border-color: var(--brand-green);
}

/* 카드 */
.card {
  padding:16px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.card.active { background:#f5f5f5; }

/* 면적 */
.card-spec {
  display:flex;
  gap:6px;
  align-items:center;
}
.area-toggle-btn {
  font-size:12px;
  padding:2px 6px;
}
</style>
</head>

<body>

<div class="container">
  <div class="left" id="list"></div>
  <div class="right">
    <div id="map"></div>
  </div>
</div>

<script>

// 샘플 데이터
const items = [
  {
    title:"환상적인 경관, 아늑한 펜션",
    lat:33.250,
    lng:126.560,
    land:125.5,
    floor:129.8
  },
  {
    title:"제주 바다뷰 단독주택",
    lat:33.260,
    lng:126.570,
    land:100,
    floor:80
  }
];

let map = new kakao.maps.Map(document.getElementById('map'), {
  center: new kakao.maps.LatLng(33.25,126.56),
  level:7
});

let markers = [];
let selectedIndex = null;

/* 🔥 마커 생성 */
function createMarker(item, idx) {
  const size = 44;

  const isSelected = idx === selectedIndex;

  const bgColor = isSelected ? "#fff" : "#17B26A";
  const textColor = isSelected ? "#17B26A" : "#fff";

  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">
    <circle cx="22" cy="22" r="20"
      fill="${bgColor}"
      stroke="#17B26A"
      stroke-width="1"/>
    <text x="22" y="28"
      text-anchor="middle"
      font-size="16"
      font-weight="900"
      fill="${textColor}">
      ${idx+1}
    </text>
  </svg>
  `;

  return new kakao.maps.Marker({
    position: new kakao.maps.LatLng(item.lat, item.lng),
    image: new kakao.maps.MarkerImage(
      "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
      new kakao.maps.Size(size, size)
    )
  });
}

/* 🔥 렌더 */
function render() {

  markers.forEach(m=>m.setMap(null));
  markers = [];

  items.forEach((item,idx)=>{
    const marker = createMarker(item, idx);
    marker.setMap(map);

    kakao.maps.event.addListener(marker, 'click', ()=>{
      selectedIndex = idx;
      render();
      renderList();
    });

    markers.push(marker);
  });
}

/* 🔥 리스트 */
function renderList() {

  const list = document.getElementById('list');
  list.innerHTML = '';

  items.forEach((item,idx)=>{

    const div = document.createElement('div');
    div.className = 'card' + (idx===selectedIndex?' active':'');

    div.innerHTML = `
      <div><b>${item.title}</b></div>
      <div class="card-spec">
        (대지) ${item.land}평 / (연) ${item.floor}평
        <button class="area-toggle-btn">평</button>
      </div>
    `;

    div.onclick = ()=>{
      selectedIndex = idx;
      render();
      renderList();
    };

    list.appendChild(div);
  });
}

render();
renderList();

</script>

</body>
</html>
