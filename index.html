<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>제주도 부동산 지도 Ver 1.010</title>

<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_APP_KEY&libraries=clusterer"></script>

<style>
body { margin:0; font-family:sans-serif; }

#wrap { display:flex; height:100vh; }

#sidebar {
  width:320px;
  overflow-y:auto;
  border-right:1px solid #eee;
}

#mapWrap {
  flex:1;
  position:relative;
}

#map {
  width:100%;
  height:100%;
}

.card {
  padding:14px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.card:hover { background:#f9fafb; }

.search-btn {
  position:absolute;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;

  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:20px;
  padding:10px 18px;
  font-weight:700;
  display:none;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="wrap">

  <div id="sidebar">
    <div id="propertyList"></div>
  </div>

  <div id="mapWrap">
    <div id="map"></div>
    <button id="searchBtn" class="search-btn">이 지역에서 재검색</button>
  </div>

</div>

<script>

const state = {
  map:null,
  clusterer:null,
  markers:[],
  all:[],
  filtered:[],
  selectedMarkerId:null,
  selectedCluster:null
};

/* =======================
   마커 디자인
======================= */
function createMarkerImage(item, isSelected=false){

  const bg = isSelected ? "#2563eb" : "rgba(255,255,255,0.92)";
  const color = isSelected ? "#fff" : "#2563eb";
  const scale = isSelected ? 1.15 : 1;

  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52">
    <g transform="scale(${scale}) translate(${(1-scale)*26}, ${(1-scale)*26})">
      <rect x="0.5" y="0.5" width="51" height="51" rx="14"
        fill="${bg}"/>
      <text x="26" y="32"
        text-anchor="middle"
        font-size="16"
        font-weight="900"
        fill="${color}">1</text>
    </g>
  </svg>`;

  return new kakao.maps.MarkerImage(
    "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
    new kakao.maps.Size(52,52),
    { offset:new kakao.maps.Point(26,26) }
  );
}

/* =======================
   마커 선택
======================= */
function updateMarkerSelection(id){
  state.selectedMarkerId = id;

  state.markers.forEach(marker=>{
    const item = marker.__property;
    marker.setImage(createMarkerImage(item, item.id===id));
  });
}

/* =======================
   지도 초기화
======================= */
function initMap(){

  state.map = new kakao.maps.Map(document.getElementById("map"),{
    center:new kakao.maps.LatLng(33.38,126.55),
    level:9
  });

  state.clusterer = new kakao.maps.MarkerClusterer({
    map:state.map,
    averageCenter:true,
    minLevel:3,
    disableClickZoom:true,
    styles:[{
      width:"52px",
      height:"52px",
      background:"rgba(255,255,255,0.92)",
      borderRadius:"14px",
      color:"#2563eb",
      lineHeight:"52px",
      textAlign:"center",
      fontWeight:"900"
    }]
  });

  /* 지도 이동 감지 */
  kakao.maps.event.addListener(state.map,"dragend",()=>{
    searchBtn.style.display="block";
  });

  kakao.maps.event.addListener(state.map,"zoom_changed",()=>{
    searchBtn.style.display="block";
  });

  /* 지도 클릭 초기화 */
  kakao.maps.event.addListener(state.map,"click",()=>{
    renderList(state.filtered);
    updateMarkerSelection(null);

    if(state.selectedCluster){
      const el = state.selectedCluster._clusterMarker.getElement();
      if(el){
        el.style.background="rgba(255,255,255,0.92)";
        el.style.color="#2563eb";
      }
      state.selectedCluster=null;
    }
  });

  /* 클러스터 클릭 */
  kakao.maps.event.addListener(state.clusterer,"clusterclick",(cluster)=>{

    const items = cluster.getMarkers().map(m=>m.__property);

    renderList(items);

    openDetail(items[0]);

    updateMarkerSelection(null);

    setTimeout(()=>{
      if(state.selectedCluster){
        const prev = state.selectedCluster._clusterMarker.getElement();
        if(prev){
          prev.style.background="rgba(255,255,255,0.92)";
          prev.style.color="#2563eb";
        }
      }

      const el = cluster._clusterMarker.getElement();
      if(el){
        el.style.background="#2563eb";
        el.style.color="#fff";
      }

      state.selectedCluster = cluster;
    },0);

  });

}

/* =======================
   영역 필터
======================= */
function filterByBounds(){
  const bounds = state.map.getBounds();

  const visible = state.all.filter(item=>{
    const pos = new kakao.maps.LatLng(item.lat,item.lng);
    return bounds.contain(pos);
  });

  state.filtered = visible;

  renderList(visible);
  renderMarkers(visible);

  searchBtn.style.display="none";
}

/* =======================
   마커 렌더
======================= */
function renderMarkers(data){

  state.clusterer.clear();
  state.markers.forEach(m=>m.setMap(null));
  state.markers=[];

  const markers=[];

  data.forEach(item=>{

    const marker = new kakao.maps.Marker({
      position:new kakao.maps.LatLng(item.lat,item.lng),
      image:createMarkerImage(item),
      clickable:true
    });

    marker.__property=item;

    kakao.maps.event.addListener(marker,"click",()=>{

      renderList([item]);

      if(state.selectedCluster){
        const el = state.selectedCluster._clusterMarker.getElement();
        if(el){
          el.style.background="rgba(255,255,255,0.92)";
          el.style.color="#2563eb";
        }
        state.selectedCluster=null;
      }

      updateMarkerSelection(item.id);
      openDetail(item);
    });

    markers.push(marker);
    state.markers.push(marker);

  });

  state.clusterer.addMarkers(markers);
}

/* =======================
   리스트
======================= */
function renderList(data){
  propertyList.innerHTML = data.map(item=>`
    <div class="card" onclick="focusItem(${item.id})">
      <div>${item.title}</div>
      <div>${item.price}</div>
    </div>
  `).join("");
}

/* =======================
   상세 (간단)
======================= */
function openDetail(item){
  console.log("상세:",item.title);
}

/* =======================
   리스트 클릭
======================= */
function focusItem(id){
  const item = state.all.find(v=>v.id===id);
  if(!item) return;

  updateMarkerSelection(id);
  openDetail(item);
}

/* =======================
   데이터 로드
======================= */
async function load(){
  const res = await fetch("./properties.json");
  state.all = await res.json();
  state.filtered = state.all;

  renderList(state.filtered);
  renderMarkers(state.filtered);
}

/* =======================
   이벤트
======================= */
searchBtn.onclick = filterByBounds;

/* 시작 */
initMap();
load();

</script>

</body>
</html>
