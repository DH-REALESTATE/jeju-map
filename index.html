<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제주 프리미엄 부동산 지도</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    :root {
      --sidebar-list-width: 360px;
      --detail-panel-width: 420px;
      --sidebar-current-width: var(--sidebar-list-width);

      /* 🔥 변경 */
      --resizer-hit-width: 0px;

      --brand: #14b8a6;
      --bg: #f4f7fb;
      --line: #e7edf3;
      --text: #17212b;
      --shadow: 0 12px 30px rgba(15, 41, 66, 0.12);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body { overflow: hidden; }

    .app {
      position: relative;
      display: grid;
      grid-template-columns: var(--sidebar-current-width) 1fr;
      height: 100vh;
    }

    .sidebar {
      height: 100vh;
      overflow: hidden;
      background: #f7f8fa;
      border-right: 1px solid #e6ebf0;
    }

    .sidebar-inner {
      display: grid;
      grid-template-columns: var(--sidebar-list-width) 0px;
      height: 100%;
      transition: grid-template-columns 0.28s ease;
    }

    .sidebar.expanded .sidebar-inner {
      grid-template-columns: var(--sidebar-list-width) var(--detail-panel-width);
    }

    .sidebar-list-panel {
      height: 100%;
      overflow-y: auto;
    }

    /* 🔥 핵심 변경 */
    .sidebar-detail-panel {
      height: 100%;
      overflow: hidden;
      opacity: 0;
      background: #fff;
      border-left: 0; /* 경계 제거 */
      transition: opacity 0.22s ease;
    }

    .sidebar.expanded .sidebar-detail-panel {
      opacity: 1;
    }

    .detail-close-btn {
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: 18px;
    }

    /* 🔥 resizer 제거 */
    .resizer {
      display: none;
    }

    .map-wrap {
      height: 100vh;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div class="app">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">

        <div class="sidebar-list-panel">
          <div>제주도 부동산 지도 Ver 1.002</div>
          <div id="propertyList"></div>
        </div>

        <div class="sidebar-detail-panel">
          <button class="detail-close-btn" id="detailCloseBtn">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <div id="detailContent"></div>
        </div>

      </div>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
    </main>

  </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b7db2d3c35122f3ec33c88ea6d3195fb"></script>

  <script>
    const state = {
      map: null
    };

    function initMap() {
      state.map = new kakao.maps.Map(document.getElementById("map"), {
        center: new kakao.maps.LatLng(33.38, 126.55),
        level: 9
      });
    }

    function bootstrap() {
      initMap();
      // 🔥 initResizer 제거됨
    }

    bootstrap();
  </script>

</body>
</html>
