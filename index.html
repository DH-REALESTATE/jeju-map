<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>제주도 부동산 지도 Ver 1.008</title>

<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=b7db2d3c35122f3ec33c88ea6d3195fb&libraries=clusterer"></script>

<style>
body { margin:0; font-family:sans-serif; }

#wrap { display:flex; height:100vh; }

#sidebar {
  width:340px;
  overflow-y:auto;
  border-right:1px solid #eee;
}

.card {
  padding:14px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.card:hover { background:#f8fafc; }

#map { flex:1; height:100%; }
</style>
</head>

<body>

<div id="wrap">
  <div id="sidebar">
    <div id="propertyList"></div>
  </div>
  <div id="map"></div>
</div>

<script>

const state = {
  map:null,
  clusterer:null,
  markers:[],
  all:[],
  filtered:[],
  selectedMarkerId:null,
  selectedCluster:null
};

/* =======================
   마커 디자인 (프리미엄)
======================= */
function createMarkerImage(item, selected=false){

  const bg = selected ? "#2563eb" : "rgba(255,255,255,0.92)";
  const color = selected ? "#fff" : "#2563eb";
  const scale = selected ? 1.15 : 1;

  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52">
    <g transform="scale(${scale}) translate(${(1-scale)*26}, ${(1-scale)*26})">
      <rect x="0.5" y="0.5" width="51" height="51" rx="14"
        fill="${bg}"/>
      <text x="26" y="32"
        text-anchor="middle"
        font-size="16"
        font-weight="900"
        fill="${color}">1</text>
    </g>
  </svg>`;

  return new kakao.maps.MarkerImage(
    "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
    new kakao.maps.Size(52,52),
    { offset:new kakao.maps.Point(26,26) }
  );
}

/* =======================
   마커 선택
======================= */
function updateMarkerSelection(id){
  state.selectedMarkerId = id;

  state.markers.forEach(marker=>{
    const item = marker.__property;
    marker.setImage(createMarkerImage(item, item.id===id));
  });
}

/* =======================
   지도 초기화
======================= */
function initMap(){

  state.map = new kakao.maps.Map(document.getElementById("map"),{
    center:new kakao.maps.LatLng(33.38,126.55),
    level:9
  });

  state.clusterer = new kakao.maps.MarkerClusterer({
    map:state.map,
    averageCenter:true,
    minLevel:3,
    disableClickZoom:true,
    styles:[{
      width:"52px",
      height:"52px",
      background:"rgba(255,255,255,0.92)",
      borderRadius:"14px",
      color:"#2563eb",
      lineHeight:"52px",
      textAlign:"center",
      fontWeight:"900"
    }]
  });

  /* 클러스터 클릭 */
  kakao.maps.event.addListener(state.clusterer,"clusterclick",(cluster)=>{

    const items = cluster.getMarkers().map(m=>m.__property);

    renderList(items);

    // 첫 매물 강조
    if(items[0]){
      highlightCard(items[0].id);
    }

    updateMarkerSelection(null);

    setTimeout(()=>{
      if(state.selectedCluster){
        const prev = state.selectedCluster._clusterMarker.getElement();
        if(prev){
          prev.style.background="rgba(255,255,255,0.92)";
          prev.style.color="#2563eb";
        }
      }

      const el = cluster._clusterMarker.getElement();
      if(el){
        el.style.background="#2563eb";
        el.style.color="#fff";
      }

      state.selectedCluster = cluster;
    },0);
  });

}

/* =======================
   마커 렌더
======================= */
function renderMarkers(data){

  state.clusterer.clear();
  state.markers.forEach(m=>m.setMap(null));
  state.markers=[];

  const markers=[];

  data.forEach(item=>{

    const marker = new kakao.maps.Marker({
      position:new kakao.maps.LatLng(item.lat,item.lng),
      image:createMarkerImage(item),
      clickable:true
    });

    marker.__property=item;

    /* 클릭 */
    kakao.maps.event.addListener(marker,"click",()=>{

      renderList([item]);

      if(state.selectedCluster){
        const el = state.selectedCluster._clusterMarker.getElement();
        if(el){
          el.style.background="rgba(255,255,255,0.92)";
          el.style.color="#2563eb";
        }
        state.selectedCluster=null;
      }

      updateMarkerSelection(item.id);
    });

    /* hover */
    kakao.maps.event.addListener(marker,"mouseover",()=>{
      marker.setImage(createMarkerImage(item,true));
    });

    kakao.maps.event.addListener(marker,"mouseout",()=>{
      const selected = state.selectedMarkerId===item.id;
      marker.setImage(createMarkerImage(item,selected));
    });

    markers.push(marker);
    state.markers.push(marker);

  });

  state.clusterer.addMarkers(markers);
}

/* =======================
   리스트
======================= */
function renderList(data){
  propertyList.innerHTML = data.map(item=>`
    <div class="card" onclick="focusItem(${item.id})">
      <div>${item.title}</div>
      <div>${item.price}</div>
    </div>
  `).join("");
}

/* =======================
   리스트 클릭
======================= */
function focusItem(id){
  const item = state.all.find(v=>v.id===id);
  if(!item) return;

  updateMarkerSelection(id);
}

/* =======================
   데이터
======================= */
async function load(){
  const res = await fetch("./properties.json");
  const data = await res.json();

  state.all = data;
  state.filtered = data;

  renderList(data);
  renderMarkers(data);
}

/* 시작 */
initMap();
load();

</script>

</body>
</html>
