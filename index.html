<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제주도 부동산 매물 지도 - Kakao Map</title>

  <style>
    :root {
      --sidebar-width: 320px;
      --resizer-hit-width: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f5f7fa;
      color: #222;
    }

    body {
      overflow: hidden;
    }

    .app {
      position: relative;
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      height: 100vh;
      gap: 0;
    }

    .sidebar {
      background: #0f2942;
      color: #fff;
      padding: 20px;
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      min-width: 260px;
      border-right: none !important;
      box-shadow: none !important;
    }

    /* 안 보이지만 드래그는 되는 영역 */
    .resizer {
      position: absolute;
      top: 0;
      left: calc(var(--sidebar-width) - (var(--resizer-hit-width) / 2));
      width: var(--resizer-hit-width);
      height: 100vh;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      outline: none !important;
      opacity: 0 !important;
      cursor: col-resize;
      user-select: none;
      z-index: 999;
    }

    .resizer:hover,
    .resizer:active,
    .resizer:focus {
      background: transparent !important;
      box-shadow: none !important;
      outline: none !important;
      opacity: 0 !important;
    }

    .map-wrap {
      position: relative;
      min-width: 0;
      height: 100vh;
      overflow: hidden;
      border-left: none !important;
      box-shadow: none !important;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .sidebar h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.3;
    }

    .sidebar p {
      margin: 0 0 20px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255,255,255,0.85);
    }

    .search-box {
      margin-bottom: 16px;
    }

    .search-box input {
      width: 100%;
      margin-bottom: 10px;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    .filter-title {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.82);
      margin: 8px 0 8px;
    }

    .feature-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
      margin-bottom: 10px;
    }

    .feature-buttons button {
      border: none;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #eef3f7;
      color: #203040;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      white-space: nowrap;
    }

    .feature-buttons button.active,
    .feature-buttons button.all-active {
      background: #18c1a3;
      color: #fff;
    }

    .property-list {
      display: grid;
      gap: 12px;
      padding-bottom: 20px;
    }

    .card {
      background: #fff;
      color: #222;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
    }

    .premium-card {
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(15, 41, 66, 0.10);
      border: 1px solid rgba(0,0,0,0.04);
      background: #fff;
    }

    .card:hover,
    .card.active,
    .premium-card:hover,
    .premium-card.active {
      border-color: #18c1a3;
      box-shadow: 0 14px 28px rgba(15, 41, 66, 0.14);
      transform: translateY(-2px);
    }

    .thumb {
      height: 160px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .card-top-badges {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .deal-badge {
      background: rgba(15, 41, 66, 0.88);
      color: #fff;
    }

    .hot-badge {
      background: #ff5a5f;
      color: #fff;
    }

    .card-body {
      padding: 14px;
    }

    .card-header-row {
      margin-bottom: 8px;
    }

    .title {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.45;
      color: #182533;
      margin: 0;
    }

    .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .price {
      font-size: 22px;
      font-weight: 900;
      color: #0d7b68;
      letter-spacing: -0.3px;
      margin: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .meta span {
      background: #eef3f7;
      color: #4c6275;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 6px 10px;
    }

    .meta-main {
      margin-bottom: 10px;
    }

    .meta-main span {
      background: #f2f5f8;
      color: #425466;
      border: 1px solid #e7edf3;
    }

    .feature-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .feature-chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: #ecfbf6;
      color: #0d7b68;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid #d7f3ea;
    }

    .feature-badge {
      background: #e7fbf5 !important;
      color: #0d7b68 !important;
    }

    .address-row {
      margin-bottom: 12px;
      padding-top: 2px;
    }

    .address-text {
      display: block;
      font-size: 13px;
      line-height: 1.5;
      color: #667788;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .desc {
      font-size: 13px;
      line-height: 1.6;
      color: #5c6c7c;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .premium-actions {
      margin-top: 0;
    }

    .btn {
      flex: 1;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      min-height: 42px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-map {
      background: #0f2942;
      color: #fff;
    }

    .btn-call {
      background: #f3f6f9;
      color: #203040;
    }

    .map-filter-bar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(255,255,255,0.95);
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      backdrop-filter: blur(6px);
      max-width: calc(100% - 20px);
    }

    .deal-buttons,
    .type-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .deal-buttons button,
    .type-buttons button {
      border: none;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #eef3f7;
      color: #203040;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .deal-buttons button.active,
    .type-buttons button.active {
      background: #18c1a3;
      color: #fff;
    }

    .custom-overlay {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
      width: 290px;
      max-width: 290px;
      padding: 16px;
      border: 1px solid rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
    }

    .custom-overlay .close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 50%;
      background: #eef3f7;
      cursor: pointer;
      font-size: 14px;
    }

    .custom-overlay h3 {
      margin: 0 28px 8px 0;
      font-size: 16px;
      line-height: 1.4;
      color: #122033;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .custom-overlay .overlay-price {
      font-size: 14px;
      font-weight: 900;
      color: #0d7b68;
      margin-bottom: 8px;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .custom-overlay p {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
      color: #5c6c7c;
      word-break: keep-all;
      overflow-wrap: break-word;
      white-space: normal;
      max-width: 100%;
    }

    .area-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .area-toggle-btn {
      border: 0;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
      background: #eef3f7;
      color: #203040;
      cursor: pointer;
      line-height: 1.2;
    }

    .overlay-features {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
      max-width: 100%;
    }

    .overlay-features span {
      background: #e7fbf5;
      color: #0d7b68;
      font-size: 11px;
      font-weight: 700;
      border-radius: 999px;
      padding: 5px 8px;
      max-width: 100%;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .custom-overlay .overlay-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .custom-overlay .overlay-btn {
      flex: 1;
      text-decoration: none;
      text-align: center;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      cursor: pointer;
    }

    .overlay-primary {
      background: #0f2942;
      color: #fff;
    }

    .overlay-secondary {
      background: #eef3f7;
      color: #203040;
    }

    @media (max-width: 980px) {
      :root {
        --sidebar-width: 100%;
        --resizer-hit-width: 0px;
      }

      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        height: auto;
      }

      .resizer {
        display: none;
      }

      .sidebar {
        height: auto;
        overflow: visible;
        min-width: 0;
      }

      .map-wrap,
      #map {
        height: 70vh;
        min-height: 500px;
      }

      .map-filter-bar {
        max-width: calc(100% - 20px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>제주도 부동산<br>카카오맵 매물 지도</h1>
      <p>왼쪽 카드에서 지도보기를 누르거나 카드를 클릭하면 오른쪽 카카오맵으로 바로 이동합니다.</p>

      <div class="search-box">
        <input type="text" id="keyword" placeholder="지역명, 주소, 키워드 검색">

        <div class="filter-title">특징 태그</div>
        <div class="feature-buttons" id="featureButtons">
          <button type="button" data-value="all" class="all-active">전체</button>
          <button type="button" data-value="신축">신축</button>
          <button type="button" data-value="오션뷰">오션뷰</button>
          <button type="button" data-value="생활권">생활권</button>
          <button type="button" data-value="투자용">투자용</button>
          <button type="button" data-value="급매">급매</button>
        </div>
      </div>

      <div class="property-list" id="propertyList"></div>
    </aside>

    <div class="resizer" id="resizer" aria-label="패널 크기 조절"></div>

    <main class="map-wrap">
      <div id="map"></div>

      <div class="map-filter-bar">
        <div class="deal-buttons" id="dealButtons">
          <button type="button" data-value="all" class="active">전체</button>
          <button type="button" data-value="매매">매매</button>
          <button type="button" data-value="전세">전세</button>
          <button type="button" data-value="월세">월세</button>
          <button type="button" data-value="년세">년세</button>
        </div>

        <div class="type-buttons" id="typeButtons">
          <button type="button" data-value="all" class="active">전체</button>
          <button type="button" data-value="단독">단독주택</button>
          <button type="button" data-value="다가구">다가구ㆍ다세대</button>
          <button type="button" data-value="원룸">원룸ㆍ투룸</button>
          <button type="button" data-value="아파트">아파트ㆍ빌라</button>
          <button type="button" data-value="상가">상가ㆍ사무실</button>
          <button type="button" data-value="토지">토지ㆍ임야</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b7db2d3c35122f3ec33c88ea6d3195fb"></script>

  <script>
    const state = {
      map: null,
      markers: [],
      overlays: [],
      activeOverlay: null,
      all: [],
      filtered: [],
      selectedFeatures: new Set()
    };

    let roadview = null;
    let roadviewClient = null;
    let roadviewOverlay = null;
    let selectedDeal = "all";
    let selectedType = "all";
    let isResizing = false;

    const propertyList = document.getElementById("propertyList");
    const keywordInput = document.getElementById("keyword");
    const dealButtons = document.querySelectorAll("#dealButtons button");
    const typeButtons = document.querySelectorAll("#typeButtons button");
    const featureButtons = document.querySelectorAll("#featureButtons button");
    const resizer = document.getElementById("resizer");

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeProperty(item, index) {
      return {
        id: item.id ?? index + 1,
        title: item.title ?? "제목 없음",
        dealType: item.dealFilter ?? item.dealType ?? "매매",
        type: item.typeFilter ?? item.type ?? "",
        features: Array.isArray(item.features) ? item.features : [],
        price: item.price ?? "-",
        area: item.area ?? "-",
        address: item.address ?? "-",
        region: item.region ?? "",
        desc: item.desc ?? "",
        lat: Number(item.lat),
        lng: Number(item.lng),
        phone: item.phone ?? "",
        image: item.image ?? "",
        link: item.link ?? "#"
      };
    }

    function parseAreaInfo(areaText) {
      const match = String(areaText || "").match(/[\d,.]+/);
      if (!match) return null;

      const sqm = parseFloat(match[0].replace(/,/g, ""));
      if (isNaN(sqm)) return null;

      return {
        original: areaText,
        pyeongText: `${(sqm / 3.3058).toFixed(1)}평`
      };
    }

    async function loadProperties() {
      try {
        const res = await fetch("./properties.json");
        if (!res.ok) throw new Error("properties.json 불러오기 실패");

        const data = await res.json();
        state.all = data
          .map(normalizeProperty)
          .filter(item => Number.isFinite(item.lat) && Number.isFinite(item.lng));

        applyFilter();
      } catch (err) {
        console.error("매물 데이터 불러오기 실패:", err);
        propertyList.innerHTML = `
          <div class="card" style="padding:18px; cursor:default;">
            <div class="card-body" style="padding:0;">
              <h3 class="title" style="margin-bottom:6px;">매물 데이터를 불러오지 못했습니다</h3>
              <div class="desc">properties.json 파일 경로와 형식을 확인해 주세요.</div>
            </div>
          </div>
        `;
      }
    }

    function getMarkerColor(dealType, type) {
      if (["토지", "임야", "토지ㆍ임야"].includes(type)) return "#22c55e";
      if (dealType === "월세" || dealType === "년세") return "#f97316";
      if (dealType === "전세") return "#8b5cf6";
      return "#0ea5e9";
    }

    function createMarkerImage(item) {
      const color = getMarkerColor(item.dealType, item.type);
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="48" viewBox="0 0 36 48">
          <path d="M18 0C8.06 0 0 8.06 0 18c0 12.95 18 30 18 30s18-17.05 18-30C36 8.06 27.94 0 18 0z" fill="${color}"/>
          <circle cx="18" cy="18" r="8" fill="white"/>
        </svg>
      `;
      return new kakao.maps.MarkerImage(
        "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
        new kakao.maps.Size(36, 48),
        { offset: new kakao.maps.Point(18, 48) }
      );
    }

    function hideRoadview() {
      if (roadviewOverlay) roadviewOverlay.style.display = "none";
    }

    function initMap() {
      const mapContainer = document.getElementById("map");
      const mapOption = {
        center: new kakao.maps.LatLng(33.38, 126.55),
        level: 9
      };

      state.map = new kakao.maps.Map(mapContainer, mapOption);
      state.map.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);

      const mapTypeControl = new kakao.maps.MapTypeControl();
      state.map.addControl(mapTypeControl, kakao.maps.ControlPosition.TOPRIGHT);

      const zoomControl = new kakao.maps.ZoomControl();
      state.map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

      kakao.maps.event.addListener(state.map, "click", function () {
        closeOverlay();
        hideRoadview();
      });
    }

    function initRoadview() {
      roadviewClient = new kakao.maps.RoadviewClient();

      const roadviewContainer = document.createElement("div");
      roadviewContainer.id = "roadviewPanel";
      roadviewContainer.style.cssText = `
        position:absolute;
        top:70px;
        right:15px;
        width:min(480px, calc(100% - 20px));
        height:min(360px, calc(100vh - 80px));
        z-index:50;
        background:#fff;
        border-radius:12px;
        overflow:hidden;
        box-shadow:0 10px 30px rgba(0,0,0,0.18);
        display:none;
      `;

      const closeBtn = document.createElement("button");
      closeBtn.type = "button";
      closeBtn.textContent = "✕";
      closeBtn.style.cssText = `
        position:absolute;
        top:8px;
        right:8px;
        z-index:2;
        width:30px;
        height:30px;
        border:none;
        border-radius:50%;
        background:rgba(255,255,255,0.92);
        cursor:pointer;
        font-size:14px;
        font-weight:700;
      `;

      const inner = document.createElement("div");
      inner.id = "roadviewInner";
      inner.style.cssText = "width:100%; height:100%;";

      closeBtn.addEventListener("click", () => {
        roadviewContainer.style.display = "none";
      });

      roadviewContainer.appendChild(closeBtn);
      roadviewContainer.appendChild(inner);
      document.querySelector(".map-wrap").appendChild(roadviewContainer);

      roadview = new kakao.maps.Roadview(inner);
      roadviewOverlay = roadviewContainer;
    }

    function showRoadview(lat, lng) {
      if (!roadviewClient || !roadviewOverlay || !roadview) {
        alert("로드뷰가 초기화되지 않았습니다.");
        return;
      }

      const position = new kakao.maps.LatLng(lat, lng);

      roadviewClient.getNearestPanoId(position, 100, function (panoId) {
        if (!panoId) {
          alert("이 위치 주변에는 로드뷰가 없습니다.");
          return;
        }

        roadviewOverlay.style.display = "block";
        roadview.setPanoId(panoId, position);
      });
    }

    function closeOverlay() {
      if (state.activeOverlay) {
        state.activeOverlay.setMap(null);
        state.activeOverlay = null;
      }
    }

    function clearMapObjects() {
      state.markers.forEach(marker => marker.setMap(null));
      state.overlays.forEach(item => item.overlay.setMap(null));
      state.markers = [];
      state.overlays = [];
      state.activeOverlay = null;
    }

    function createOverlayContent(item) {
      const wrap = document.createElement("div");
      const featuresHtml = (item.features || [])
        .map(feature => `<span>${escapeHtml(feature)}</span>`)
        .join("");
      const areaInfo = parseAreaInfo(item.area);

      wrap.innerHTML = `
        <div class="custom-overlay">
          <button class="close" type="button">✕</button>
          <h3>${escapeHtml(item.title)}</h3>
          <div class="overlay-price">${escapeHtml(item.dealType)} · ${escapeHtml(item.price)}</div>
          <p>
            ${escapeHtml(item.address)}<br>
            <span class="area-row">
              <span class="area-text">${escapeHtml(item.area)}</span>
              <button class="area-toggle-btn" type="button" data-mode="sqm">평으로</button>
            </span><br>
            ${escapeHtml(item.desc)}
          </p>
          ${featuresHtml ? `<div class="overlay-features">${featuresHtml}</div>` : ""}
          <div class="overlay-actions">
            <button class="overlay-btn overlay-primary btn-detail" type="button">상세보기</button>
            <button class="overlay-btn overlay-secondary btn-roadview" type="button" data-lat="${item.lat}" data-lng="${item.lng}">로드뷰</button>
          </div>
        </div>
      `;

      const contentNode = wrap.firstElementChild;
      const detailBtn = contentNode.querySelector(".btn-detail");
      const roadBtn = contentNode.querySelector(".btn-roadview");
      const areaBtn = contentNode.querySelector(".area-toggle-btn");
      const areaTextEl = contentNode.querySelector(".area-text");

      ["click","mousedown","mouseup","touchstart","touchend","pointerdown","pointerup"]
        .forEach(eventName => {
          contentNode.addEventListener(eventName, function (e) {
            e.stopPropagation();
          });
        });

      if (detailBtn) {
        detailBtn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();

          const link = item.link;
          if (link && link !== "#") {
            window.open(link, "_blank", "noopener,noreferrer");
          } else {
            alert("상세페이지 링크가 없습니다.");
          }
        });
      }

      if (roadBtn) {
        roadBtn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          showRoadview(parseFloat(this.dataset.lat), parseFloat(this.dataset.lng));
        });
      }

      if (areaBtn && areaTextEl && areaInfo) {
        areaBtn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();

          if (this.dataset.mode === "sqm") {
            areaTextEl.textContent = areaInfo.pyeongText;
            this.textContent = "㎡로";
            this.dataset.mode = "pyeong";
          } else {
            areaTextEl.textContent = areaInfo.original;
            this.textContent = "평으로";
            this.dataset.mode = "sqm";
          }
        });
      }

      return contentNode;
    }

    function highlightCard(id) {
      document.querySelectorAll(".card").forEach(card => {
        card.classList.toggle("active", Number(card.dataset.id) === id);
      });
    }

    function openOverlayById(id) {
      const found = state.overlays.find(v => v.id === id);
      if (!found) return;

      closeOverlay();
      found.overlay.setMap(state.map);
      state.activeOverlay = found.overlay;
    }

    function moveMapToProperty(item, zoomLevel = 4) {
      if (!item || !state.map) return;
      const position = new kakao.maps.LatLng(item.lat, item.lng);
      state.map.setLevel(zoomLevel);
      state.map.setCenter(position);
      state.map.relayout();
    }

    function renderMarkers(data) {
      clearMapObjects();
      if (!data.length) return;

      const bounds = new kakao.maps.LatLngBounds();

      data.forEach(item => {
        const position = new kakao.maps.LatLng(item.lat, item.lng);

        const marker = new kakao.maps.Marker({
          map: state.map,
          position,
          image: createMarkerImage(item),
          clickable: true
        });

        const contentNode = createOverlayContent(item);

        const overlay = new kakao.maps.CustomOverlay({
          position,
          content: contentNode,
          yAnchor: 1.15
        });

        const closeBtn = contentNode.querySelector(".close");
        closeBtn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          overlay.setMap(null);
          if (state.activeOverlay === overlay) state.activeOverlay = null;
        });

        kakao.maps.event.addListener(marker, "click", function () {
          hideRoadview();
          highlightCard(item.id);
          moveMapToProperty(item, 4);

          setTimeout(() => {
            closeOverlay();
            overlay.setMap(state.map);
            state.activeOverlay = overlay;
          }, 80);
        });

        state.markers.push(marker);
        state.overlays.push({ id: item.id, overlay });
        bounds.extend(position);
      });

      if (data.length === 1) {
        moveMapToProperty(data[0], 4);
      } else {
        state.map.setBounds(bounds);
      }
    }

    function focusProperty(id) {
      const item = state.filtered.find(v => v.id === id);
      if (!item || !state.map) return;

      hideRoadview();
      highlightCard(id);
      moveMapToProperty(item, 4);

      setTimeout(() => {
        openOverlayById(id);
      }, 80);
    }

    function renderList(data) {
      if (!data.length) {
        propertyList.innerHTML = `
          <div class="card" style="padding:18px; cursor:default;">
            <div class="card-body" style="padding:0;">
              <h3 class="title" style="margin-bottom:6px;">표시할 매물이 없습니다</h3>
              <div class="desc">검색 조건을 바꿔보세요.</div>
            </div>
          </div>
        `;
        return;
      }

      propertyList.innerHTML = data.map(item => {
        const hotBadge = item.features && item.features.includes("급매")
          ? `<span class="badge hot-badge">HOT</span>`
          : "";

        const featureHtml = (item.features || [])
          .slice(0, 4)
          .map(feature => `<span class="feature-chip">${escapeHtml(feature)}</span>`)
          .join("");

        return `
          <article class="card premium-card" data-id="${item.id}">
            <div class="thumb" style="background-image:url('${escapeHtml(item.image)}')">
              <div class="card-top-badges">
                <span class="badge deal-badge">${escapeHtml(item.dealType)}</span>
                ${hotBadge}
              </div>
            </div>

            <div class="card-body">
              <div class="card-header-row">
                <h3 class="title">${escapeHtml(item.title)}</h3>
              </div>

              <div class="price-row">
                <div class="price">${escapeHtml(item.price)}</div>
              </div>

              <div class="meta meta-main">
                <span>${escapeHtml(item.type || "-")}</span>
                <span>${escapeHtml(item.region || "-")}</span>
                <span>${escapeHtml(item.area)}</span>
              </div>

              ${featureHtml ? `<div class="feature-chip-row">${featureHtml}</div>` : ""}

              <div class="address-row">
                <span class="address-text">${escapeHtml(item.address)}</span>
              </div>

              <div class="actions premium-actions">
                <button class="btn btn-map" data-id="${item.id}" type="button">지도보기</button>
                <a class="btn btn-call" href="tel:${String(item.phone || "").replace(/[^0-9]/g, "")}">
                  ${escapeHtml(item.phone || "문의")}
                </a>
              </div>
            </div>
          </article>
        `;
      }).join("");

      document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", function (e) {
          if (e.target.closest("a, button")) return;
          focusProperty(Number(card.dataset.id));
        });
      });

      document.querySelectorAll(".btn-map").forEach(btn => {
        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          focusProperty(Number(btn.dataset.id));
        });
      });
    }

    function syncFeatureButtons() {
      const isAll = state.selectedFeatures.size === 0;

      featureButtons.forEach(btn => {
        const value = btn.dataset.value;

        if (value === "all") {
          btn.classList.toggle("all-active", isAll);
          btn.classList.remove("active");
        } else {
          btn.classList.toggle("active", state.selectedFeatures.has(value));
          btn.classList.remove("all-active");
        }
      });
    }

    function applyFilter() {
      const keyword = keywordInput.value.trim().toLowerCase();
      const dealValue = selectedDeal;
      const typeValue = selectedType;

      state.filtered = state.all.filter(item => {
        const text = [
          item.title ?? "",
          item.region ?? "",
          item.address ?? "",
          item.desc ?? "",
          item.type ?? "",
          ...(item.features ?? [])
        ].join(" ").toLowerCase();

        const okKeyword = !keyword || text.includes(keyword);
        const okDeal = dealValue === "all" || item.dealType === dealValue;

        const itemType = (item.type ?? "").trim();

        const okType =
          typeValue === "all" ||
          (typeValue === "단독" && ["단독", "단독주택"].includes(itemType)) ||
          (typeValue === "다가구" && ["다가구", "다세대", "다가구ㆍ다세대", "다세대주택"].includes(itemType)) ||
          (typeValue === "원룸" && ["원룸", "투룸", "원룸ㆍ투룸"].includes(itemType)) ||
          (typeValue === "아파트" && ["아파트", "빌라", "아파트ㆍ빌라"].includes(itemType)) ||
          (typeValue === "상가" && ["상가", "사무실", "공장", "상가ㆍ사무실"].includes(itemType)) ||
          (typeValue === "토지" && ["토지", "임야", "토지ㆍ임야"].includes(itemType));

        const okFeature =
          state.selectedFeatures.size === 0 ||
          [...state.selectedFeatures].every(feature =>
            Array.isArray(item.features) && item.features.includes(feature)
          );

        return okKeyword && okDeal && okType && okFeature;
      });

      renderList(state.filtered);
      renderMarkers(state.filtered);
    }

    function initEvents() {
      keywordInput.addEventListener("input", applyFilter);

      dealButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          dealButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          selectedDeal = btn.dataset.value;
          applyFilter();
        });
      });

      typeButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          typeButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          selectedType = btn.dataset.value;
          applyFilter();
        });
      });

      featureButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          const value = btn.dataset.value;

          if (value === "all") {
            state.selectedFeatures.clear();
          } else {
            if (state.selectedFeatures.has(value)) {
              state.selectedFeatures.delete(value);
            } else {
              state.selectedFeatures.add(value);
            }
          }

          syncFeatureButtons();
          applyFilter();
        });
      });
    }

    function initResizer() {
      if (!resizer) return;

      resizer.addEventListener("mousedown", (e) => {
        if (window.innerWidth <= 980) return;
        e.preventDefault();
        isResizing = true;
        document.body.style.cursor = "col-resize";
        document.body.style.userSelect = "none";
      });

      window.addEventListener("mousemove", (e) => {
        if (!isResizing) return;

        const min = 260;
        const max = 700;
        const nextWidth = Math.min(Math.max(e.clientX, min), max);
        document.documentElement.style.setProperty("--sidebar-width", `${nextWidth}px`);
      });

      window.addEventListener("mouseup", () => {
        if (!isResizing) return;
        isResizing = false;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      });
    }

    function bootstrap() {
      if (!window.kakao || !window.kakao.maps) {
        alert("카카오맵 SDK가 로드되지 않았습니다. appkey를 확인하세요.");
        return;
      }

      initMap();
      initRoadview();
      initEvents();
      initResizer();
      loadProperties();
      syncFeatureButtons();
    }

    bootstrap();
  </script>
</body>
</html>
