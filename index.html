<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제주 프리미엄 부동산 지도 Ver 1.057</title>
<meta property="og:title" content="제주 프리미엄 부동산 지도 Ver 1.057" />
  <meta property="og:description" content="제주도 부동산 지도 서비스" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://your-domain.example/" />
  <meta property="og:image" content="https://your-domain.example/og-image.jpg" />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --sidebar-list-width: 360px;
      --detail-panel-width: 420px;
      --sidebar-current-width: var(--sidebar-list-width);
      --brand: #14b8a6;
      --bg: #f4f7fb;
      --line: #e7edf3;
      --text: #17212b;
      --shadow: 0 12px 30px rgba(15, 41, 66, 0.12);
      --font-ui: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    * {
      box-sizing: border-box;
      font-family: var(--font-ui);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body { overflow: hidden; }

    .app {
      position: relative;
      display: grid;
      grid-template-columns: var(--sidebar-current-width) 1fr;
      height: 100vh;
      gap: 0;
    }

    .sidebar {
      height: 100vh;
      overflow: hidden;
      background: #f7f8fa;
      color: #1f2a36;
      min-width: 280px;
      border-right: 1px solid #e6ebf0;
    }

    .sidebar-inner {
      display: grid;
      grid-template-columns: var(--sidebar-list-width) 0px;
      height: 100%;
      transition: grid-template-columns 0.28s ease;
    }

    .sidebar.expanded .sidebar-inner {
      grid-template-columns: var(--sidebar-list-width) var(--detail-panel-width);
    }

    .sidebar-list-panel {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      background: #f7f8fa;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .sidebar-list-panel::-webkit-scrollbar { display: none; }

    .sidebar-detail-panel {
      height: 100%;
      overflow: hidden;
      opacity: 0;
      background: #fff;
      border-left: 1px solid #e6ebf0;
      transition: opacity 0.22s ease;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .sidebar-detail-panel::-webkit-scrollbar { display: none; }

    .sidebar.expanded .sidebar-detail-panel { opacity: 1; }

    .detail-panel-inner {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    .detail-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #eef2f6;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(8px);
    }

    .detail-close-btn,
    .detail-icon-btn {
      border: 0;
      background: transparent;
      color: #223244;
      cursor: pointer;
      border-radius: 10px;
      height: 36px;
      min-width: 36px;
      padding: 0 10px;
      font-weight: 900;
      font-size: 18px;
    }

    .detail-top-actions {
      display: flex;
      gap: 6px;
    }

    .detail-scroll {
      flex: 1;
      overflow-y: auto;
      background: #fff;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .detail-scroll::-webkit-scrollbar { display: none; }

    .detail-hero {
      height: 312px;
      background: #dbe6ef center / cover no-repeat;
      position: relative;
      overflow: hidden;
    }

    .detail-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.06) 0%,
        rgba(0,0,0,0.14) 30%,
        rgba(0,0,0,0.62) 100%
      );
      pointer-events: none;
      z-index: 1;
    }

    .detail-hero-slides {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .detail-hero-slide {
      position: absolute;
      inset: 0;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .detail-hero-slide.active {
      opacity: 1;
    }

    .detail-hero-expand,
    .detail-hero-nav {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 10px;
      background: rgba(0,0,0,0.42);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(6px);
      z-index: 3;
    }

    .detail-hero-expand {
      top: 12px;
      right: 12px;
      font-size: 16px;
      font-weight: 900;
    }

    .detail-hero-nav {
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      font-weight: 900;
    }

    .detail-hero-nav.prev {
      left: 12px;
    }

    .detail-hero-nav.next {
      right: 12px;
    }

    .detail-hero-dots {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 3;
    }

    .detail-hero-dot {
      width: 8px;
      height: 8px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.42);
      cursor: pointer;
      padding: 0;
      transition: width 0.2s ease, background 0.2s ease;
    }

    .detail-hero-dot.active {
      width: 20px;
      background: rgba(255,255,255,0.98);
    }

    .detail-hero-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: -0.2px;
      color: #fff;
    }

    .detail-hero-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      padding: 18px 18px 38px;
      color: #fff;
    }

    .detail-hero-price-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .detail-hero-deal {
      font-size: 16px;
      font-weight: 900;
      color: #8bd2ff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.25);
      letter-spacing: -0.2px;
      line-height: 1.1;
    }

    .detail-hero-price {
      font-size: 28px;
      font-weight: 900;
      line-height: 1.04;
      letter-spacing: -1px;
      text-shadow: 0 3px 14px rgba(0,0,0,0.32);
    }

    .detail-hero-address {
      font-size: 13px;
      line-height: 1.45;
      color: rgba(255,255,255,0.94);
      text-shadow: 0 1px 6px rgba(0,0,0,0.2);
    }

    .detail-hero-features {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .detail-hero-features span {
      display: inline-flex;
      align-items: center;
      height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: -0.2px;
    }

    .detail-hero-features span.highlight {
      background: rgba(37,99,235,0.88);
      border-color: rgba(37,99,235,0.92);
      box-shadow: 0 4px 12px rgba(37,99,235,0.25);
    }

    .detail-content {
      padding: 18px;
    }

    .detail-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }

    .detail-title-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-listing-no {
      display: block;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -0.2px;
      color: #6b7280;
      background: none;
      padding: 0;
      border-radius: 0;
      box-shadow: none;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .detail-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      color: #1d2733;
      letter-spacing: -0.4px;
      line-height: 1.45;
    }

    .detail-inline-price,
    .detail-inline-address,
    .detail-type-badge,
    .detail-features {
      display: none;
    }

    .detail-meta-grid {
      display: grid;
      grid-template-columns: minmax(120px, 1.15fr) minmax(100px, 0.95fr) minmax(100px, 0.95fr);
      gap: 0;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid #eceff3;
      margin-bottom: 16px;
      background: #fff;
    }

    .detail-meta-item {
      padding: 14px 12px;
      border-right: 1px solid #eceff3;
      min-width: 0;
    }

    .detail-meta-item:last-child {
      border-right: 0;
    }

    .detail-meta-label {
      display: block;
      font-size: 12px;
      color: #7a8794;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .detail-meta-value {
      display: block;
      font-size: 16px;
      color: #1f6fff;
      font-weight: 900;
      letter-spacing: -0.3px;
    }

    .detail-area-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 4px;
      flex-wrap: nowrap;
      white-space: nowrap;
      min-width: 0;
      width: max-content;
    }

    #detailAreaValue {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      min-width: 0;
      flex: 0 0 auto;
      width: auto;
      margin: 0;
    }

    .detail-desc {
      margin-bottom: 16px;
      font-size: 14px;
      color: #334355;
      line-height: 1.6;
      white-space: pre-line;
      background: linear-gradient(180deg, #ffffff, #fafcff);
      border: 1px solid #eceff3;
      border-radius: 16px;
      padding: 16px 18px;
    }

    .detail-section-title {
      display: none;
    }

    .detail-info-sections {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 6px;
      margin-bottom: 16px;
    }

    .detail-info-section {
      background: linear-gradient(180deg, #ffffff, #fbfdff);
      border: 1px solid #e8eef5;
      border-radius: 18px;
      padding: 18px 18px 16px;
      box-shadow: 0 6px 18px rgba(15, 41, 66, 0.04);
    }

    .detail-info-section-title {
      font-size: 16px;
      font-weight: 900;
      color: #111827;
      margin-bottom: 14px;
      letter-spacing: -0.35px;
      padding-left: 0;
      margin-left: 0;
      line-height: 1.3;
    }

    .detail-info-list {
      margin-bottom: 0;
      background: transparent;
      border: 0;
    }

    .detail-info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 11px 0;
      border-bottom: 1px solid #f1f4f8;
    }

    .detail-info-row:last-child {
      border-bottom: 0;
      padding-bottom: 2px;
    }

    .detail-info-label {
      min-width: 90px;
      font-size: 12px;
      font-weight: 800;
      color: #7a8794;
      text-align: left;
      line-height: 1.3;
      letter-spacing: -0.15px;
    }

    .detail-info-value {
      flex: 1;
      font-size: 14px;
      font-weight: 800;
      color: #1f2a36;
      text-align: right;
      line-height: 1.35;
      white-space: normal;
      word-break: keep-all;
      letter-spacing: -0.2px;
      min-width: 0;
    }

    .detail-agent-card {
      border-radius: 18px;
      border: 1px solid #e9eef4;
      background: linear-gradient(180deg, #ffffff, #fafcff);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 6px 18px rgba(15, 41, 66, 0.04);
    }

    .detail-agent-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .detail-agent-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #eef3f7;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4d5d6d;
      font-weight: 900;
      font-size: 13px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid #e5ebf1;
    }

    .detail-agent-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-agent-main {
      flex: 1;
      min-width: 0;
    }

    .detail-agent-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .detail-agent-name {
      font-size: 15px;
      font-weight: 900;
      color: #1f2a36;
      line-height: 1.4;
    }

    .detail-agent-title {
      font-size: 14px;
      font-weight: 800;
      color: #5f6b78;
      line-height: 1.4;
    }

    .detail-agent-office {
      font-size: 13px;
      font-weight: 800;
      color: #223244;
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .detail-agent-address {
      font-size: 12px;
      color: #7f8b98;
      line-height: 1.55;
      margin-bottom: 3px;
    }

    .detail-agent-regno {
      font-size: 12px;
      color: #7f8b98;
      line-height: 1.55;
      margin-bottom: 3px;
    }

    .detail-agent-phone-inline {
      font-size: 13px;
      font-weight: 800;
      color: #223244;
      line-height: 1.5;
    }

    .detail-action-box {
      padding: 16px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e7edf3;
    }

    .detail-phone {
      display: none;
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-action-btn {
      flex: 1;
      min-width: 100px;
      min-height: 42px;
      border: 0;
      border-radius: 12px;
      background: #eef3f7;
      color: #203040;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .detail-action-btn.primary {
      background: #0f2942;
      color: #fff;
    }

    .detail-action-btn i {
      margin-right: 6px;
      font-size: 1em;
      line-height: 1;
    }

    .brand-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      height: 58px;
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid #e6ebf0;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-title {
      font-size: 17px;
      font-weight: 900;
      color: #1f2a36;
      white-space: nowrap;
    }

    .panel {
      margin: 0;
      padding: 10px 16px;
      border-radius: 0;
      background: #fff;
      border-bottom: 1px solid #e6ebf0;
    }

    .search-box input {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      border: 1px solid #dfe5eb;
      border-radius: 12px;
      outline: none;
      font-size: 14px;
      background: #fff;
      color: #17212b;
      box-shadow: none;
      margin-bottom: 10px;
    }

    .filter-title {
      margin: 2px 0 8px;
      font-size: 12px;
      font-weight: 800;
      color: #7a8794;
      letter-spacing: 0.1px;
    }

    .feature-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .feature-buttons button,
    .reset-list-btn {
      border: 1px solid #dfe5eb;
      border-radius: 10px;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
      background: #fff;
      color: #304050;
    }

    .feature-buttons button.active,
    .feature-buttons button.all-active {
      background: #f1f7ff;
      color: #1f6fff;
      border-color: #bfd6ff;
      box-shadow: none;
    }

    .reset-list-btn {
      width: 100%;
      margin-top: 0;
      margin-bottom: 10px;
      border-radius: 12px;
      background: #f1f4f8;
    }

    .reset-list-btn:hover {
      background: #e7edf3;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0;
      padding: 14px 16px 10px;
      background: #f7f8fa;
      border-bottom: 1px solid #eceff3;
    }

    .list-head strong {
      font-size: 14px;
      color: #1f6fff;
      letter-spacing: -0.2px;
      font-weight: 900;
    }

    .list-head span {
      font-size: 13px;
      color: #1f2a36;
      font-weight: 800;
    }

    .property-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-bottom: 24px;
      background: #f7f8fa;
    }

    .card {
      background: linear-gradient(180deg, #ffffff 0%, #fcfdff 100%);
      border: 0;
      border-bottom: 1px solid #e9eef4;
      border-radius: 0;
      box-shadow: none;
      cursor: pointer;
      transition: background 0.2s ease;
      padding: 0;
      overflow: hidden;
    }

    .card:hover,
    .card.active {
      background: linear-gradient(180deg, #fafdff 0%, #f5f9ff 100%);
      transform: none;
      box-shadow: none;
      border-color: transparent;
      border-bottom: 1px solid #e9eef4;
    }

    .card-inner-row {
      display: flex;
      gap: 14px;
      padding: 16px 16px 14px;
    }

    .thumb {
      width: 96px;
      min-width: 96px;
      height: 96px;
      border-radius: 12px;
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(15, 41, 66, 0.10);
    }

    .thumb::after { display: none; }

    .card-body {
      flex: 1;
      min-width: 0;
      padding: 0;
    }

    .card-top-line {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 7px;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 7px;
      background: #f3eefe;
      color: #7c4dff;
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      box-shadow: inset 0 0 0 1px rgba(124, 77, 255, 0.06);
    }

    .card-date {
      font-size: 12px;
      color: #9aa7b4;
      white-space: nowrap;
    }

    .card-title {
      font-size: 15px;
      font-weight: 900;
      color: #16202a;
      line-height: 1.38;
      margin-bottom: 5px;
      letter-spacing: -0.25px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: keep-all;
    }

    .card-address {
      font-size: 13px;
      color: #6f7c89;
      line-height: 1.45;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-price-line {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .card-deal {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eef5ff;
      color: #1f6fff;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.15px;
    }

    .card-price {
      font-size: 22px;
      font-weight: 900;
      color: #111827;
      letter-spacing: -0.6px;
      line-height: 1.05;
    }

    .card-spec {
      font-size: 13px;
      color: #667382;
      line-height: 1.5;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .area-toggle-btn {
      margin-left: 2px;
      display: inline-flex;
      vertical-align: middle;

      height: 22px;
      width: 32px;
      min-width: 32px;
      padding: 0;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      background: #fff;
      color: #51606f;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      line-height: 1;

    function updateSidebarWidth() {
      const listWidth = getComputedStyle(document.documentElement).getPropertyValue("--sidebar-list-width").trim() || "360px";
      const detailWidth = getComputedStyle(document.documentElement).getPropertyValue("--detail-panel-width").trim() || "420px";
      const totalWidth = sidebar.classList.contains("expanded")
        ? `calc(${listWidth} + ${detailWidth})`
        : listWidth;
      document.documentElement.style.setProperty("--sidebar-current-width", totalWidth);
    }

    function refreshMapLayout() {
      if (!state.map) return;
      setTimeout(() => {
        state.map.relayout();
      }, 320);
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getRelativeDate(dateString) {
      if (!dateString) return "";
      const now = new Date();
      const target = new Date(dateString);
      if (isNaN(target.getTime())) return "";

      const diffMs = now - target;
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

      if (diffDays <= 0) return "오늘";
      if (diffDays === 1) return "1일 전";
      if (diffDays < 7) return `${diffDays}일 전`;
      if (diffDays < 30) return `${Math.floor(diffDays / 7)}주 전`;
      if (diffDays < 365) return `${Math.floor(diffDays / 30)}개월 전`;
      return `${Math.floor(diffDays / 365)}년 전`;
    }

    function normalizeImageArray(item) {
      if (Array.isArray(item.images) && item.images.length) {
        return item.images.filter(Boolean);
      }
      if (item.image) return [item.image];
      return [];
    }

    function normalizeProperty(item, index) {
      return {
        id: item.id ?? index + 1,
        title: item.title ?? "제목 없음",
        listingNo: item.listingNo ?? "",
        dealType: item.dealFilter ?? item.dealType ?? "매매",
        type: item.typeFilter ?? item.type ?? "",
        features: Array.isArray(item.features) ? item.features : [],
        price: item.price ?? "-",
        markerPrice: item.markerPrice ?? "",
        area: item.area ?? "-",
        address: item.address ?? "-",
        region: item.region ?? "",
        desc: item.desc ?? "",
        lat: Number(item.lat),
        lng: Number(item.lng),
        image: item.image ?? "",
        images: normalizeImageArray(item),
        link: item.link ?? "#",
        agent_folder: item.agent_folder ?? "",
        agentName: "",
        agentTitle: "",
        agentOffice: "",
        agentAddress: "",
        agentRegNo: "",
        agentImage: "",
        phone1: "",
        phone2: "",
        date: item.date ?? "",
        dateLabel: item.dateLabel ?? "",
        desc_folder: item.desc_folder ?? "",
        image_folder: item.image_folder ?? ""
      };
    }

    function formatAreaTwoLines(areaText) {
      if (!areaText) return "-";

      const match = String(areaText).match(/공급\s*([\d.]+)㎡\s*\/\s*전용\s*([\d.]+)㎡/);
      if (!match) return escapeHtml(areaText);

      const supply = match[1];
      const privateArea = match[2];

      return `공급 ${escapeHtml(supply)}㎡<br>전용 ${escapeHtml(privateArea)}㎡`;
    }

    function parseAreaNumbers(areaText) {
      const text = String(areaText || "").trim();
      const matches = [...text.matchAll(/([\d,.]+)\s*㎡/g)].map(match => {
        const value = Number(String(match[1]).replace(/,/g, ""));
        return Number.isFinite(value) ? value : null;
      }).filter(v => v !== null);

      return matches;
    }

    function isApartmentType(typeText) {
      const text = String(typeText || "").trim();
      return /아파트|빌라/.test(text);
    }

    function formatSingleAreaValue(value, unit) {
      if (!Number.isFinite(value)) return "-";
      if (unit === "py") {
        return `${(value / 3.3058).toFixed(1)}평`;
      }
      return `${value.toLocaleString('ko-KR')}㎡`;
    }

    function formatAreaByUnit(areaText, unit, typeText = "") {
      const raw = String(areaText || "-").trim();
      const values = parseAreaNumbers(raw);

      if (isApartmentType(typeText) && values.length >= 2) {
        const privateArea = formatSingleAreaValue(values[1], unit);
        return privateArea;
      }

      if (values.length >= 1) {
        return formatSingleAreaValue(values[0], unit);
      }

      return escapeHtml(raw);
    }

    function setResultInfo(text) {
      if (mapResultCount) mapResultCount.textContent = text;
    }

    function setListInfo(text) {
      if (listInfoText) listInfoText.textContent = text;
    }

    async function loadAgent(agentPath) {
      if (!agentPath) return null;
      if (agentCache[agentPath]) return agentCache[agentPath];

      try {
        const res = await fetch(agentPath, { cache: "no-store" });
        if (!res.ok) throw new Error(`agent.json 불러오기 실패: ${res.status}`);
        const data = await res.json();
        agentCache[agentPath] = data;
        return data;
      } catch (e) {
        console.error("agent 로딩 실패", e);
        return null;
      }
    }

    async function loadProperties() {
      try {
        const res = await fetch("./properties.json");
        if (!res.ok) throw new Error("properties.json 불러오기 실패");

        const data = await res.json();

        const normalized = data
          .map(normalizeProperty)
          .filter(item => Number.isFinite(item.lat) && Number.isFinite(item.lng));

        const enriched = await Promise.all(
          normalized.map(async (item) => {
            const agent = await loadAgent(item.agent_folder);

            return {
              ...item,
              agentName: agent?.agentName ?? "",
              agentTitle: agent?.agentTitle ?? "",
              agentOffice: agent?.agentOffice ?? "",
              agentAddress: agent?.agentAddress ?? "",
              agentRegNo: agent?.agentRegNo ?? "",
              agentImage: agent?.agentImage ?? "",
              phone1: agent?.phone1 ?? "",
              phone2: agent?.phone2 ?? ""
            };
          })
        );

        state.all = enriched;
        applyFilter();
      } catch (err) {
        console.error("매물 데이터 불러오기 실패:", err);
        propertyList.innerHTML = `
          <div class="card" style="padding:18px; cursor:default; border-bottom:0;">
            <div class="card-body" style="padding:0;">
              <h3 style="margin-bottom:6px;">매물 데이터를 불러오지 못했습니다</h3>
              <div>properties.json 파일 경로와 형식을 확인해 주세요.</div>
            </div>
          </div>
        `;
        setResultInfo("총 0건");
        setListInfo("총 0개 매물");
      }
    }

    function getBadgeWidthByText(text) {
      const len = String(text ?? "").length;
      if (len >= 3) return 70;
      if (len === 2) return 58;
      return 46;
    }

    function createMarkerImage(item, isSelected = false, label = "1") {
      const text = String(label ?? "1");
      const boxWidth = getBadgeWidthByText(text);
      const svgWidth = boxWidth + 12;

      const bgColor = isSelected ? "#2563eb" : "rgba(255,255,255,0.82)";
      const textColor = isSelected ? "#ffffff" : "#2563eb";
      const borderColor = isSelected ? "#2563eb" : "rgba(255,255,255,0.55)";

      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${svgWidth}" height="46" viewBox="0 0 ${svgWidth} 46">
          <defs>
            <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
              <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(15,41,66,0.12)"/>
            </filter>
          </defs>
          <g filter="url(#shadow)">
            <rect x="6" y="0.5" width="${boxWidth}" height="45" rx="14" ry="14"
                  fill="${bgColor}"
                  stroke="${borderColor}"
                  stroke-width="1"/>
            <text x="${6 + (boxWidth / 2)}" y="29"
                  text-anchor="middle"
                  font-size="16"
                  font-weight="900"
                  font-family="${UI_FONT_STACK}"
                  fill="${textColor}">${text}</text>
          </g>
        </svg>
      `;

      return new kakao.maps.MarkerImage(
        "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
        new kakao.maps.Size(svgWidth, 46),
        { offset: new kakao.maps.Point(svgWidth / 2, 23) }
      );
    }

    function updateMarkerSelection(selectedId) {
      state.selectedMarkerId = selectedId;
      state.markers.forEach(marker => {
        const item = marker.__property;
        const isSelected = item && item.id === selectedId;
        marker.setImage(createMarkerImage(item, isSelected, "1"));
      });
    }

    function getClusterKeyFromItems(items) {
      return items.map(item => item.id).sort((a, b) => a - b).join(",");
    }

    function getClusterBadgeWidth(count) {
      const len = String(count).length;
      if (len >= 3) return "70px";
      if (len === 2) return "58px";
      return "46px";
    }

    function setClusterBadgeSelected(cluster, isSelected) {
      const clusterMarker = cluster.getClusterMarker ? cluster.getClusterMarker() : null;
      if (!clusterMarker) return;

      const clusterItems = cluster.getMarkers().map(marker => marker.__property).filter(Boolean);
      if (!clusterItems.length) return;

      const count = clusterItems.length;
      const width = getClusterBadgeWidth(count);

      const bg = isSelected ? "#2563eb" : "rgba(255,255,255,0.82)";
      const color = isSelected ? "#ffffff" : "#2563eb";
      const border = isSelected ? "#2563eb" : "rgba(255,255,255,0.55)";

      const el = document.createElement("div");
      el.style.display = "flex";
      el.style.alignItems = "center";
      el.style.justifyContent = "center";
      el.style.minWidth = width;
      el.style.height = "46px";
      el.style.padding = "0 12px";
      el.style.borderRadius = "14px";
      el.style.background = bg;
      el.style.color = color;
      el.style.fontSize = "16px";
      el.style.fontWeight = "900";
      el.style.fontFamily = UI_FONT_STACK;
      el.style.lineHeight = "46px";
      el.style.letterSpacing = "-0.5px";
      el.style.border = `1px solid ${border}`;
      el.style.boxShadow = "0 6px 16px rgba(15,41,66,0.12)";
      el.style.boxSizing = "border-box";
      el.style.whiteSpace = "nowrap";
      el.style.cursor = "pointer";
      el.style.pointerEvents = "auto";
      el.textContent = String(count);

      el.addEventListener("click", async function (e) {
        e.preventDefault();
        e.stopPropagation();
        await handleClusterSelection(cluster);
      });

      clusterMarker.setContent(el);
    }

    function refreshClusterBadges() {
      if (!state.clusterer) return;
      const clusters = state.clusterer.getClusters ? state.clusterer.getClusters() : state.clusterer._clusters;
      if (!clusters || !clusters.length) return;

      clusters.forEach(cluster => {
        if (!cluster || typeof cluster.getClusterMarker !== "function") return;
        const clusterItems = cluster.getMarkers().map(marker => marker.__property).filter(Boolean);
        if (!clusterItems.length) return;

        const key = getClusterKeyFromItems(clusterItems);
        const isSelected = state.selectedClusterKey === key;
        setClusterBadgeSelected(cluster, isSelected);
      });
    }

    async function closeRoadviewPanel() {
      try {
        if (document.fullscreenElement === roadviewOverlay) {
          await document.exitFullscreen();
        }
      } catch (err) {
        console.error("전체화면 해제 실패:", err);
      }

      if (roadviewOverlay) {
        roadviewOverlay.style.display = "none";
      }
    }

    async function hideRoadview() {
      await closeRoadviewPanel();
    }

    function makeAgentInitial(text) {
      const raw = String(text || "담당").trim();
      return raw.length >= 2 ? raw.slice(-2) : raw;
    }

    async function loadJsonFile(path, cacheStore, errorLabel) {
      if (!path) return {};
      if (cacheStore[path]) return cacheStore[path];

      try {
        const res = await fetch(path, { cache: "no-store" });
        if (!res.ok) throw new Error(`${errorLabel} 불러오기 실패: ${res.status}`);
        const data = await res.json();
        cacheStore[path] = data;
        return data;
      } catch (err) {
        console.error(`${errorLabel} 로딩 실패:`, err);
        return {};
      }
    }

    async function loadPropertyInfo(item) {
      return await loadJsonFile(item.desc_folder, infoCache, "info.json");
    }

    async function loadPropertyImages(item) {
      return await loadJsonFile(item.image_folder, imageCache, "image.json");
    }

    async function resolveDetailData(item) {
      const [info, imageData, agent] = await Promise.all([
        loadPropertyInfo(item),
        loadPropertyImages(item),
        loadAgent(item.agent_folder)
      ]);

      const imageList = Array.isArray(imageData.images)
        ? imageData.images.map(v => String(v || "").trim()).filter(Boolean)
        : [];

      const mainImage = String(imageData.image || "").trim()
        || imageList[0]
        || String(item.image || "").trim();

      const mergedImages = imageList.length
        ? imageList
        : (mainImage ? [mainImage] : normalizeImageArray(item));

      return {
        ...item,
        desc: info.desc ?? item.desc ?? "",
        sections: Array.isArray(info.sections) ? info.sections : [],
        infoRows: Array.isArray(info.infoRows) ? info.infoRows : [],
        propertyType: info.propertyType ?? "",
        image: mainImage,
        images: mergedImages,
        agentName: agent?.agentName ?? item.agentName ?? "",
        agentTitle: agent?.agentTitle ?? item.agentTitle ?? "",
        agentOffice: agent?.agentOffice ?? item.agentOffice ?? "",
        agentAddress: agent?.agentAddress ?? item.agentAddress ?? "",
        agentRegNo: agent?.agentRegNo ?? item.agentRegNo ?? "",
        agentImage: agent?.agentImage ?? item.agentImage ?? "",
        phone1: agent?.phone1 ?? item.phone1 ?? "",
        phone2: agent?.phone2 ?? item.phone2 ?? ""
      };
    }

    function renderDetailInfoRows(info) {
      const sections = Array.isArray(info.sections) ? info.sections : [];

      if (sections.length) {
        detailInfoList.innerHTML = `
          <div class="detail-info-sections">
            ${sections.map(section => {
              const rows = Array.isArray(section.rows)
                ? section.rows.filter(row => String(row?.value || "").trim() !== "")
                : [];

              if (!rows.length) return "";

              return `
                <div class="detail-info-section">
                  <div class="detail-info-section-title">${escapeHtml(section.title || "")}</div>
                  <div class="detail-info-list">
                    ${rows.map(row => `
                      <div class="detail-info-row">
                        <div class="detail-info-label">${escapeHtml(row.label || "")}</div>
                        <div class="detail-info-value">${escapeHtml(row.value || "")}</div>
                      </div>
                    `).join("")}
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `;
        return;
      }

      const rows = Array.isArray(info.infoRows)
        ? info.infoRows.filter(row => String(row?.value || "").trim() !== "")
        : [];

      if (!rows.length) {
        detailInfoList.innerHTML = "";
        return;
      }

      detailInfoList.innerHTML = `
        <div class="detail-info-sections">
          <div class="detail-info-section">
            <div class="detail-info-list">
              ${rows.map(row => `
                <div class="detail-info-row">
                  <div class="detail-info-label">${escapeHtml(row.label || "")}</div>
                  <div class="detail-info-value">${escapeHtml(row.value || "")}</div>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function getHeroImages(item) {
      const fallback = item.image ? [item.image] : [];

      if (!Array.isArray(item.images) || !item.images.length) {
        return fallback;
      }

      const cleaned = item.images
        .map(v => String(v || "").trim())
        .filter(Boolean);

      if (!cleaned.length) return fallback;

      return cleaned;
    }

    function renderHeroSlider(images) {
      currentHeroImages = images;
      currentHeroIndex = 0;

      detailHeroSlides.innerHTML = images.map((src, index) => `
        <div class="detail-hero-slide ${index === 0 ? 'active' : ''}" style="background-image:url('${escapeHtml(src)}')"></div>
      `).join("");

      detailHeroDots.innerHTML = images.map((_, index) => `
        <button type="button" class="detail-hero-dot ${index === 0 ? 'active' : ''}" data-index="${index}"></button>
      `).join("");

      detailHeroPrevBtn.style.display = images.length > 1 ? "flex" : "none";
      detailHeroNextBtn.style.display = images.length > 1 ? "flex" : "none";
      detailHeroDots.style.display = images.length > 1 ? "flex" : "none";

      detailHero.style.backgroundImage = images.length ? `url('${escapeHtml(images[0])}')` : "";
    }

    function setHeroSlide(index) {
      if (!currentHeroImages.length) return;
      currentHeroIndex = (index + currentHeroImages.length) % currentHeroImages.length;

      const slides = detailHeroSlides.querySelectorAll(".detail-hero-slide");
      const dots = detailHeroDots.querySelectorAll(".detail-hero-dot");

      slides.forEach((slide, i) => {
        slide.classList.toggle("active", i === currentHeroIndex);
      });

      dots.forEach((dot, i) => {
        dot.classList.toggle("active", i === currentHeroIndex);
      });

      detailHero.style.backgroundImage = `url('${escapeHtml(currentHeroImages[currentHeroIndex])}')`;
    }

    function nextHeroSlide() {
      setHeroSlide(currentHeroIndex + 1);
    }

    function prevHeroSlide() {
      setHeroSlide(currentHeroIndex - 1);
    }

    function openDetailImageLightbox() {
      if (!currentHeroImages.length) return;
      detailImageLightbox.classList.add("open");
      document.body.style.overflow = "hidden";
      updateLightboxImage();
    }

    function closeDetailImageLightbox() {
      detailImageLightbox.classList.remove("open");
      detailImageLightboxImg.src = "";
      document.body.style.overflow = "";
    }

    function updateLightboxImage() {
      if (!currentHeroImages.length) return;

      detailImageLightboxImg.src = currentHeroImages[currentHeroIndex];
      const hasMultiple = currentHeroImages.length > 1;
      detailImageLightboxPrev.style.display = hasMultiple ? "flex" : "flex";
      detailImageLightboxNext.style.display = hasMultiple ? "flex" : "flex";
      detailImageLightboxPrev.style.visibility = hasMultiple ? "visible" : "hidden";
      detailImageLightboxNext.style.visibility = hasMultiple ? "visible" : "hidden";
    }

    function nextLightboxImage() {
      if (!currentHeroImages.length) return;
      setHeroSlide(currentHeroIndex + 1);
      updateLightboxImage();
    }

    function prevLightboxImage() {
      if (!currentHeroImages.length) return;
      setHeroSlide(currentHeroIndex - 1);
      updateLightboxImage();
    }

    async function openDetailPanel(item) {
      sidebar.classList.add("expanded");
      updateSidebarWidth();
      refreshMapLayout();

      const detailItem = await resolveDetailData(item);
      currentDetailItem = detailItem;

      const heroImages = getHeroImages(detailItem);
      renderHeroSlider(heroImages);

      detailListingNo.textContent = detailItem.listingNo ? `매물번호 ${detailItem.listingNo}` : "";
      detailTitle.textContent = detailItem.title || "";
      detailPrice.textContent = `${detailItem.dealType || ""} ${detailItem.price || ""}`.trim();
      detailAddress.textContent = `${detailItem.address || ""}`.trim();

      detailHeroBadge.textContent = detailItem.type || "";
      detailHeroBadge.style.display = detailItem.type ? "inline-flex" : "none";

      detailHeroDeal.textContent = detailItem.dealType || "";
      detailHeroPrice.textContent = detailItem.price || "";
      detailHeroAddress.textContent = `${detailItem.address || ""}`.trim();

      detailHeroFeatures.innerHTML = (detailItem.features || [])
        .map(f => {
          const isHighlight = ["오션뷰", "급매", "핵심입지"].includes(f);
          return `<span class="${isHighlight ? "highlight" : ""}">${escapeHtml(f)}</span>`;
        })
        .join("");

      detailAreaValue.innerHTML = formatAreaByUnit(detailItem.area || "-", "m2", detailItem.type || "");
      detailAreaValue.dataset.areaRaw = detailItem.area || "-";
      detailAreaValue.dataset.areaUnit = "m2";
      detailAreaValue.dataset.areaType = detailItem.type || "";
      if (detailAreaToggleBtn) detailAreaToggleBtn.textContent = "평";
      if (detailAreaLabel) {
        detailAreaLabel.textContent = /아파트|빌라/.test(detailItem.type || "") ? "면적(전용)" : "면적";
      }
      detailTypeValue.textContent = detailItem.type || "-";
      detailRegionValue.textContent = detailItem.region || "-";

      detailDesc.textContent = detailItem.desc || "";
      detailInfoList.innerHTML = "";

      renderDetailInfoRows(detailItem);

      if (detailItem.agentName || detailItem.agentOffice || detailItem.phone1 || detailItem.phone2 || detailItem.agentImage) {
        detailAgentName.textContent = detailItem.agentName || "";
        detailAgentTitle.textContent = detailItem.agentTitle || "";
        detailAgentOffice.textContent = detailItem.agentOffice || "";
        detailAgentAddress.textContent = detailItem.agentAddress || "";
        detailAgentRegNo.textContent = detailItem.agentRegNo || "";

        const phoneText = [detailItem.phone1, detailItem.phone2].filter(Boolean).join(" / ");
        detailAgentPhoneInline.textContent = phoneText || "";

        if (detailItem.agentImage) {
          detailAgentAvatar.innerHTML = `<img src="${escapeHtml(detailItem.agentImage)}" alt="agent">`;
        } else {
          detailAgentAvatar.textContent = makeAgentInitial(detailItem.agentName || "담당");
        }
      } else {
        detailAgentName.textContent = "";
        detailAgentTitle.textContent = "";
        detailAgentOffice.textContent = "";
        detailAgentAddress.textContent = "";
        detailAgentRegNo.textContent = "";
        detailAgentPhoneInline.textContent = "";
        detailAgentAvatar.textContent = "담당";
      }

      detailFeatures.innerHTML = "";

      detailPhone.textContent = "";
      const detailCallNumber = [detailItem.phone1, detailItem.phone2].filter(Boolean)[0] || "";
      detailCallBtn.disabled = !detailCallNumber;
      detailCallBtn.style.opacity = detailCallNumber ? "1" : "0.55";
      detailCallBtn.style.cursor = detailCallNumber ? "pointer" : "default";
      detailCallBtn.onclick = () => {
        if (!detailCallNumber) return;
        location.href = `tel:${detailCallNumber}`;
      };

      detailMapBtn.onclick = async () => {
        await focusProperty(detailItem.id);
      };

      detailRoadviewBtn.onclick = async () => {
        await hideRoadview();
        showRoadview(detailItem.lat, detailItem.lng);
      };
    }

    function closeDetailPanel() {
      sidebar.classList.remove("expanded");
      currentDetailItem = null;
      updateSidebarWidth();
      refreshMapLayout();
    }

    async function handleClusterSelection(cluster) {
      await hideRoadview();

      const clusterItems = cluster.getMarkers().map(marker => marker.__property).filter(Boolean);
      if (!clusterItems.length) return;

      const topItem = clusterItems[0];

      state.selectedMarkerId = null;
      state.selectedClusterKey = getClusterKeyFromItems(clusterItems);

      updateMarkerSelection(null);
      renderList(clusterItems);
      propertyList.scrollTop = 0;

      await openDetailPanel(topItem);
      highlightCard(topItem.id);

      setResultInfo(`선택 지역 ${clusterItems.length}건`);
      setListInfo(`총 ${clusterItems.length}개 매물`);

      setTimeout(() => {
        refreshClusterBadges();
        setClusterBadgeSelected(cluster, true);
      }, 0);
    }

          if (!document.fullscreenElement) {
            await roadviewContainer.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch (err) {
          console.error("전체화면 전환 실패:", err);
        }
      });

      document.addEventListener("fullscreenchange", () => {
        if (!roadviewFullscreenBtn) return;
        roadviewFullscreenBtn.textContent =
          document.fullscreenElement === roadviewOverlay ? "전체화면 해제" : "전체화면";
      });

      roadviewContainer.appendChild(closeBtn);
      roadviewContainer.appendChild(fullscreenBtn);
      roadviewContainer.appendChild(inner);
      document.querySelector(".map-wrap").appendChild(roadviewContainer);

      roadview = new kakao.maps.Roadview(inner);
      roadviewOverlay = roadviewContainer;
      roadviewFullscreenBtn = fullscreenBtn;
    }

    function showRoadview(lat, lng) {
      if (!roadviewClient || !roadviewOverlay || !roadview) {
        alert("로드뷰가 초기화되지 않았습니다.");
        return;
      }

      const position = new kakao.maps.LatLng(lat, lng);

      roadviewClient.getNearestPanoId(position, 100, function (panoId) {
        if (!panoId) {
          alert("이 위치 주변에는 로드뷰가 없습니다.");
          return;
        }

        roadviewOverlay.style.display = "block";
        roadview.setPanoId(panoId, position);
      });
    }

    function clearMapObjects() {
      if (state.clusterer) {
        state.clusterer.clear();
      }

      state.markers.forEach(marker => marker.setMap(null));
      state.markers = [];
    }

    function highlightCard(id) {
      document.querySelectorAll(".card").forEach(card => {
        card.classList.toggle("active", Number(card.dataset.id) === id);
      });
    }

    function moveMapToProperty(item) {
      if (!item || !state.map) return;
      const position = new kakao.maps.LatLng(item.lat, item.lng);
      state.map.setCenter(position);
      state.map.relayout();
    }

    function renderMarkers(data) {
      clearMapObjects();
      if (!data.length) return;

      const bounds = new kakao.maps.LatLngBounds();
      const markerList = [];

      data.forEach(item => {
        const position = new kakao.maps.LatLng(item.lat, item.lng);

        const marker = new kakao.maps.Marker({
          position,
          image: createMarkerImage(item, state.selectedMarkerId === item.id, "1"),
          clickable: true
        });

        marker.__property = item;

        kakao.maps.event.addListener(marker, "click", async function () {
          await hideRoadview();

          state.selectedClusterKey = null;

          renderList([item]);
          propertyList.scrollTop = 0;

          highlightCard(item.id);
          updateMarkerSelection(item.id);
          await openDetailPanel(item);

          setResultInfo("선택 매물 1건");
          setListInfo("총 1개 매물");

          setTimeout(() => {
            refreshClusterBadges();
          }, 0);
        });

        markerList.push(marker);
        state.markers.push(marker);
        bounds.extend(position);
      });

      state.clusterer.addMarkers(markerList);

      setTimeout(() => {
        refreshClusterBadges();
      }, 0);

      if (data.length === 1) {
        state.map.setCenter(new kakao.maps.LatLng(data[0].lat, data[0].lng));
      } else {
        state.map.setBounds(bounds);
      }
    }

    async function focusProperty(id) {
      const item = state.filtered.find(v => v.id === id) || state.all.find(v => v.id === id);
      if (!item || !state.map) return;

      await hideRoadview();

      state.selectedClusterKey = null;

      highlightCard(id);
      updateMarkerSelection(id);
      moveMapToProperty(item);

      setTimeout(() => {
        refreshClusterBadges();
      }, 0);
    }

    function renderList(data) {
      if (!data.length) {
        propertyList.innerHTML = `
          <div class="card" style="padding:18px; cursor:default; border-bottom:0;">
            <div class="card-body" style="padding:0;">
              <h3 style="margin-bottom:6px;">표시할 매물이 없습니다</h3>
              <div>검색 조건을 바꿔보세요.</div>
            </div>
          </div>
        `;
        return;
      }

      propertyList.innerHTML = data.map(item => {
        const thumb = escapeHtml(item.image || "");
        const dealLabel = escapeHtml(item.dealType || "매매");
        const priceText = escapeHtml(item.price || "-");
        const addressText = escapeHtml(item.address || "-");
        const areaText = escapeHtml(item.area || "-");
        const typeText = escapeHtml(item.type || "-");
        const titleText = escapeHtml(item.title || "매물명");
        const dateText = item.dateLabel || (item.date ? getRelativeDate(item.date) : "");

        const agentName = escapeHtml(item.agentName || "담당자");
        const agentTitle = escapeHtml(item.agentTitle || "");
        const officeName = escapeHtml(item.agentOffice || "");
          const agentInitial = makeAgentInitial(item.agentName || "담당자");

        return `
          <article class="card" data-id="${item.id}">
            <div class="card-inner-row">
              <div class="thumb" style="background-image:url('${thumb}')"></div>

              <div class="card-body">
                <div class="card-top-line">
                  <span class="card-badge">${typeText}</span>
                  <span class="card-date">${escapeHtml(dateText)}</span>
                </div>

                <div class="card-title">${titleText}</div>

                <div class="card-address">${addressText}</div>

                <div class="card-price-line">
                  <span class="card-deal">${dealLabel}</span>
                  <span class="card-price">${priceText}</span>
                </div>

                <div class="card-spec">
              <span class="area-display" data-area-raw="${escapeHtml(item.area || "-")}" data-area-unit="m2" data-area-type="${escapeHtml(item.type || "")}">${formatAreaByUnit(item.area || "-", "m2", item.type || "")}</span>
              <button type="button" class="area-toggle-btn">평</button>
            </div>

                <div class="card-agent-row">
                  <div class="card-agent-left">
                    <div class="card-agent-avatar">
                      ${item.agentImage ? `<img src="${escapeHtml(item.agentImage)}" alt="agent">` : agentInitial}
                    </div>
                    <div>
                      <span class="card-agent-name">${agentName}</span>
                      <span class="card-agent-title">${agentTitle}</span>
                      <div class="card-agent-office">${officeName}</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join("");

      document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", async function (e) {
          if (e.target.closest("a, button")) return;

          const item = data.find(v => v.id === Number(card.dataset.id));
          if (!item) return;

          await openDetailPanel(item);
          updateMarkerSelection(item.id);
          await focusProperty(detailItem.id);
        });
      });
    }

    function syncFeatureButtons() {
      const isAll = state.selectedFeatures.size === 0;

      featureButtons.forEach(btn => {
        const value = btn.dataset.value;

        if (value === "all") {
          btn.classList.toggle("all-active", isAll);
          btn.classList.remove("active");
        } else {
          btn.classList.toggle("active", state.selectedFeatures.has(value));
          btn.classList.remove("all-active");
        }
      });
    }

    function applyFilter() {
      const keyword = keywordInput.value.trim().toLowerCase();
      const dealValue = selectedDeal;
      const typeValue = selectedType;

      state.filtered = state.all.filter(item => {
        const text = [
          item.title ?? "",
          item.listingNo ?? "",
          item.region ?? "",
          item.address ?? "",
          item.desc ?? "",
          item.type ?? "",
          item.agentName ?? "",
          item.agentOffice ?? "",
          item.date ?? "",
          item.dateLabel ?? "",
          ...(item.features ?? [])
        ].join(" ").toLowerCase();

        const okKeyword = !keyword || text.includes(keyword);
        const okDeal = dealValue === "all" || item.dealType === dealValue;

        const itemType = (item.type ?? "").trim();

        const okType =
          typeValue === "all" ||
          (typeValue === "단독" && ["단독", "단독주택"].includes(itemType)) ||
          (typeValue === "다가구" && ["다가구", "다세대", "다가구ㆍ다세대", "다세대주택"].includes(itemType)) ||
          (typeValue === "원룸" && ["원룸", "투룸", "원룸ㆍ투룸"].includes(itemType)) ||
          (typeValue === "아파트" && ["아파트", "빌라", "아파트ㆍ빌라"].includes(itemType)) ||
          (typeValue === "상가" && ["상가", "사무실", "공장", "상가ㆍ사무실"].includes(itemType)) ||
          (typeValue === "토지" && ["토지", "임야", "토지ㆍ임야"].includes(itemType));

        const okFeature =
          state.selectedFeatures.size === 0 ||
          [...state.selectedFeatures].every(feature =>
            Array.isArray(item.features) && item.features.includes(feature)
          );

        return okKeyword && okDeal && okType && okFeature;
      });

      state.selectedMarkerId = null;
      state.selectedClusterKey = null;
      renderList(state.filtered);
      renderMarkers(state.filtered);
      setResultInfo(`총 ${state.filtered.length}건`);
      setListInfo(`총 ${state.filtered.length}개 매물`);
    }

    function initEvents() {
      keywordInput.addEventListener("input", applyFilter);


      propertyList.addEventListener("click", function (e) {
        const toggleBtn = e.target.closest(".area-toggle-btn");
        if (!toggleBtn) return;

        e.preventDefault();
        e.stopPropagation();

        const spec = toggleBtn.closest(".card-spec");
        const areaDisplay = spec ? spec.querySelector(".area-display") : null;
        if (!areaDisplay) return;

        const raw = areaDisplay.dataset.areaRaw || areaDisplay.textContent || "-";
        const areaType = areaDisplay.dataset.areaType || "";
        const currentUnit = areaDisplay.dataset.areaUnit || "m2";
        const nextUnit = currentUnit === "m2" ? "py" : "m2";

        areaDisplay.dataset.areaUnit = nextUnit;
        areaDisplay.innerHTML = formatAreaByUnit(raw, nextUnit, areaType);
        toggleBtn.textContent = nextUnit === "m2" ? "평" : "㎡";
      });

      if (detailAreaToggleBtn) {
        detailAreaToggleBtn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();

          const raw = detailAreaValue.dataset.areaRaw || detailAreaValue.textContent || "-";
          const areaType = detailAreaValue.dataset.areaType || "";
          const currentUnit = detailAreaValue.dataset.areaUnit || "m2";
          const nextUnit = currentUnit === "m2" ? "py" : "m2";

          detailAreaValue.dataset.areaUnit = nextUnit;
          detailAreaValue.innerHTML = formatAreaByUnit(raw, nextUnit, areaType);
          detailAreaToggleBtn.textContent = nextUnit === "m2" ? "평" : "㎡";
        });
      }

      if (resetListBtn) {
        resetListBtn.addEventListener("click", () => {
          state.selectedMarkerId = null;
          state.selectedClusterKey = null;
          updateMarkerSelection(null);
          renderList(state.filtered);
          setResultInfo(`총 ${state.filtered.length}건`);
          setListInfo(`총 ${state.filtered.length}개 매물`);

          setTimeout(() => {
            refreshClusterBadges();
          }, 0);
        });
      }

      detailCloseBtn.addEventListener("click", closeDetailPanel);

      detailShareBtn.addEventListener("click", async () => {
        if (!currentDetailItem) return;
        const url = currentDetailItem.link && currentDetailItem.link !== "#" ? currentDetailItem.link : location.href;

        try {
          await navigator.clipboard.writeText(url);
          detailShareBtn.textContent = "복사";
          setTimeout(() => {
            detailShareBtn.textContent = "⤴";
          }, 1000);
        } catch (err) {
          console.error(err);
        }
      });

      detailHeroPrevBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        prevHeroSlide();
      });

      detailHeroNextBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        nextHeroSlide();
      });

      detailHeroDots.addEventListener("click", (e) => {
        const btn = e.target.closest(".detail-hero-dot");
        if (!btn) return;
        const index = Number(btn.dataset.index);
        setHeroSlide(index);
      });

      detailHeroExpandBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        openDetailImageLightbox();
      });

      detailImageLightboxPrev.addEventListener("click", (e) => {
        e.stopPropagation();
        prevLightboxImage();
      });

      detailImageLightboxNext.addEventListener("click", (e) => {
        e.stopPropagation();
        nextLightboxImage();
      });

      detailImageLightboxClose.addEventListener("click", closeDetailImageLightbox);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeDetailImageLightbox();
          return;
        }

        if (detailImageLightbox.classList.contains("open")) {
          if (e.key === "ArrowLeft") prevLightboxImage();
          if (e.key === "ArrowRight") nextLightboxImage();
          return;
        }

        if (sidebar.classList.contains("expanded")) {
          if (e.key === "ArrowLeft") prevHeroSlide();
          if (e.key === "ArrowRight") nextHeroSlide();
        }
      });

      dealButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          dealButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          selectedDeal = btn.dataset.value;
          applyFilter();
        });
      });

      typeButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          typeButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          selectedType = btn.dataset.value;
          applyFilter();
        });
      });

      featureButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          const value = btn.dataset.value;

          if (value === "all") {
            state.selectedFeatures.clear();
          } else if (state.selectedFeatures.has(value)) {
            state.selectedFeatures.delete(value);
          } else {
            state.selectedFeatures.add(value);
          }

          syncFeatureButtons();
          applyFilter();
        });
      });

      window.addEventListener("resize", () => {
        if (!state.map) return;
        state.map.relayout();
      });
    }

    function bootstrap() {
      if (!window.kakao || !window.kakao.maps) {
        alert("카카오맵 SDK가 로드되지 않았습니다. appkey를 확인하세요.");
        return;
      }

      updateSidebarWidth();
      initMap();
      initRoadview();
      initEvents();
      loadProperties();
      syncFeatureButtons();
    }

    bootstrap();
  </script>
</body>
</html>
