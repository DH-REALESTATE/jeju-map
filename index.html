<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제주 프리미엄 부동산 지도</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    :root {
      --sidebar-list-width: 360px;
      --detail-panel-width: 420px;
      --sidebar-current-width: var(--sidebar-list-width);
      --resizer-hit-width: 0px;
      --brand: #14b8a6;
      --bg: #f4f7fb;
      --line: #e7edf3;
      --text: #17212b;
      --shadow: 0 12px 30px rgba(15, 41, 66, 0.12);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body { overflow: hidden; }

    .app {
      position: relative;
      display: grid;
      grid-template-columns: var(--sidebar-current-width) 1fr;
      height: 100vh;
      gap: 0;
    }

    .sidebar {
      height: 100vh;
      overflow: hidden;
      background: #f7f8fa;
      color: #1f2a36;
      min-width: 280px;
      border-right: 1px solid #e6ebf0;
    }

    .sidebar-inner {
      display: grid;
      grid-template-columns: var(--sidebar-list-width) 0px;
      height: 100%;
      transition: grid-template-columns 0.28s ease;
    }

    .sidebar.expanded .sidebar-inner {
      grid-template-columns: var(--sidebar-list-width) var(--detail-panel-width);
    }

    .sidebar-list-panel {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      background: #f7f8fa;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .sidebar-list-panel::-webkit-scrollbar {
      display: none;
    }

    .sidebar-detail-panel {
      height: 100%;
      overflow: hidden;
      opacity: 0;
      background: #fff;
      border-left: 1px solid #e6ebf0;
      transition: opacity 0.22s ease;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .sidebar-detail-panel::-webkit-scrollbar {
      display: none;
    }

    .sidebar.expanded .sidebar-detail-panel {
      opacity: 1;
    }

    .detail-panel-inner {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    .detail-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #eef2f6;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(8px);
    }

    .detail-close-btn,
    .detail-icon-btn {
      border: 0;
      background: transparent;
      color: #223244;
      cursor: pointer;
      border-radius: 10px;
      height: 36px;
      min-width: 36px;
      padding: 0 10px;
      font-weight: 900;
      font-size: 18px;
    }

    .detail-top-actions {
      display: flex;
      gap: 6px;
    }

    .detail-scroll {
      flex: 1;
      overflow-y: auto;
      background: #fff;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .detail-scroll::-webkit-scrollbar {
      display: none;
    }

    .detail-hero {
      height: 235px;
      background: #dbe6ef center / cover no-repeat;
      position: relative;
    }

    .detail-hero-expand {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 8px;
      background: rgba(0,0,0,0.35);
      color: #fff;
      cursor: pointer;
      font-weight: 900;
    }

    .detail-content {
      padding: 18px;
    }

    .detail-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .detail-badges span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #f3f6fb;
      color: #7f4dff;
      font-size: 11px;
      font-weight: 900;
    }

    .detail-title {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.5;
      color: #1d2733;
      letter-spacing: -0.4px;
      font-weight: 900;
    }

    .detail-link-row {
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.6;
    }

    .detail-link-row a {
      color: #1f6fff;
      text-decoration: none;
      word-break: break-all;
    }

    .detail-link-row a:hover {
      text-decoration: underline;
    }

    .detail-desc {
      margin-bottom: 16px;
      font-size: 14px;
      color: #334355;
      line-height: 1.9;
      white-space: pre-line;
    }

    .detail-price-box {
      padding: 14px 14px 12px;
      border-radius: 14px;
      background: #f7f8fa;
      border: 1px solid #eceff3;
      margin-bottom: 16px;
    }

    .detail-price-badge {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      background: #f3eefe;
      color: #8d59ff;
      font-size: 11px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .detail-price {
      margin-bottom: 8px;
      font-size: 20px;
      font-weight: 900;
      color: #1d2733;
      letter-spacing: -0.5px;
    }

    .detail-address {
      font-size: 13px;
      color: #667788;
      line-height: 1.6;
    }

    .detail-meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid #eceff3;
      margin-bottom: 16px;
      background: #fff;
    }

    .detail-meta-item {
      padding: 14px 12px;
      border-right: 1px solid #eceff3;
    }

    .detail-meta-item:last-child {
      border-right: 0;
    }

    .detail-meta-label {
      display: block;
      font-size: 12px;
      color: #7a8794;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .detail-meta-value {
      display: block;
      font-size: 16px;
      color: #1f6fff;
      font-weight: 900;
      letter-spacing: -0.3px;
    }

    .detail-agent-card {
      border-radius: 14px;
      border: 1px solid #eceff3;
      background: #fff;
      padding: 14px;
      margin-bottom: 16px;
    }

    .detail-agent-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .detail-agent-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #eef3f7;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4d5d6d;
      font-weight: 900;
      overflow: hidden;
      flex-shrink: 0;
    }

    .detail-agent-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-agent-name {
      font-size: 15px;
      font-weight: 900;
      color: #1f2a36;
    }

    .detail-agent-office {
      font-size: 12px;
      color: #8a97a5;
      margin-top: 3px;
    }

    .detail-features {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .detail-features span {
      background: #eef8ff;
      color: #2563eb;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .detail-action-box {
      padding: 16px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e7edf3;
    }

    .detail-phone {
      margin-bottom: 12px;
      font-size: 14px;
      color: #233345;
      font-weight: 800;
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-action-btn {
      flex: 1;
      min-width: 100px;
      min-height: 42px;
      border: 0;
      border-radius: 12px;
      background: #eef3f7;
      color: #203040;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .detail-action-btn.primary {
      background: #0f2942;
      color: #fff;
    }

    .brand-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      height: 58px;
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid #e6ebf0;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-title {
      font-size: 17px;
      font-weight: 900;
      color: #1f2a36;
      white-space: nowrap;
    }

    .panel {
      margin: 0;
      padding: 10px 16px;
      border-radius: 0;
      background: #fff;
      border-bottom: 1px solid #e6ebf0;
      backdrop-filter: none;
    }

    .search-box input {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      border: 1px solid #dfe5eb;
      border-radius: 12px;
      outline: none;
      font-size: 14px;
      background: #fff;
      color: #17212b;
      box-shadow: none;
      margin-bottom: 10px;
    }

    .filter-title {
      margin: 2px 0 8px;
      font-size: 12px;
      font-weight: 800;
      color: #7a8794;
      letter-spacing: 0.1px;
    }

    .feature-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .feature-buttons button,
    .reset-list-btn {
      border: 1px solid #dfe5eb;
      border-radius: 10px;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
      background: #fff;
      color: #304050;
    }

    .feature-buttons button.active,
    .feature-buttons button.all-active {
      background: #f1f7ff;
      color: #1f6fff;
      border-color: #bfd6ff;
      box-shadow: none;
    }

    .reset-list-btn {
      width: 100%;
      margin-top: 0;
      margin-bottom: 10px;
      border-radius: 12px;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0;
      padding: 14px 16px 10px;
      background: #f7f8fa;
      border-bottom: 1px solid #eceff3;
    }

    .list-head strong {
      font-size: 14px;
      color: #1f6fff;
      letter-spacing: -0.2px;
      font-weight: 900;
    }

    .list-head span {
      font-size: 13px;
      color: #1f2a36;
      font-weight: 800;
    }

    .property-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-bottom: 24px;
      background: #f7f8fa;
    }

    .card {
      background: #fff;
      border: 0;
      border-bottom: 1px solid #eceff3;
      border-radius: 0;
      box-shadow: none;
      cursor: pointer;
      transition: background 0.15s ease;
      padding: 0;
      overflow: hidden;
    }

    .card:hover,
    .card.active {
      background: #f8fbff;
      transform: none;
      box-shadow: none;
      border-color: transparent;
      border-bottom: 1px solid #eceff3;
    }

    .card-inner-row {
      display: flex;
      gap: 12px;
      padding: 14px 14px 12px;
    }

    .thumb {
      width: 92px;
      min-width: 92px;
      height: 92px;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }

    .thumb::after { display: none; }

    .card-body {
      flex: 1;
      min-width: 0;
      padding: 0;
    }

    .card-top-line {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 6px;
      background: #f3eefe;
      color: #8d59ff;
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
    }

    .card-date {
      font-size: 12px;
      color: #9aa7b4;
      white-space: nowrap;
    }

    .card-address {
      font-size: 14px;
      color: #5d6b78;
      line-height: 1.45;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-price-line {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .card-deal {
      font-size: 16px;
      font-weight: 900;
      color: #1f6fff;
    }

    .card-price {
      font-size: 20px;
      font-weight: 900;
      color: #1d2733;
      letter-spacing: -0.4px;
    }

    .card-spec {
      font-size: 13px;
      color: #6a7785;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .card-agent-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid #f1f3f6;
    }

    .card-agent-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .card-agent-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #eef3f7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #506070;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-agent-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-agent-name {
      font-size: 13px;
      font-weight: 800;
      color: #1f2a36;
    }

    .card-agent-title {
      font-size: 12px;
      color: #8a97a5;
      margin-left: 4px;
    }

    .card-agent-office {
      font-size: 12px;
      color: #8a97a5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions { display: none; }

    .resizer {
      display: none;
    }

    .map-wrap {
      position: relative;
      min-width: 0;
      height: 100vh;
      overflow: hidden;
      background: #dde7ef;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .map-filter-bar {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: calc(100% - 24px);
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .deal-buttons,
    .type-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .deal-buttons button,
    .type-buttons button {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
      background: #eef3f7;
      color: #203040;
      cursor: pointer;
      white-space: nowrap;
      transition: 0.2s ease;
    }

    .deal-buttons button.active,
    .type-buttons button.active {
      background: var(--brand);
      color: #fff;
      box-shadow: 0 8px 18px rgba(20,184,166,0.22);
    }

    .map-result-count {
      position: absolute;
      top: 120px;
      left: 12px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 46px;
      padding: 10px 15px;
      border-radius: 16px;
      background: rgba(15,41,66,0.92);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      letter-spacing: -0.2px;
    }

    .map-result-count::before {
      content: "●";
      color: #34d399;
      font-size: 12px;
    }

    @media (max-width: 980px) {
      :root {
        --sidebar-current-width: 100%;
        --resizer-hit-width: 0px;
      }

      body { overflow: auto; }

      .app {
        grid-template-columns: 1fr;
        height: auto;
      }

      .resizer { display: none; }

      .sidebar {
        height: auto;
        min-width: 0;
      }

      .sidebar-inner,
      .sidebar.expanded .sidebar-inner {
        grid-template-columns: 1fr;
      }

      .sidebar-detail-panel { display: none; }

      .map-wrap,
      #map {
        height: 72vh;
        min-height: 520px;
      }

      .map-result-count { top: 124px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-list-panel">
          <div class="brand-card">
            <div class="brand-left">
              <div class="brand-title">제주도 부동산 지도 Ver 1.006</div>
            </div>
          </div>

          <div class="panel search-box">
            <button class="reset-list-btn" id="resetListBtn" type="button">전체 매물 보기</button>
            <input type="text" id="keyword" placeholder="지역명, 주소, 키워드 검색" />

            <div class="filter-title">특징 태그</div>
            <div class="feature-buttons" id="featureButtons">
              <button type="button" data-value="all" class="all-active">전체</button>
              <button type="button" data-value="신축">신축</button>
              <button type="button" data-value="오션뷰">오션뷰</button>
              <button type="button" data-value="생활권">생활권</button>
              <button type="button" data-value="투자용">투자용</button>
              <button type="button" data-value="급매">급매</button>
            </div>
          </div>

          <div class="list-head">
            <strong id="listInfoText">총 0개 매물</strong>
            <span>최신순</span>
          </div>

          <div class="property-list" id="propertyList"></div>
        </div>

        <div class="sidebar-detail-panel" id="sidebarDetailPanel">
          <div class="detail-panel-inner">
            <div class="detail-topbar">
              <button type="button" class="detail-close-btn" id="detailCloseBtn">
                <i class="fa-solid fa-arrow-left"></i>
              </button>
              <div class="detail-top-actions">
                <button type="button" class="detail-icon-btn" id="detailShareBtn">⤴</button>
                <button type="button" class="detail-icon-btn">🔖</button>
                <button type="button" class="detail-icon-btn">⋮</button>
              </div>
            </div>

            <div class="detail-scroll">
              <div class="detail-hero" id="detailHero">
                <button type="button" class="detail-hero-expand">⤢</button>
              </div>

              <div class="detail-content">
                <div class="detail-badges" id="detailBadges"></div>
                <h2 class="detail-title" id="detailTitle">매물을 선택하세요</h2>

                <div class="detail-link-row" id="detailLinkRow"></div>

                <div class="detail-desc" id="detailDesc"></div>

                <div class="detail-price-box">
                  <div class="detail-price-badge" id="detailPriceBadge">매물</div>
                  <div class="detail-price" id="detailPrice"></div>
                  <div class="detail-address" id="detailAddress"></div>
                </div>

                <div class="detail-meta-grid" id="detailMetaGrid">
                  <div class="detail-meta-item">
                    <span class="detail-meta-label">면적</span>
                    <span class="detail-meta-value" id="detailAreaValue">-</span>
                  </div>
                  <div class="detail-meta-item">
                    <span class="detail-meta-label">유형</span>
                    <span class="detail-meta-value" id="detailTypeValue">-</span>
                  </div>
                  <div class="detail-meta-item">
                    <span class="detail-meta-label">지역</span>
                    <span class="detail-meta-value" id="detailRegionValue">-</span>
                  </div>
                </div>

                <div class="detail-agent-card">
                  <div class="detail-agent-top">
                    <div class="detail-agent-avatar" id="detailAgentAvatar">담당</div>
                    <div>
                      <div class="detail-agent-name" id="detailAgentName">담당자 대표</div>
                      <div class="detail-agent-office" id="detailAgentOffice">중개사무소</div>
                    </div>
                  </div>
                </div>

                <div class="detail-features" id="detailFeatures"></div>

                <div class="detail-action-box">
                  <div class="detail-phone" id="detailPhone"></div>

                  <div class="detail-actions">
                    <button type="button" class="detail-action-btn primary" id="detailMapBtn">지도보기</button>
                    <button type="button" class="detail-action-btn" id="detailRoadviewBtn">로드뷰</button>
                    <a class="detail-action-btn" id="detailLinkBtn" href="#" target="_blank" rel="noopener noreferrer">상세보기</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <div class="resizer" id="resizer" aria-label="패널 크기 조절"></div>

    <main class="map-wrap">
      <div id="map"></div>

      <div class="map-filter-bar">
        <div class="deal-buttons" id="dealButtons">
          <button type="button" data-value="all" class="active">전체</button>
          <button type="button" data-value="매매">매매</button>
          <button type="button" data-value="전세">전세</button>
          <button type="button" data-value="월세">월세</button>
          <button type="button" data-value="년세">년세</button>
        </div>

        <div class="type-buttons" id="typeButtons">
          <button type="button" data-value="all" class="active">전체</button>
          <button type="button" data-value="단독">단독주택</button>
          <button type="button" data-value="다가구">다가구ㆍ다세대</button>
          <button type="button" data-value="원룸">원룸ㆍ투룸</button>
          <button type="button" data-value="아파트">아파트ㆍ빌라</button>
          <button type="button" data-value="상가">상가ㆍ사무실</button>
          <button type="button" data-value="토지">토지ㆍ임야</button>
        </div>
      </div>

      <div class="map-result-count" id="mapResultCount">총 0건</div>
    </main>
  </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b7db2d3c35122f3ec33c88ea6d3195fb&libraries=clusterer"></script>

  <script>
    const state = {
      map: null,
      clusterer: null,
      markers: [],
      all: [],
      filtered: [],
      selectedFeatures: new Set()
    };

    let roadview = null;
    let roadviewClient = null;
    let roadviewOverlay = null;
    let roadviewFullscreenBtn = null;
    let selectedDeal = "all";
    let selectedType = "all";
    let currentDetailItem = null;

    const sidebar = document.getElementById("sidebar");
    const propertyList = document.getElementById("propertyList");
    const keywordInput = document.getElementById("keyword");
    const mapResultCount = document.getElementById("mapResultCount");
    const resetListBtn = document.getElementById("resetListBtn");
    const dealButtons = document.querySelectorAll("#dealButtons button");
    const typeButtons = document.querySelectorAll("#typeButtons button");
    const featureButtons = document.querySelectorAll("#featureButtons button");
    const listInfoText = document.getElementById("listInfoText");

    const detailCloseBtn = document.getElementById("detailCloseBtn");
    const detailHero = document.getElementById("detailHero");
    const detailBadges = document.getElementById("detailBadges");
    const detailTitle = document.getElementById("detailTitle");
    const detailLinkRow = document.getElementById("detailLinkRow");
    const detailPrice = document.getElementById("detailPrice");
    const detailPriceBadge = document.getElementById("detailPriceBadge");
    const detailAddress = document.getElementById("detailAddress");
    const detailDesc = document.getElementById("detailDesc");
    const detailFeatures = document.getElementById("detailFeatures");
    const detailPhone = document.getElementById("detailPhone");
    const detailMapBtn = document.getElementById("detailMapBtn");
    const detailRoadviewBtn = document.getElementById("detailRoadviewBtn");
    const detailLinkBtn = document.getElementById("detailLinkBtn");
    const detailShareBtn = document.getElementById("detailShareBtn");
    const detailAreaValue = document.getElementById("detailAreaValue");
    const detailTypeValue = document.getElementById("detailTypeValue");
    const detailRegionValue = document.getElementById("detailRegionValue");
    const detailAgentOffice = document.getElementById("detailAgentOffice");
    const detailAgentAvatar = document.getElementById("detailAgentAvatar");
    const detailAgentName = document.getElementById("detailAgentName");

    function updateSidebarWidth() {
      const listWidth = getComputedStyle(document.documentElement).getPropertyValue("--sidebar-list-width").trim() || "360px";
      const detailWidth = getComputedStyle(document.documentElement).getPropertyValue("--detail-panel-width").trim() || "420px";
      const totalWidth = sidebar.classList.contains("expanded")
        ? `calc(${listWidth} + ${detailWidth})`
        : listWidth;
      document.documentElement.style.setProperty("--sidebar-current-width", totalWidth);
    }

    function refreshMapLayout() {
      if (!state.map) return;

      setTimeout(() => {
        state.map.relayout();
      }, 320);
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getRelativeDate(dateString) {
      if (!dateString) return "";
      const now = new Date();
      const target = new Date(dateString);
      if (isNaN(target.getTime())) return "";

      const diffMs = now - target;
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

      if (diffDays <= 0) return "오늘";
      if (diffDays === 1) return "1일 전";
      if (diffDays < 7) return `${diffDays}일 전`;
      if (diffDays < 30) return `${Math.floor(diffDays / 7)}주 전`;
      if (diffDays < 365) return `${Math.floor(diffDays / 30)}개월 전`;
      return `${Math.floor(diffDays / 365)}년 전`;
    }

    function normalizeProperty(item, index) {
      return {
        id: item.id ?? index + 1,
        title: item.title ?? "제목 없음",
        dealType: item.dealFilter ?? item.dealType ?? "매매",
        type: item.typeFilter ?? item.type ?? "",
        features: Array.isArray(item.features) ? item.features : [],
        price: item.price ?? "-",
        markerPrice: item.markerPrice ?? "",
        area: item.area ?? "-",
        address: item.address ?? "-",
        region: item.region ?? "",
        desc: item.desc ?? "",
        lat: Number(item.lat),
        lng: Number(item.lng),
        phone: item.phone ?? "",
        image: item.image ?? "",
        link: item.link ?? "#",
        agentName: item.agentName ?? "담당자",
        agentTitle: item.agentTitle ?? "대표",
        agentOffice: item.agentOffice ?? "중개사무소",
        agentImage: item.agentImage ?? "",
        date: item.date ?? "",
        dateLabel: item.dateLabel ?? ""
      };
    }

    function setResultInfo(text) {
      if (mapResultCount) mapResultCount.textContent = text;
    }

    function setListInfo(text) {
      if (listInfoText) listInfoText.textContent = text;
    }

    async function loadProperties() {
      try {
        const res = await fetch("./properties.json");
        if (!res.ok) throw new Error("properties.json 불러오기 실패");

        const data = await res.json();
        state.all = data
          .map(normalizeProperty)
          .filter(item => Number.isFinite(item.lat) && Number.isFinite(item.lng));

        applyFilter();
      } catch (err) {
        console.error("매물 데이터 불러오기 실패:", err);
        propertyList.innerHTML = `
          <div class="card" style="padding:18px; cursor:default; border-bottom:0;">
            <div class="card-body" style="padding:0;">
              <h3 class="title" style="margin-bottom:6px;">매물 데이터를 불러오지 못했습니다</h3>
              <div class="address-text">properties.json 파일 경로와 형식을 확인해 주세요.</div>
            </div>
          </div>
        `;
        setResultInfo("총 0건");
        setListInfo("총 0개 매물");
      }
    }

    function getMarkerColor(dealType, type) {
      if (["토지", "임야", "토지ㆍ임야"].includes(type)) return "#22c55e";
      if (dealType === "월세" || dealType === "년세") return "#f97316";
      if (dealType === "전세") return "#8b5cf6";
      return "#0ea5e9";
    }

   function createMarkerImage(item) {
      const color = "#0ea5e9";
    
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="58" height="58" viewBox="0 0 58 58">
          <defs>
            <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
              <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(15,41,66,0.16)"/>
            </filter>
          </defs>
    
          <g filter="url(#shadow)">
            <circle cx="29" cy="29" r="26" fill="#ffffff" stroke="${color}" stroke-width="3"/>
            <text x="29" y="36"
                  text-anchor="middle"
                  font-size="20"
                  font-weight="900"
                  font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif"
                  fill="${color}">1</text>
          </g>
        </svg>
      `;
    
      return new kakao.maps.MarkerImage(
        "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
        new kakao.maps.Size(58, 58),
        { offset: new kakao.maps.Point(29, 29) }
      );
    }

    async function closeRoadviewPanel() {
      try {
        if (document.fullscreenElement === roadviewOverlay) {
          await document.exitFullscreen();
        }
      } catch (err) {
        console.error("전체화면 해제 실패:", err);
      }

      if (roadviewOverlay) {
        roadviewOverlay.style.display = "none";
      }
    }

    async function hideRoadview() {
      await closeRoadviewPanel();
    }

    function makeAgentInitial(text) {
      const raw = String(text || "담당").trim();
      return raw.length >= 2 ? raw.slice(-2) : raw;
    }

    function openDetailPanel(item) {
      currentDetailItem = item;
      sidebar.classList.add("expanded");
      updateSidebarWidth();
      refreshMapLayout();

      detailHero.style.backgroundImage = `url('${escapeHtml(item.image)}')`;
      detailBadges.innerHTML = `<span>${escapeHtml(item.type || "-")}</span>`;

      detailTitle.textContent = item.title || "";
      detailPrice.textContent = `${item.dealType || ""} ${item.price || ""}`.trim();
      detailPriceBadge.textContent = item.type || "매물";
      detailAddress.textContent = `${item.region || ""} ${item.address || ""}`.trim();

      detailLinkRow.innerHTML = `
        지도도 매물확인 <a href="${escapeHtml(item.link && item.link !== "#" ? item.link : "#")}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.link && item.link !== "#" ? item.link : "링크 없음")}</a>
      `;

      detailDesc.textContent = item.desc || "";
      detailAreaValue.textContent = item.area || "-";
      detailTypeValue.textContent = item.type || "-";
      detailRegionValue.textContent = item.region || "-";

      detailAgentName.textContent = `${item.agentName || "담당자"} ${item.agentTitle || "대표"}`;
      detailAgentOffice.textContent = item.agentOffice || "중개사무소";

      if (item.agentImage) {
        detailAgentAvatar.innerHTML = `<img src="${escapeHtml(item.agentImage)}" alt="agent">`;
      } else {
        detailAgentAvatar.textContent = makeAgentInitial(item.agentName || "담당자");
      }

      detailFeatures.innerHTML = (item.features || [])
        .map(feature => `<span>${escapeHtml(feature)}</span>`)
        .join("");

      detailPhone.textContent = item.phone ? `문의 ${item.phone}` : "문의 가능";
      detailLinkBtn.href = item.link && item.link !== "#" ? item.link : "#";

      detailMapBtn.onclick = async () => {
        await focusProperty(item.id);
      };

      detailRoadviewBtn.onclick = async () => {
        await hideRoadview();
        showRoadview(item.lat, item.lng);
      };
    }

    function closeDetailPanel() {
      sidebar.classList.remove("expanded");
      currentDetailItem = null;
      updateSidebarWidth();
      refreshMapLayout();
    }

    function initMap() {
      state.map = new kakao.maps.Map(document.getElementById("map"), {
        center: new kakao.maps.LatLng(33.38, 126.55),
        level: 9
      });

      state.map.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);

      const mapTypeControl = new kakao.maps.MapTypeControl();
      state.map.addControl(mapTypeControl, kakao.maps.ControlPosition.TOPRIGHT);

      const zoomControl = new kakao.maps.ZoomControl();
      state.map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

      state.clusterer = new kakao.maps.MarkerClusterer({
        map: state.map,
        averageCenter: true,
        minLevel: 3,
        disableClickZoom: true,
        calculator: [5, 10, 20, 50],
        styles: [
          {
            width: "58px",
            height: "58px",
            background: "#ffffff",
            borderRadius: "29px",
            color: "#0ea5e9",
            textAlign: "center",
            fontWeight: "900",
            lineHeight: "58px",
            fontSize: "20px",
            border: "3px solid #0ea5e9",
            boxShadow: "0 8px 20px rgba(15,41,66,0.16)"
          },
          {
            width: "64px",
            height: "64px",
            background: "#ffffff",
            borderRadius: "32px",
            color: "#0ea5e9",
            textAlign: "center",
            fontWeight: "900",
            lineHeight: "64px",
            fontSize: "22px",
            border: "3px solid #0ea5e9",
            boxShadow: "0 8px 20px rgba(15,41,66,0.18)"
          },
          {
            width: "70px",
            height: "70px",
            background: "#ffffff",
            borderRadius: "35px",
            color: "#0ea5e9",
            textAlign: "center",
            fontWeight: "900",
            lineHeight: "70px",
            fontSize: "24px",
            border: "3px solid #0ea5e9",
            boxShadow: "0 10px 24px rgba(15,41,66,0.20)"
          },
          {
            width: "76px",
            height: "76px",
            background: "#ffffff",
            borderRadius: "38px",
            color: "#0ea5e9",
            textAlign: "center",
            fontWeight: "900",
            lineHeight: "76px",
            fontSize: "26px",
            border: "3px solid #0ea5e9",
            boxShadow: "0 10px 24px rgba(15,41,66,0.22)"
          }
        ]
      });

      kakao.maps.event.addListener(state.clusterer, "clusterclick", async function (cluster) {
        await hideRoadview();

        const clusterItems = cluster.getMarkers()
          .map(marker => marker.__property)
          .filter(Boolean);

        renderList(clusterItems);
        propertyList.scrollTop = 0;
        setResultInfo(`선택 지역 ${clusterItems.length}건`);
        setListInfo(`총 ${clusterItems.length}개 매물`);

        const bounds = new kakao.maps.LatLngBounds();
        clusterItems.forEach(item => {
          bounds.extend(new kakao.maps.LatLng(item.lat, item.lng));
        });
        state.map.setBounds(bounds);
      });

      kakao.maps.event.addListener(state.map, "click", async function () {
        await hideRoadview();
        renderList(state.filtered);
        setResultInfo(`총 ${state.filtered.length}건`);
        setListInfo(`총 ${state.filtered.length}개 매물`);
      });
    }

    function initRoadview() {
      roadviewClient = new kakao.maps.RoadviewClient();

      const roadviewContainer = document.createElement("div");
      roadviewContainer.id = "roadviewPanel";
      roadviewContainer.style.cssText = `
        position:absolute;
        top:52px;
        right:10px;
        width:min(720px, calc(100% - 20px));
        height:min(520px, calc(100vh - 80px));
        z-index:50;
        background:#fff;
        border-radius:14px;
        overflow:hidden;
        box-shadow:0 18px 40px rgba(0,0,0,0.22);
        display:none;
      `;

      const closeBtn = document.createElement("button");
      closeBtn.type = "button";
      closeBtn.textContent = "✕";
      closeBtn.style.cssText = `
        position:absolute;
        top:8px;
        right:8px;
        z-index:2;
        width:32px;
        height:32px;
        border:none;
        border-radius:50%;
        background:rgba(255,255,255,0.94);
        cursor:pointer;
        font-size:14px;
        font-weight:900;
      `;

      const fullscreenBtn = document.createElement("button");
      fullscreenBtn.type = "button";
      fullscreenBtn.textContent = "전체화면";
      fullscreenBtn.style.cssText = `
        position:absolute;
        top:8px;
        right:48px;
        z-index:2;
        height:32px;
        padding:0 11px;
        border:none;
        border-radius:999px;
        background:rgba(255,255,255,0.94);
        cursor:pointer;
        font-size:12px;
        font-weight:900;
      `;

      const inner = document.createElement("div");
      inner.id = "roadviewInner";
      inner.style.cssText = "width:100%; height:100%;";

      closeBtn.addEventListener("click", async () => {
        await closeRoadviewPanel();
      });

      fullscreenBtn.addEventListener("click", async () => {
        try {
          if (!document.fullscreenElement) {
            await roadviewContainer.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch (err) {
          console.error("전체화면 전환 실패:", err);
        }
      });

      document.addEventListener("fullscreenchange", () => {
        if (!roadviewFullscreenBtn) return;
        roadviewFullscreenBtn.textContent =
          document.fullscreenElement === roadviewOverlay ? "전체화면 해제" : "전체화면";
      });

      roadviewContainer.appendChild(closeBtn);
      roadviewContainer.appendChild(fullscreenBtn);
      roadviewContainer.appendChild(inner);
      document.querySelector(".map-wrap").appendChild(roadviewContainer);

      roadview = new kakao.maps.Roadview(inner);
      roadviewOverlay = roadviewContainer;
      roadviewFullscreenBtn = fullscreenBtn;
    }

    function showRoadview(lat, lng) {
      if (!roadviewClient || !roadviewOverlay || !roadview) {
        alert("로드뷰가 초기화되지 않았습니다.");
        return;
      }

      const position = new kakao.maps.LatLng(lat, lng);

      roadviewClient.getNearestPanoId(position, 100, function (panoId) {
        if (!panoId) {
          alert("이 위치 주변에는 로드뷰가 없습니다.");
          return;
        }

        roadviewOverlay.style.display = "block";
        roadview.setPanoId(panoId, position);
      });
    }

    function clearMapObjects() {
      if (state.clusterer) {
        state.clusterer.clear();
      }

      state.markers.forEach(marker => marker.setMap(null));
      state.markers = [];
    }

    function highlightCard(id) {
      document.querySelectorAll(".card").forEach(card => {
        card.classList.toggle("active", Number(card.dataset.id) === id);
      });
    }

    function moveMapToProperty(item, zoomLevel = 4) {
      if (!item || !state.map) return;
      const position = new kakao.maps.LatLng(item.lat, item.lng);
      state.map.setLevel(zoomLevel);
      state.map.setCenter(position);
      state.map.relayout();
    }

    function renderMarkers(data) {
      clearMapObjects();
      if (!data.length) return;

      const bounds = new kakao.maps.LatLngBounds();
      const markerList = [];

      data.forEach(item => {
        const position = new kakao.maps.LatLng(item.lat, item.lng);

        const marker = new kakao.maps.Marker({
          position,
          image: createMarkerImage(item),
          clickable: true
        });

        marker.__property = item;

        kakao.maps.event.addListener(marker, "click", async function () {
          await hideRoadview();
          highlightCard(item.id);
          openDetailPanel(item);
          moveMapToProperty(item, 4);
        });

        markerList.push(marker);
        state.markers.push(marker);
        bounds.extend(position);
      });

      state.clusterer.addMarkers(markerList);

      if (data.length === 1) {
        moveMapToProperty(data[0], 4);
      } else {
        state.map.setBounds(bounds);
      }
    }

    async function focusProperty(id) {
      const item = state.filtered.find(v => v.id === id) || state.all.find(v => v.id === id);
      if (!item || !state.map) return;

      await hideRoadview();
      highlightCard(id);
      moveMapToProperty(item, 4);
    }

    function renderList(data) {
      if (!data.length) {
        propertyList.innerHTML = `
          <div class="card" style="padding:18px; cursor:default; border-bottom:0;">
            <div class="card-body" style="padding:0;">
              <h3 class="title" style="margin-bottom:6px;">표시할 매물이 없습니다</h3>
              <div class="address-text">검색 조건을 바꿔보세요.</div>
            </div>
          </div>
        `;
        return;
      }

      propertyList.innerHTML = data.map(item => {
        const thumb = escapeHtml(item.image || "");
        const dealLabel = escapeHtml(item.dealType || "매매");
        const priceText = escapeHtml(item.price || "-");
        const addressText = escapeHtml(item.address || "-");
        const areaText = escapeHtml(item.area || "-");
        const typeText = escapeHtml(item.type || "-");
        const titleText = escapeHtml(item.title || "매물명");
        const dateText = item.dateLabel || (item.date ? getRelativeDate(item.date) : "");

        const agentName = escapeHtml(item.agentName || "담당자");
        const agentTitle = escapeHtml(item.agentTitle || "대표");
        const officeName = escapeHtml(item.agentOffice || "중개사무소");
        const agentInitial = makeAgentInitial(item.agentName || "담당자");

        return `
          <article class="card" data-id="${item.id}">
            <div class="card-inner-row">
              <div class="thumb" style="background-image:url('${thumb}')"></div>

              <div class="card-body">
                <div class="card-top-line">
                  <span class="card-badge">${typeText}</span>
                  <span class="card-date">${escapeHtml(dateText)}</span>
                </div>

                <div class="card-address">${addressText}</div>

                <div class="card-price-line">
                  <span class="card-deal">${dealLabel}</span>
                  <span class="card-price">${priceText}</span>
                </div>

                <div class="card-spec">${areaText} · ${titleText}</div>

                <div class="card-agent-row">
                  <div class="card-agent-left">
                    <div class="card-agent-avatar">
                      ${item.agentImage ? `<img src="${escapeHtml(item.agentImage)}" alt="agent">` : agentInitial}
                    </div>
                    <div>
                      <span class="card-agent-name">${agentName}</span>
                      <span class="card-agent-title">${agentTitle}</span>
                      <div class="card-agent-office">${officeName}</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join("");

      document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", async function (e) {
          if (e.target.closest("a, button")) return;

          const item = data.find(v => v.id === Number(card.dataset.id));
          if (!item) return;

          openDetailPanel(item);
          await focusProperty(item.id);
        });
      });
    }

    function syncFeatureButtons() {
      const isAll = state.selectedFeatures.size === 0;

      featureButtons.forEach(btn => {
        const value = btn.dataset.value;

        if (value === "all") {
          btn.classList.toggle("all-active", isAll);
          btn.classList.remove("active");
        } else {
          btn.classList.toggle("active", state.selectedFeatures.has(value));
          btn.classList.remove("all-active");
        }
      });
    }

    function applyFilter() {
      const keyword = keywordInput.value.trim().toLowerCase();
      const dealValue = selectedDeal;
      const typeValue = selectedType;

      state.filtered = state.all.filter(item => {
        const text = [
          item.title ?? "",
          item.region ?? "",
          item.address ?? "",
          item.desc ?? "",
          item.type ?? "",
          item.agentName ?? "",
          item.agentOffice ?? "",
          item.date ?? "",
          item.dateLabel ?? "",
          ...(item.features ?? [])
        ].join(" ").toLowerCase();

        const okKeyword = !keyword || text.includes(keyword);
        const okDeal = dealValue === "all" || item.dealType === dealValue;

        const itemType = (item.type ?? "").trim();

        const okType =
          typeValue === "all" ||
          (typeValue === "단독" && ["단독", "단독주택"].includes(itemType)) ||
          (typeValue === "다가구" && ["다가구", "다세대", "다가구ㆍ다세대", "다세대주택"].includes(itemType)) ||
          (typeValue === "원룸" && ["원룸", "투룸", "원룸ㆍ투룸"].includes(itemType)) ||
          (typeValue === "아파트" && ["아파트", "빌라", "아파트ㆍ빌라"].includes(itemType)) ||
          (typeValue === "상가" && ["상가", "사무실", "공장", "상가ㆍ사무실"].includes(itemType)) ||
          (typeValue === "토지" && ["토지", "임야", "토지ㆍ임야"].includes(itemType));

        const okFeature =
          state.selectedFeatures.size === 0 ||
          [...state.selectedFeatures].every(feature =>
            Array.isArray(item.features) && item.features.includes(feature)
          );

        return okKeyword && okDeal && okType && okFeature;
      });

      renderList(state.filtered);
      renderMarkers(state.filtered);
      setResultInfo(`총 ${state.filtered.length}건`);
      setListInfo(`총 ${state.filtered.length}개 매물`);
    }

    function initEvents() {
      keywordInput.addEventListener("input", applyFilter);

      if (resetListBtn) {
        resetListBtn.addEventListener("click", () => {
          renderList(state.filtered);
          setResultInfo(`총 ${state.filtered.length}건`);
          setListInfo(`총 ${state.filtered.length}개 매물`);
        });
      }

      detailCloseBtn.addEventListener("click", closeDetailPanel);

      detailShareBtn.addEventListener("click", async () => {
        if (!currentDetailItem) return;
        const url = currentDetailItem.link && currentDetailItem.link !== "#" ? currentDetailItem.link : location.href;

        try {
          await navigator.clipboard.writeText(url);
          detailShareBtn.textContent = "복사";
          setTimeout(() => {
            detailShareBtn.textContent = "⤴";
          }, 1000);
        } catch (err) {
          console.error(err);
        }
      });

      dealButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          dealButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          selectedDeal = btn.dataset.value;
          applyFilter();
        });
      });

      typeButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          typeButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          selectedType = btn.dataset.value;
          applyFilter();
        });
      });

      featureButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          const value = btn.dataset.value;

          if (value === "all") {
            state.selectedFeatures.clear();
          } else if (state.selectedFeatures.has(value)) {
            state.selectedFeatures.delete(value);
          } else {
            state.selectedFeatures.add(value);
          }

          syncFeatureButtons();
          applyFilter();
        });
      });

      window.addEventListener("resize", () => {
        if (!state.map) return;
        state.map.relayout();
      });
    }

    function bootstrap() {
      if (!window.kakao || !window.kakao.maps) {
        alert("카카오맵 SDK가 로드되지 않았습니다. appkey를 확인하세요.");
        return;
      }

      updateSidebarWidth();
      initMap();
      initRoadview();
      initEvents();
      loadProperties();
      syncFeatureButtons();
    }

    bootstrap();
  </script>
</body>
</html>
