<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>제주도 부동산 지도 Ver 1.013</title>

<!-- Pretendard -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>

<style>
:root{
  --font-ui:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  --bg:#f4f7fb;
  --text:#17212b;
  --line:#e6ebf0;
}

*{box-sizing:border-box;font-family:var(--font-ui);}
body{margin:0;background:var(--bg);color:var(--text);}

.app{
  display:grid;
  grid-template-columns:360px 1fr;
  height:100vh;
}

/* ===== 좌측 ===== */
.sidebar{
  background:#fff;
  border-right:1px solid var(--line);
  overflow:auto;
}

.brand{
  padding:16px;
  font-weight:900;
  font-size:16px;
  border-bottom:1px solid var(--line);
}

.card{
  padding:14px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.card-spec{
  font-size:13px;
  line-height:1.6;
  color:#555;
}

.card-title{
  font-weight:900;
  margin-top:6px;
}

.card-no{
  font-size:12px;
  color:#8a97a5;
}

/* ===== 우측 ===== */
.detail{
  padding:24px;
}

/* 🔥 핵심 구조 */
.detail-title-wrap{
  display:flex;
  flex-direction:column;
  gap:4px;
}

/* 🔥 매물번호 라벨 */
.detail-listing-no{
  display:inline-block;
  font-size:11px;
  font-weight:900;
  letter-spacing:0.5px;
  color:#4b5563;
  background:linear-gradient(180deg,#f8fafc,#eef2f6);
  padding:4px 9px;
  border-radius:8px;
  box-shadow:0 1px 2px rgba(0,0,0,0.04);
  width:fit-content;
  margin-bottom:6px;
}

.detail-title{
  font-size:20px;
  font-weight:900;
}

.detail-inline-price{
  font-size:24px;
  font-weight:900;
  letter-spacing:-0.5px;
}

.detail-inline-address{
  font-size:13px;
  color:#667788;
}

</style>
</head>

<body>

<div class="app">

  <!-- 좌측 리스트 -->
  <div class="sidebar">
    <div class="brand">제주도 부동산 지도 Ver 1.013</div>

    <div id="list"></div>
  </div>

  <!-- 우측 상세 -->
  <div class="detail">
    <div class="detail-title-wrap">
      <div id="detailNo" class="detail-listing-no"></div>
      <div id="detailTitle" class="detail-title"></div>
      <div id="detailPrice" class="detail-inline-price"></div>
      <div id="detailAddress" class="detail-inline-address"></div>
    </div>
  </div>

</div>

<script>

/* ===== 데이터 ===== */
const properties = [
{
  id:235,
  listingNo:"디-235",
  title:"제주푸르지오더퍼스트 104동",
  dealType:"매매",
  price:"6억 9,000",
  address:"제주도 서귀포시 대정읍 구억리 34",
  area:"공급 125.77㎡ / 전용 102.36㎡"
}
];

/* ===== 면적 2줄 ===== */
function formatArea(area){
  const m = area.match(/공급\s*([\d.]+).*전용\s*([\d.]+)/);
  if(!m) return area;
  return `공급 ${m[1]}㎡<br>전용 ${m[2]}㎡`;
}

/* ===== 리스트 ===== */
const listEl = document.getElementById("list");

properties.forEach(item=>{
  const div=document.createElement("div");
  div.className="card";

  div.innerHTML = `
    <div class="card-spec">${formatArea(item.area)}</div>
    <div class="card-title">${item.title}</div>
    <div class="card-no">매물번호 ${item.listingNo}</div>
  `;

  div.onclick=()=>openDetail(item);

  listEl.appendChild(div);
});

/* ===== 상세 ===== */
function openDetail(item){
  document.getElementById("detailNo").innerText="매물번호 "+item.listingNo;
  document.getElementById("detailTitle").innerText=item.title;
  document.getElementById("detailPrice").innerText=item.dealType+" "+item.price;
  document.getElementById("detailAddress").innerText=item.address;
}

/* 초기 */
openDetail(properties[0]);

</script>

</body>
</html>
