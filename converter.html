<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아파트 매물 JSON 변환기</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #dfe5ee;
      --text: #17212b;
      --sub: #667382;
      --brand: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }
    .desc {
      margin: 0 0 18px;
      color: var(--sub);
      line-height: 1.5;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.2px;
    }
    textarea {
      width: 100%;
      min-height: 560px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      resize: vertical;
      font-size: 14px;
      line-height: 1.5;
      background: #fff;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    button {
      border: 0;
      background: var(--brand);
      color: #fff;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary {
      background: #eef3fb;
      color: #27415e;
    }
    .hint {
      margin-top: 12px;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-line;
    }
    .status {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 700;
      color: #0f766e;
      min-height: 20px;
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      textarea { min-height: 360px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>아파트 매물 JSON 변환기</h1>
    <p class="desc">복사한 아파트 매물 텍스트를 왼쪽에 붙여넣으면, 지금 쓰는 아파트 JSON 구조에 맞게 오른쪽으로 변환한다.</p>

    <div class="grid">
      <section class="card">
        <h2>원본 텍스트</h2>
        <div class="controls">
          <button id="convertBtn">JSON 변환</button>
          <button id="sampleBtn" class="secondary">샘플 넣기</button>
          <button id="clearBtn" class="secondary">지우기</button>
        </div>
        <textarea id="inputText" placeholder="여기에 복사한 아파트 매물 텍스트를 붙여넣으세요."></textarea>
        <div class="hint">변환 규칙
- 제목 + 거래유형 + 가격 + 주소 + 공급/전용면적 자동 추출
- 관리비/기본정보/건물정보는 sections 구조로 자동 정리
- 아파트 type은 기본값으로 '아파트' 지정</div>
      </section>

      <section class="card">
        <h2>변환 결과 JSON</h2>
        <div class="controls">
          <button id="copyBtn">JSON 복사</button>
        </div>
        <textarea id="outputText" placeholder="변환 결과가 여기 표시됩니다."></textarea>
        <div class="status" id="statusText"></div>
      </section>
    </div>
  </div>

  <script>
    const inputText = document.getElementById('inputText');
    const outputText = document.getElementById('outputText');
    const statusText = document.getElementById('statusText');

    const SECTION_TITLES = ['월관리비', '기본 정보', '건물 정보'];

    function normalizeLines(text) {
      return text
        .replace(/\r/g, '')
        .split('\n')
        .map(v => v.trim())
        .filter(Boolean);
    }

    function findFirst(lines, predicate) {
      return lines.find(predicate) || '';
    }

    function parsePrice(line) {
      const value = line.replace(/^매매가\s*/, '').trim();
      return value || '';
    }

    function extractAreaLine(lines) {
      return findFirst(lines, line => line.includes('공급면적') && line.includes('전용면적'));
    }

    function parseArea(areaLine) {
      const supplyMatch = areaLine.match(/공급면적\s*([\d.]+㎡)/);
      const privateMatch = areaLine.match(/전용면적\s*([\d.]+㎡)/);
      if (!supplyMatch && !privateMatch) return '';
      const supply = supplyMatch ? supplyMatch[1] : '';
      const privateArea = privateMatch ? privateMatch[1] : '';
      return `공급 ${supply} / 전용 ${privateArea}`.trim();
    }

    function splitSections(lines) {
      const sections = [];
      let current = null;

      for (const line of lines) {
        const normalized = line.replace(/\s+/g, ' ').trim();
        const isSection = SECTION_TITLES.includes(normalized);
        if (isSection) {
          current = { title: normalized, lines: [] };
          sections.push(current);
          continue;
        }
        if (current) current.lines.push(line);
      }
      return sections;
    }

    function linesToRows(lines) {
      const rows = [];
      for (let i = 0; i < lines.length; i += 2) {
        const label = (lines[i] || '').trim();
        const value = (lines[i + 1] || '').trim();
        if (!label || !value) continue;
        rows.push({ label, value });
      }
      return rows;
    }

    function renameSectionTitle(title) {
      if (title === '월관리비') return '관리비 정보';
      return title;
    }

    function convertTextToJson(rawText) {
      const lines = normalizeLines(rawText);
      if (!lines.length) throw new Error('입력 텍스트가 비어 있습니다.');

      const title = lines[0] || '';
      const typeDealLine = lines[1] || '';
      const priceLine = findFirst(lines, line => line.startsWith('매매가'));
      const address = findFirst(lines, line => /^제주도\s/.test(line) || /^제주특별자치도\s/.test(line));
      const areaLine = extractAreaLine(lines);

      const dealType = typeDealLine.includes('매매') ? '매매' : '';
      const type = typeDealLine.includes('아파트') ? '아파트' : '아파트';
      const regionMatch = address.match(/제주시|서귀포시|영어교육도시|노형동|대정읍|연동|애월읍/);
      const region = regionMatch ? regionMatch[0] : '';

      const sections = splitSections(lines).map(section => ({
        title: renameSectionTitle(section.title),
        rows: linesToRows(section.lines)
      })).filter(section => section.rows.length > 0);

      return {
        title,
        listingNo: '',
        dealType,
        price: parsePrice(priceLine),
        type,
        address,
        region,
        area: parseArea(areaLine),
        desc: '',
        features: [],
        info: {
          sections
        },
        raw_source: rawText.trim()
      };
    }

    function convert() {
      try {
        const result = convertTextToJson(inputText.value);
        outputText.value = JSON.stringify(result, null, 2);
        statusText.textContent = '변환 완료';
      } catch (err) {
        outputText.value = '';
        statusText.textContent = err.message;
      }
    }

    document.getElementById('convertBtn').addEventListener('click', convert);

    document.getElementById('copyBtn').addEventListener('click', async () => {
      if (!outputText.value.trim()) {
        statusText.textContent = '복사할 JSON이 없습니다.';
        return;
      }
      await navigator.clipboard.writeText(outputText.value);
      statusText.textContent = 'JSON 복사 완료';
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      inputText.value = '';
      outputText.value = '';
      statusText.textContent = '';
    });

    document.getElementById('sampleBtn').addEventListener('click', () => {
      inputText.value = `노형2차아이파크 202동
아파트 매매
매매가 10억 6,000만원
제주도 제주시 노형동 3791-1
공급면적 139.25㎡ / 전용면적 115.16㎡

월관리비
관리비 합계
250,000원
관리비 포함 내역
공용관리비, 기타관리비
관리비 미포함 내역
전기료, 가스, 수도, 난방비, 인터넷, TV
부과사유
관리규약 등에 따라 부과
부과기준
최근 3개월 관리비 평균

기본 정보
해당동
202동
입주가능일
즉시입주 협의가능
방향
남향 (거실 방향 기준)
현관구조
계단식
해당층/총층
저층/15
방/욕실수
4/2개

건물 정보
건축물용도
공동주택
총세대수
174세대
사용승인일
2014-01-20
옵션
총 주차대수: 227대 (세대당 1.3대)
난방시설: 개별난방 / 도시가스(LNG)`;
      statusText.textContent = '샘플 입력 완료';
    });
  </script>
</body>
</html>
